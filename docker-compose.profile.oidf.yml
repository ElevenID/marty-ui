# OIDF verifier conformance profile.
#
# Combine this with docker-compose.base.yml and docker-compose.profile.ghcr.yml.
# It exercises the same gateway, Keycloak, flow, and verification services as a
# deployment, while making their protocol URLs HTTPS. The certificate directory
# is intentionally supplied by the invoking environment: a local disposable
# run may use a test CA (scripts/new-oidf-local-certificate.ps1), while
# certification uses its registered certificate.
#
# For W3C VC Data Model v2, also add docker-compose.profile.w3c-vc.yml. That
# separate overlay enables the fixture-only VC API adapter and requires an
# explicit disposable presentation-policy ID.

services:
  db-migrate:
    environment:
      PUBLIC_API_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}
      ISSUER_BASE_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}

  keycloak-configurator:
    environment:
      UI_BASE_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}
      KEYCLOAK_REPLACE_UI_ORIGINS: "true"

  oidf-tls-proxy:
    profiles: [oidf]
    image: nginx@sha256:679a5fd058f6ca754a561846fe27927e408074431d63556e8fc588fc38be6901
    ports:
      - "${OIDF_TLS_HOST_PORT:-8443}:${OIDF_INTERNAL_TLS_PORT:-443}"
    volumes:
      - ./services/oidf-tls-proxy/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${OIDF_TLS_CERT_DIR:?set OIDF_TLS_CERT_DIR to a directory containing tls.crt and tls.key}:/etc/nginx/certs:ro
    environment:
      # Must equal the port in OIDF_PUBLIC_BASE_URL. The runner reaches this
      # listener directly across oidf-runner-network, so Docker's host-port
      # mapping is not a substitute for listening on the published port.
      OIDF_INTERNAL_TLS_PORT: ${OIDF_INTERNAL_TLS_PORT:-443}
    depends_on:
      gateway:
        condition: service_healthy
      auth:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    # The official runner is a separate Compose project. It joins only this
    # proxy-facing bridge, never marty-network, and resolves the published
    # hostname to this TLS boundary rather than an internal service.
    networks:
      marty-network: {}
      oidf-runner-network:
        aliases:
          - ${OIDF_CONFORMANCE_BRIDGE_ALIAS:?set OIDF_CONFORMANCE_BRIDGE_ALIAS to the hostname in OIDF_PUBLIC_BASE_URL}
    restart: "no"

  auth:
    environment:
      UI_BASE_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}
      OIDC_EXTERNAL_ISSUER_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}/realms/${KEYCLOAK_REALM:-11id}
      OIDC_REDIRECT_URI: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}/v1/auth/callback
      OIDC_POST_LOGOUT_REDIRECT_URI: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}/
      COOKIE_SECURE: "true"

  gateway:
    environment:
      PUBLIC_API_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}
      ISSUER_BASE_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}
      CORS_ORIGINS: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}

  presentation-policy:
    environment:
      PUBLIC_API_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}
      PUBLIC_BASE_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}
      ISSUER_BASE_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}

  flow:
    environment:
      PUBLIC_BASE_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}
      # The pinned OID4VP 1.0 Final verifier plan uses the standard
      # redirect_uri client-ID prefix.  Keep this a deployment setting so a
      # separate HAIP overlay can select x509_hash without weakening the
      # Final profile or changing application code.
      OID4VP_CLIENT_ID_PREFIX: ${OIDF_CLIENT_ID_PREFIX:-redirect_uri}

  issuance:
    environment:
      PUBLIC_BASE_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}
      ISSUER_BASE_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}

  verification:
    environment:
      PUBLIC_BASE_URL: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}

  keycloak:
    environment:
      KC_HOSTNAME: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS verifier URL}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded

networks:
  # A project-scoped, internal bridge for a separately composed OIDF runner.
  # The proxy is the sole Marty service on it; the runner keeps its own normal
  # network for access to its official test server and mock-wallet endpoints.
  oidf-runner-network:
    name: ${MARTY_CONFORMANCE_PROJECT:?set MARTY_CONFORMANCE_PROJECT}_oidf-runner
    internal: true
