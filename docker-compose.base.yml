# Marty UI Unified Base Stack
# ===========================
# Single base compose file for infra + microservices.
# Mode-specific behavior is layered via profile compose files.

services:
  # ==========================================================================
  # Infrastructure
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: marty-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      MARTY_DB_PASSWORD: ${MARTY_DB_PASSWORD:-marty_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && pg_isready -U keycloak -d keycloak && pg_isready -U marty -d marty"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - marty-network

  redis:
    image: redis:7-alpine
    container_name: marty-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - marty-network

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: marty-keycloak
    command:
      - start-dev
      - --import-realm
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT:-8180}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
      UI_BASE_URL: ${UI_BASE_URL:-http://localhost:3000}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-11id}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MARTY_API_CLIENT_SECRET: ${MARTY_API_CLIENT_SECRET:-marty-api-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
      - ./config/keycloak/themes:/opt/keycloak/themes:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/${KEYCLOAK_REALM:-11id}/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - marty-network

  # One-shot configurator: patches Keycloak after realm import.
  # Resolves env vars (Google credentials, public domain redirect URIs, etc.)
  # that cannot be embedded in the realm JSON. Idempotent — safe to run on
  # every 'docker compose up'.
  keycloak-configurator:
    image: quay.io/keycloak/keycloak:25.0
    container_name: marty-keycloak-configurator
    entrypoint: ["/bin/bash", "/scripts/setup-keycloak.sh"]
    environment:
      KC_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-11id}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-}
      UI_BASE_URL: ${UI_BASE_URL:-}
      MARTY_API_CLIENT_SECRET: ${MARTY_API_CLIENT_SECRET:-}
    volumes:
      - ./scripts/setup-keycloak.sh:/scripts/setup-keycloak.sh:ro
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"
    networks:
      - marty-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: marty-mailhog
    ports:
      - "9025:8025"
      - "2025:1025"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - marty-network

  # ==========================================================================
  # Database Migrations
  # ==========================================================================
  db-migrate:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile.migrations
    container_name: marty-db-migrate
    environment:
      DATABASE_URL: postgresql://marty:${MARTY_DB_PASSWORD:-marty_dev_password}@postgres:5432/marty
      MARTY_ORG_ID: ${MARTY_ORG_ID:-00000000-0000-0000-0000-000000000001}
      MARTY_ORG_ADMIN_EMAIL: ${MARTY_ORG_ADMIN_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - marty-network

  # ==========================================================================
  # Application Services
  # ==========================================================================
  gateway:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: gateway
    container_name: marty-gateway
    environment:
      GATEWAY_PORT: "8000"
      AUTH_SERVICE_URL: http://auth:8001
      ORGANIZATION_SERVICE_URL: http://organization:8002
      CREDENTIAL_TEMPLATE_SERVICE_URL: http://credential-template:8003
      TRUST_PROFILE_SERVICE_URL: http://trust-profile:8004
      APPLICANT_SERVICE_URL: http://applicant:8006
      NOTIFICATION_SERVICE_URL: http://notification:8007
      COMPLIANCE_PROFILE_SERVICE_URL: http://compliance-profile:8008
      PRESENTATION_POLICY_SERVICE_URL: http://presentation-policy:8009
      DEPLOYMENT_PROFILE_SERVICE_URL: http://deployment-profile:8010
      FLOW_SERVICE_URL: http://flow:8011
      DEVICE_REGISTRATION_SERVICE_URL: http://device-registration:8014
      ISSUANCE_SERVICE_URL: http://issuance:8005
      BILLING_SERVICE_URL: http://billing:8016
      ISSUER_BASE_URL: ${PUBLIC_API_URL:-http://gateway:8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      AUTH_GRPC_TARGET: auth:9001
      ORG_GRPC_TARGET: organization:9002
      ES_GRPC_TARGET: event-stream:9015
      REDIS_URL: redis://redis:6379
      REDIS_DB_GATEWAY: "2"
    ports:
      - "8000:8000"
    depends_on:
      auth:
        condition: service_healthy
      organization:
        condition: service_healthy
      issuance:
        condition: service_healthy
      event-stream:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  auth:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: auth
    container_name: marty-auth
    environment:
      AUTH_SERVICE_PORT: "8001"
      UI_BASE_URL: ${UI_BASE_URL:-http://localhost:3000}
      REDIS_URL: redis://redis:6379/0
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL_INTERNAL:-http://keycloak:8080/realms/${KEYCLOAK_REALM:-11id}}
      OIDC_EXTERNAL_ISSUER_URL: ${OIDC_ISSUER_URL_EXTERNAL:-http://localhost:8180/realms/${KEYCLOAK_REALM:-11id}}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-marty-ui}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:3000/v1/auth/callback}
      OIDC_POST_LOGOUT_REDIRECT_URI: ${OIDC_POST_LOGOUT_REDIRECT_URI:-http://localhost:3000/}
      SESSION_TTL_SECONDS: "86400"
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      KEYCLOAK_ADMIN_URL: ${KEYCLOAK_ADMIN_URL:-http://keycloak:8080}
      MARTY_API_CLIENT_ID: ${MARTY_API_CLIENT_ID:-marty-api}
      MARTY_API_CLIENT_SECRET: ${MARTY_API_CLIENT_SECRET:-marty-api-secret-change-in-production}
      CREDENTIAL_LOGIN_POLICY_ID: ${CREDENTIAL_LOGIN_POLICY_ID:-}
      AUTH_SERVICE_INTERNAL_URL: ${AUTH_SERVICE_INTERNAL_URL:-http://auth:8001}
      MARTY_ORG_ID: ${MARTY_ORG_ID:-00000000-0000-0000-0000-000000000001}
      ORG_GRPC_TARGET: organization:9002
      FLOW_GRPC_TARGET: flow:9011
      AUTH_GRPC_PORT: "9001"
    ports:
      - "8001:8001"
      - "9001:9001"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  organization:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: organization
    container_name: marty-organization
    environment:
      ORGANIZATION_SERVICE_PORT: "8002"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      REDIS_URL: redis://redis:6379
      REDIS_DB_GATEWAY: "2"
      ORG_GRPC_PORT: "9002"
    ports:
      - "8002:8002"
      - "9002:9002"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  credential-template:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: credential-template
    container_name: marty-credential-template
    environment:
      CREDENTIAL_TEMPLATE_SERVICE_PORT: "8003"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
      CT_GRPC_PORT: "9003"
    ports:
      - "8003:8003"
      - "9003:9003"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  trust-profile:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: trust-profile
    container_name: marty-trust-profile
    environment:
      TRUST_PROFILE_SERVICE_PORT: "8004"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
    ports:
      - "8004:8004"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  applicant:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: applicant
    container_name: marty-applicant
    environment:
      APPLICANT_SERVICE_PORT: "8006"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      APPLICANT_DATA_FILE: /app/data/applicant_store.json
      ISSUANCE_SERVICE_URL: http://issuance:8005
      ORG_GRPC_TARGET: organization:9002
      FLOW_GRPC_TARGET: flow:9011
    ports:
      - "8006:8006"
    volumes:
      - applicant_data:/app/data
    user: "0:0"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  notification:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: notification
    container_name: marty-notification
    environment:
      NOTIFICATION_SERVICE_PORT: "8007"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      NOTIF_GRPC_PORT: "9007"
    ports:
      - "8007:8007"
      - "9007:9007"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      mailhog:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  compliance-profile:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: compliance-profile
    container_name: marty-compliance-profile
    environment:
      COMPLIANCE_PROFILE_SERVICE_PORT: "8008"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
    ports:
      - "8008:8008"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  presentation-policy:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: presentation-policy
    container_name: marty-presentation-policy
    environment:
      PRESENTATION_POLICY_SERVICE_PORT: "8009"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
      PP_GRPC_PORT: "9009"
    ports:
      - "8009:8009"
      - "9009:9009"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  deployment-profile:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: deployment-profile
    container_name: marty-deployment-profile
    environment:
      DEPLOYMENT_PROFILE_SERVICE_PORT: "8010"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
    ports:
      - "8010:8010"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  flow:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: flow
    container_name: marty-flow
    environment:
      FLOW_SERVICE_PORT: "8011"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      PUBLIC_BASE_URL: ${PUBLIC_API_URL:-http://gateway:8000}
      ORG_GRPC_TARGET: organization:9002
      PP_GRPC_TARGET: presentation-policy:9009
      CT_GRPC_TARGET: credential-template:9003
      FLOW_GRPC_PORT: "9011"
    ports:
      - "8011:8011"
      - "9011:9011"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  issuance:
    build:
      context: ..
      dockerfile: marty-credentials/services/Dockerfile
    container_name: marty-issuance
    environment:
      ISSUANCE_SERVICE_PORT: "8005"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ISSUER_BASE_URL: ${PUBLIC_API_URL:-http://gateway:8000}
      ISSUANCE_OFFER_TTL_MINUTES: ${ISSUANCE_OFFER_TTL_MINUTES:-10080}
      ISSUANCE_AUTH_SESSION_TTL_MINUTES: ${ISSUANCE_AUTH_SESSION_TTL_MINUTES:-60}
      ORG_GRPC_TARGET: organization:9002
      CT_GRPC_TARGET: credential-template:9003
      CREDENTIAL_TEMPLATE_SERVICE_URL: http://credential-template:8003
      ISSUANCE_GRPC_PORT: "9005"
    ports:
      - "8005:8005"
      - "9005:9005"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - marty-network

  # ── Revocation Profile Service ────────────────────────────────────
  revocation-profile:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: revocation-profile
    container_name: marty-revocation-profile
    environment:
      REVOCATION_PROFILE_SERVICE_PORT: "8013"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
      RP_GRPC_PORT: "9013"
    ports:
      - "8013:8013"
      - "9013:9013"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  # ── Device Registration Service ─────────────────────────────────
  device-registration:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: device_registration
    container_name: marty-device-registration
    environment:
      DEVICE_REGISTRATION_SERVICE_PORT: "8014"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
    ports:
      - "8014:8014"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8014/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  # ── Event Stream Service (gRPC event bus) ─────────────────────────
  event-stream:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: event_stream
    container_name: marty-event-stream
    environment:
      - EVENT_STREAM_GRPC_ENABLED=true
      - EVENT_STREAM_GRPC_PORT=9015
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    ports:
      - "8015:8015"
      - "9015:9015"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8015/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - marty-network

  # ── Verification Service ─────────────────────────────────────────
  verification:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: verification
    container_name: marty-verification
    environment:
      VERIFICATION_SERVICE_PORT: "8012"
      PP_GRPC_TARGET: presentation-policy:9009
      VERIF_GRPC_PORT: "9017"
      VERIF_GRPC_ENABLED: "true"
      PUBLIC_BASE_URL: ${PUBLIC_API_URL:-http://gateway:8000}
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    ports:
      - "8012:8012"
      - "9017:9017"
    depends_on:
      presentation-policy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  # ── Billing Service ──────────────────────────────────────────────
  billing:
    build:
      context: ..
      dockerfile: marty-ui/services/Dockerfile
      args:
        SERVICE_NAME: billing
    container_name: marty-billing
    environment:
      BILLING_SERVICE_PORT: "8016"
      DATABASE_URL: postgresql+asyncpg://marty:${MARTY_DB_PASSWORD:-marty_dev_password}@postgres:5432/marty
      ORGANIZATION_SERVICE_URL: http://organization:8002
      SQUARE_ENVIRONMENT: ${SQUARE_ENVIRONMENT:-sandbox}
      SQUARE_ACCESS_TOKEN: ${SQUARE_ACCESS_TOKEN:-}
      SQUARE_LOCATION_ID: ${SQUARE_LOCATION_ID:-}
      SQUARE_WEBHOOK_SIGNATURE_KEY: ${SQUARE_WEBHOOK_SIGNATURE_KEY:-}
      SQUARE_PLAN_STARTER_ID: ${SQUARE_PLAN_STARTER_ID:-}
      SQUARE_PLAN_PROFESSIONAL_ID: ${SQUARE_PLAN_PROFESSIONAL_ID:-}
      SQUARE_PLAN_ENTERPRISE_ID: ${SQUARE_PLAN_ENTERPRISE_ID:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "8016:8016"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      organization:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8016/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network

  # ── Envoy gRPC Proxy ─────────────────────────────────────────────
  envoy:
    image: envoyproxy/envoy:v1.29-latest
    container_name: marty-envoy
    volumes:
      - ./config/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./config/envoy/proto_descriptor.pb:/etc/envoy/proto_descriptor.pb:ro
    ports:
      - "9000:9000"    # gRPC / gRPC-web unified endpoint
      - "9901:9901"    # Envoy admin
    depends_on:
      auth:
        condition: service_healthy
      organization:
        condition: service_healthy
      credential-template:
        condition: service_healthy
      issuance:
        condition: service_healthy
      notification:
        condition: service_healthy
      presentation-policy:
        condition: service_healthy
      flow:
        condition: service_healthy
      revocation-profile:
        condition: service_healthy
      device-registration:
        condition: service_healthy
      event-stream:
        condition: service_healthy
      verification:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9901/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - marty-network

volumes:
  postgres_data:
  redis_data:
  applicant_data:
  envoy_proto_descriptor:

networks:
  marty-network:
    name: marty-infra-network
