# Marty UI Unified Base Stack
# ===========================
# Single base compose file for infra + microservices.
# Mode-specific behavior is layered via profile compose files.

x-marty-service-build-artifacts: &marty_service_build_artifacts
  MARTY_RS_URI: ${MARTY_RS_URI:?set MARTY_RS_URI to the immutable marty-rs wheel}
  MARTY_RS_DIGEST: ${MARTY_RS_DIGEST:?set MARTY_RS_DIGEST to that wheel's sha256 digest}
  MARTY_COMMON_URI: ${MARTY_COMMON_URI:?set MARTY_COMMON_URI to the immutable marty-common wheel}
  MARTY_COMMON_DIGEST: ${MARTY_COMMON_DIGEST:?set MARTY_COMMON_DIGEST to that wheel's sha256 digest}

services:
  # ==========================================================================
  # Infrastructure
  # ==========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: marty-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      MARTY_DB_PASSWORD: ${MARTY_DB_PASSWORD:-marty_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && pg_isready -U keycloak -d keycloak && pg_isready -U marty -d marty"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - marty-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: marty-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - marty-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: marty-keycloak
    command:
      - start-dev
      - --features=organization
      - --import-realm
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT:-8180}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
      UI_BASE_URL: ${UI_BASE_URL:-http://localhost:3000}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-11id}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MARTY_API_CLIENT_SECRET: ${MARTY_API_CLIENT_SECRET:-marty-api-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
      - ./config/keycloak/themes:/opt/keycloak/themes:ro
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/${KEYCLOAK_REALM:-11id}/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - marty-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # One-shot configurator: patches Keycloak after realm import.
  # Resolves env vars (Google credentials, public domain redirect URIs, etc.)
  # that cannot be embedded in the realm JSON. Idempotent — safe to run on
  # every 'docker compose up'.
  keycloak-configurator:
    image: quay.io/keycloak/keycloak:25.0
    container_name: marty-keycloak-configurator
    entrypoint: ["/bin/bash", "/scripts/setup-keycloak.sh"]
    environment:
      KC_URL: http://keycloak:8080
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-11id}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-}
      UI_BASE_URL: ${UI_BASE_URL:-}
      MARTY_API_CLIENT_SECRET: ${MARTY_API_CLIENT_SECRET:-}
      MARTY_ORG_NAME: ${MARTY_ORG_NAME:-Marty}
      MARTY_ORG_DOMAIN: ${MARTY_ORG_DOMAIN:-beta.elevenidllc.com}
      MARTY_ORG_ADMIN_EMAIL: ${MARTY_ORG_ADMIN_EMAIL:-}
      DEMO_REVIEWER_EMAIL: ${DEMO_REVIEWER_EMAIL:-reviewer@marty.demo}
      DEMO_REVIEWER_FIRST_NAME: ${DEMO_REVIEWER_FIRST_NAME:-Review}
      DEMO_REVIEWER_LAST_NAME: ${DEMO_REVIEWER_LAST_NAME:-User}
      DEMO_REVIEWER_PASSWORD: ${DEMO_REVIEWER_PASSWORD:-}
      KEYCLOAK_USER_REGISTRATION_ENABLED: ${KEYCLOAK_USER_REGISTRATION_ENABLED:-true}
      KEYCLOAK_VERIFY_EMAIL: ${KEYCLOAK_VERIFY_EMAIL:-false}
      KEYCLOAK_RESET_PASSWORD_ENABLED: ${KEYCLOAK_RESET_PASSWORD_ENABLED:-true}
      KEYCLOAK_SOCIAL_LOGIN_ENABLED: ${KEYCLOAK_SOCIAL_LOGIN_ENABLED:-true}
      KEYCLOAK_SMTP_HOST: ${KEYCLOAK_SMTP_HOST:-mailpit}
      KEYCLOAK_SMTP_PORT: ${KEYCLOAK_SMTP_PORT:-1025}
      KEYCLOAK_SMTP_FROM: ${KEYCLOAK_SMTP_FROM:-noreply@marty.demo}
      KEYCLOAK_SMTP_FROM_DISPLAY_NAME: ${KEYCLOAK_SMTP_FROM_DISPLAY_NAME:-Marty Trust Services}
      KEYCLOAK_SMTP_SSL: ${KEYCLOAK_SMTP_SSL:-false}
      KEYCLOAK_SMTP_STARTTLS: ${KEYCLOAK_SMTP_STARTTLS:-false}
    volumes:
      - ./scripts/setup-keycloak.sh:/scripts/setup-keycloak.sh:ro
    depends_on:
      keycloak:
        condition: service_healthy
    restart: "no"
    networks:
      - marty-network

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: marty-mailpit
    ports:
      - "9025:8025"
      - "2025:1025"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025/livez"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - marty-network

  openbao:
    image: quay.io/openbao/openbao:2
    container_name: marty-openbao
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      BAO_DEV_ROOT_TOKEN_ID: ${BAO_DEV_ROOT_TOKEN:-dev-only-token}
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      BAO_ADDR: "http://127.0.0.1:8200"
    command: server -dev
    volumes:
      - openbao_data:/bao/data
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - marty-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  openbao-init:
    image: quay.io/openbao/openbao:2
    container_name: marty-openbao-init
    entrypoint: ["/bin/sh", "/scripts/openbao-init.sh"]
    environment:
      BAO_ADDR: "http://openbao:8200"
      BAO_TOKEN: ${BAO_DEV_ROOT_TOKEN:-dev-only-token}
    depends_on:
      openbao:
        condition: service_healthy
    volumes:
      - ./docker/openbao-init.sh:/scripts/openbao-init.sh:ro
    restart: "no"
    networks:
      - marty-network

  # ==========================================================================
  # Database Migrations
  # ==========================================================================
  db-migrate:
    build:
      context: .
      dockerfile: services/Dockerfile.migrations
    container_name: marty-db-migrate
    environment:
      MARTY_DB_PASSWORD: ${MARTY_DB_PASSWORD:-marty_dev_password}
      DATABASE_URL: postgresql://marty:${MARTY_DB_PASSWORD:-marty_dev_password}@postgres:5432/marty
      MARTY_ORG_ID: ${MARTY_ORG_ID:-00000000-0000-0000-0000-000000000001}
      MARTY_ORG_SLUG: ${MARTY_ORG_SLUG:-marty}
      MARTY_ORG_ADMIN_EMAIL: ${MARTY_ORG_ADMIN_EMAIL:-}
      MARTY_ORG_REVIEWER_EMAIL: ${MARTY_ORG_REVIEWER_EMAIL:-reviewer@marty.demo}
      MARTY_MIGRATION_PROFILE: ${MARTY_MIGRATION_PROFILE:-dev}
      MARTY_USE_EXPLICIT_DEMO_SEED_PACK: ${MARTY_USE_EXPLICIT_DEMO_SEED_PACK:-false}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
      ISSUER_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8000}
      REDIS_URL: redis://redis:6379
      REDIS_DB_GATEWAY: "2"
      MARTY_KMS_BOOTSTRAP_ENABLED: ${MARTY_KMS_BOOTSTRAP_ENABLED:-true}
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: ${BAO_DEV_ROOT_TOKEN:-dev-only-token}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      openbao:
        condition: service_healthy
    restart: "no"
    networks:
      - marty-network

  # The issuance service and its Alembic history are released by
  # marty-credentials, not by the Marty UI migration image. Run that exact
  # released image as a one-shot migration before starting either issuance
  # process so the deployed schema cannot drift from the service artifact.
  issuance-migrations:
    image: ${MARTY_ISSUANCE_IMAGE:?set MARTY_ISSUANCE_IMAGE to an immutable issuance image digest}
    container_name: marty-issuance-migrations
    command: ["python", "manage_migrations.py", "upgrade"]
    environment:
      DATABASE_URL: postgresql+asyncpg://marty:${MARTY_DB_PASSWORD:-marty_dev_password}@postgres:5432/marty
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      disable: true
    restart: "no"
    networks:
      - marty-network

  # ==========================================================================
  # Application Services
  # ==========================================================================
  gateway:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: gateway
    container_name: marty-gateway
    environment:
      GATEWAY_PORT: "8000"
      AUTH_SERVICE_URL: http://auth:8001
      ORGANIZATION_SERVICE_URL: http://organization:8002
      CREDENTIAL_TEMPLATE_SERVICE_URL: http://credential-template:8003
      TRUST_PROFILE_SERVICE_URL: http://trust-profile:8004
      APPLICANT_SERVICE_URL: http://applicant:8006
      NOTIFICATION_SERVICE_URL: http://notification:8007
      COMPLIANCE_PROFILE_SERVICE_URL: http://compliance-profile:8008
      PRESENTATION_POLICY_SERVICE_URL: http://presentation-policy:8009
      DEPLOYMENT_PROFILE_SERVICE_URL: http://deployment-profile:8010
      FLOW_SERVICE_URL: http://flow:8011
      DEVICE_REGISTRATION_SERVICE_URL: http://device-registration:8014
      ISSUANCE_SERVICE_URL: http://issuance:8005
      REVOCATION_PROFILE_SERVICE_URL: http://revocation-profile:8013
      ISSUER_BASE_URL: ${PUBLIC_API_URL:-http://gateway:8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      AUTH_GRPC_TARGET: auth:9001
      ORG_GRPC_TARGET: organization:9002
      ES_GRPC_TARGET: event-stream:9015
      REDIS_URL: redis://redis:6379
      REDIS_DB_GATEWAY: "2"
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-0}
      MARTY_RELEASE_VERSION: ${MARTY_RELEASE_VERSION:-development}
      MARTY_UI_SHA: ${MARTY_UI_SHA:-unknown}
      ELEVENID_STACK_VERSION: ${ELEVENID_STACK_VERSION:-development}
      ELEVENID_IMAGE_DIGESTS_JSON: ${ELEVENID_IMAGE_DIGESTS_JSON:-}
      ISSUANCE_API_KEY: ${ISSUANCE_API_KEY:-dev-issuance-api-key}
      SIGNING_KEYS_INTERNAL_API_KEY: ${SIGNING_KEYS_INTERNAL_API_KEY:-dev-signing-keys-internal-api-key}
      MARTY_ORG_ID: ${MARTY_ORG_ID:-00000000-0000-0000-0000-000000000001}
      OID4VP_ISSUER_PROFILE_ID: ${OID4VP_ISSUER_PROFILE_ID:-ip-marty-oid4vp-verifier}
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: ${BAO_DEV_ROOT_TOKEN:-dev-only-token}
      HSM_PROVIDER: openbao
      SIGNING_KEY_SOURCE: openbao-transit
    ports:
      - "${GATEWAY_HOST_PORT:-8000}:8000"
    depends_on:
      auth:
        condition: service_healthy
      organization:
        condition: service_healthy
      credential-template:
        condition: service_healthy
      trust-profile:
        condition: service_healthy
      applicant:
        condition: service_healthy
      notification:
        condition: service_healthy
      compliance-profile:
        condition: service_healthy
      presentation-policy:
        condition: service_healthy
      deployment-profile:
        condition: service_healthy
      flow:
        condition: service_healthy
      verification:
        condition: service_healthy
      revocation-profile:
        condition: service_healthy
      issuance:
        condition: service_healthy
      event-stream:
        condition: service_healthy
      openbao-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: auth
    container_name: marty-auth
    environment:
      AUTH_SERVICE_PORT: "8001"
      UI_BASE_URL: ${UI_BASE_URL:-http://localhost:3000}
      REDIS_URL: redis://redis:6379/0
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-11id}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL_INTERNAL:-http://keycloak:8080/realms/${KEYCLOAK_REALM:-11id}}
      OIDC_EXTERNAL_ISSUER_URL: ${OIDC_ISSUER_URL_EXTERNAL:-http://localhost:8180/realms/${KEYCLOAK_REALM:-11id}}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-marty-ui}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-http://localhost:3000/v1/auth/callback}
      OIDC_POST_LOGOUT_REDIRECT_URI: ${OIDC_POST_LOGOUT_REDIRECT_URI:-http://localhost:3000/}
      SESSION_TTL_SECONDS: "86400"
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      KEYCLOAK_ADMIN_URL: ${KEYCLOAK_ADMIN_URL:-http://keycloak:8080}
      MARTY_API_CLIENT_ID: ${MARTY_API_CLIENT_ID:-marty-api}
      MARTY_API_CLIENT_SECRET: ${MARTY_API_CLIENT_SECRET:-marty-api-secret-change-in-production}
      CREDENTIAL_LOGIN_POLICY_ID: ${CREDENTIAL_LOGIN_POLICY_ID:-}
      CREDENTIAL_LOGIN_REQUIRE_EXISTING_KEYCLOAK_USER: ${CREDENTIAL_LOGIN_REQUIRE_EXISTING_KEYCLOAK_USER:-false}
      CREDENTIAL_LOGIN_CREATE_USERS: ${CREDENTIAL_LOGIN_CREATE_USERS:-false}
      KEYCLOAK_TOKEN_EXCHANGE_ENABLED: ${KEYCLOAK_TOKEN_EXCHANGE_ENABLED:-false}
      AUTH_SERVICE_INTERNAL_URL: ${AUTH_SERVICE_INTERNAL_URL:-http://auth:8001}
      ISSUANCE_SERVICE_URL: ${ISSUANCE_SERVICE_URL:-http://issuance:8005}
      CREDENTIAL_LOGIN_LISSI_DEEP_LINK_TEMPLATE: ${CREDENTIAL_LOGIN_LISSI_DEEP_LINK_TEMPLATE:-}
      CREDENTIAL_LOGIN_LISSI_ANDROID_DEEP_LINK_TEMPLATE: ${CREDENTIAL_LOGIN_LISSI_ANDROID_DEEP_LINK_TEMPLATE:-}
      CREDENTIAL_LOGIN_LISSI_IOS_DEEP_LINK_TEMPLATE: ${CREDENTIAL_LOGIN_LISSI_IOS_DEEP_LINK_TEMPLATE:-}
      CREDENTIAL_LOGIN_LISSI_IOS_UNIVERSAL_LINK_TEMPLATE: ${CREDENTIAL_LOGIN_LISSI_IOS_UNIVERSAL_LINK_TEMPLATE:-}
      CREDENTIAL_LOGIN_LISSI_ANDROID_PACKAGE: ${CREDENTIAL_LOGIN_LISSI_ANDROID_PACKAGE:-}
      CREDENTIAL_LOGIN_SPRUCEKIT_DEEP_LINK_TEMPLATE: ${CREDENTIAL_LOGIN_SPRUCEKIT_DEEP_LINK_TEMPLATE:-}
      CREDENTIAL_LOGIN_SPRUCEKIT_ANDROID_DEEP_LINK_TEMPLATE: ${CREDENTIAL_LOGIN_SPRUCEKIT_ANDROID_DEEP_LINK_TEMPLATE:-}
      CREDENTIAL_LOGIN_SPRUCEKIT_IOS_DEEP_LINK_TEMPLATE: ${CREDENTIAL_LOGIN_SPRUCEKIT_IOS_DEEP_LINK_TEMPLATE:-}
      CREDENTIAL_LOGIN_SPRUCEKIT_IOS_UNIVERSAL_LINK_TEMPLATE: ${CREDENTIAL_LOGIN_SPRUCEKIT_IOS_UNIVERSAL_LINK_TEMPLATE:-}
      CREDENTIAL_LOGIN_SPRUCEKIT_ANDROID_PACKAGE: ${CREDENTIAL_LOGIN_SPRUCEKIT_ANDROID_PACKAGE:-}
      MARTY_ORG_ID: ${MARTY_ORG_ID:-00000000-0000-0000-0000-000000000001}
      ORG_GRPC_TARGET: organization:9002
      FLOW_GRPC_TARGET: flow:9011
      AUTH_GRPC_PORT: "9001"
    ports:
      - "8001:8001"
      - "${AUTH_GRPC_HOST_PORT:-9001}:9001"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      flow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  organization:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: organization
    container_name: marty-organization
    environment:
      ORGANIZATION_SERVICE_PORT: "8002"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      REDIS_URL: redis://redis:6379
      REDIS_DB_GATEWAY: "2"
      ORG_GRPC_PORT: "9002"
      MARTY_ORG_ID: ${MARTY_ORG_ID:-00000000-0000-0000-0000-000000000001}
      MARTY_ORG_ADMIN_EMAIL: ${MARTY_ORG_ADMIN_EMAIL:-}
      MARTY_ORG_REVIEWER_EMAIL: ${MARTY_ORG_REVIEWER_EMAIL:-reviewer@marty.demo}
    ports:
      - "8002:8002"
      - "9002:9002"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  credential-template:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: credential-template
    container_name: marty-credential-template
    environment:
      CREDENTIAL_TEMPLATE_SERVICE_PORT: "8003"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
      RP_GRPC_TARGET: revocation-profile:9013
      SIGNING_KEYS_INTERNAL_URL: http://gateway:8000/internal/signing-keys
      SIGNING_KEYS_INTERNAL_API_KEY: ${SIGNING_KEYS_INTERNAL_API_KEY:-dev-signing-keys-internal-api-key}
      CT_GRPC_PORT: "9003"
    ports:
      - "8003:8003"
      - "9003:9003"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      revocation-profile:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  trust-profile:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: trust-profile
    container_name: marty-trust-profile
    environment:
      TRUST_PROFILE_SERVICE_PORT: "8004"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
      # OpenBao KMS for certificate operations
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: ${BAO_DEV_ROOT_TOKEN:-dev-only-token}
    ports:
      - "8004:8004"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  applicant:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: applicant
    container_name: marty-applicant
    environment:
      APPLICANT_SERVICE_PORT: "8006"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      APPLICANT_DATA_FILE: /app/data/applicant_store.json
      ISSUANCE_SERVICE_URL: http://issuance:8005
      ISSUANCE_API_KEY: ${ISSUANCE_API_KEY:-dev-issuance-api-key}
      APPLICATION_TEMPLATE_MIGRATION_MAP: ${APPLICATION_TEMPLATE_MIGRATION_MAP:-}
      ORG_GRPC_TARGET: organization:9002
      FLOW_GRPC_TARGET: flow:9011
    ports:
      - "8006:8006"
    volumes:
      - applicant_data:/app/data
    user: "0:0"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  notification:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: notification
    container_name: marty-notification
    environment:
      NOTIFICATION_SERVICE_PORT: "8007"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      NOTIF_GRPC_PORT: "9007"
    ports:
      - "8007:8007"
      - "9007:9007"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  compliance-profile:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: compliance-profile
    container_name: marty-compliance-profile
    environment:
      COMPLIANCE_PROFILE_SERVICE_PORT: "8008"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
    ports:
      - "8008:8008"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  presentation-policy:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: presentation-policy
    container_name: marty-presentation-policy
    environment:
      PRESENTATION_POLICY_SERVICE_PORT: "8009"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
      PP_GRPC_PORT: "9009"
      DID_RESOLUTION_BASE_URL: http://gateway:8000
      TRUST_PROFILE_SERVICE_URL: http://trust-profile:8004
      ISSUANCE_SERVICE_URL: http://issuance:8005
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
      PUBLIC_BASE_URL: ${PUBLIC_API_URL:-http://gateway:8000}
      ISSUER_BASE_URL: ${PUBLIC_API_URL:-http://gateway:8000}
      MARTY_ORG_SLUG: ${MARTY_ORG_SLUG:-marty}
    ports:
      - "8009:8009"
      - "9009:9009"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  deployment-profile:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: deployment-profile
    container_name: marty-deployment-profile
    environment:
      DEPLOYMENT_PROFILE_SERVICE_PORT: "8010"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
    ports:
      - "8010:8010"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  flow:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: flow
    container_name: marty-flow
    environment:
      FLOW_SERVICE_PORT: "8011"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      PUBLIC_BASE_URL: ${PUBLIC_API_URL:-http://gateway:8000}
      ORG_GRPC_TARGET: organization:9002
      PP_GRPC_TARGET: presentation-policy:9009
      CT_GRPC_TARGET: credential-template:9003
      ISSUANCE_GRPC_TARGET: issuance:9005
      ISSUANCE_SERVICE_URL: http://issuance:8005
      ISSUANCE_API_KEY: ${ISSUANCE_API_KEY:-dev-issuance-api-key}
      MARTY_ORG_ID: ${MARTY_ORG_ID:-00000000-0000-0000-0000-000000000001}
      OID4VP_ISSUER_PROFILE_ID: ${OID4VP_ISSUER_PROFILE_ID:-ip-marty-oid4vp-verifier}
      SIGNING_KEYS_INTERNAL_URL: http://gateway:8000/internal/signing-keys
      SIGNING_KEYS_INTERNAL_API_KEY: ${SIGNING_KEYS_INTERNAL_API_KEY:-dev-signing-keys-internal-api-key}
      ICAO_DOCUMENT_SIGNER_URL: ${ICAO_DOCUMENT_SIGNER_URL:-}
      PHYSICAL_DOCUMENT_ALLOW_SELF_SIGNED: ${PHYSICAL_DOCUMENT_ALLOW_SELF_SIGNED:-false}
      PHYSICAL_DOCUMENT_ARTIFACT_KEY: ${PHYSICAL_DOCUMENT_ARTIFACT_KEY:-}
      PERSONALIZATION_BUREAU_URL: ${PERSONALIZATION_BUREAU_URL:-}
      REDIS_URL: redis://redis:6379
      REDIS_DB_FLOW: "3"
      FLOW_GRPC_PORT: "9011"
    ports:
      - "8011:8011"
      - "9011:9011"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      organization:
        condition: service_healthy
      credential-template:
        condition: service_healthy
      presentation-policy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  issuance:
    image: ${MARTY_ISSUANCE_IMAGE:?set MARTY_ISSUANCE_IMAGE to an immutable issuance image digest}
    container_name: marty-issuance
    environment:
      ISSUANCE_SERVICE_PORT: "8005"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ISSUER_BASE_URL: ${PUBLIC_API_URL:-http://gateway:8000}
      UI_BASE_URL: ${UI_BASE_URL:-http://localhost:3000}
      CANVAS_LTI_EXPERIENCE_BASE_URL: ${CANVAS_LTI_EXPERIENCE_BASE_URL:-}
      CANVAS_OAUTH_COMPLETION_REDIRECT_URL: ${CANVAS_OAUTH_COMPLETION_REDIRECT_URL:-${CANVAS_LTI_EXPERIENCE_BASE_URL:-http://localhost:3000}/console/org/deploy/canvas}
      CANVAS_LTI_TOOL_SIGNING_ORGANIZATION_ID: ${CANVAS_LTI_TOOL_SIGNING_ORGANIZATION_ID:-}
      CANVAS_LTI_TOOL_ISSUER_PROFILE_ID: ${CANVAS_LTI_TOOL_ISSUER_PROFILE_ID:-}
      CANVAS_LTI_TOOL_ISSUER_DID: ${CANVAS_LTI_TOOL_ISSUER_DID:-}
      CANVAS_CREDENTIAL_ISSUER_PROFILE_IDS: ${CANVAS_CREDENTIAL_ISSUER_PROFILE_IDS:-}
      CANVAS_LTI_TOOL_ACTIVE_KID: ${CANVAS_LTI_TOOL_ACTIVE_KID:-}
      CANVAS_LTI_TOOL_PUBLIC_JWKS: ${CANVAS_LTI_TOOL_PUBLIC_JWKS:-}
      CANVAS_PORTABLE_INTEGRATION_ENABLED: ${CANVAS_PORTABLE_INTEGRATION_ENABLED:-false}
      CANVAS_PILOT_ORGANIZATION_IDS: ${CANVAS_PILOT_ORGANIZATION_IDS:-}
      CANVAS_LEGACY_EVENT_INGEST_ENABLED: ${CANVAS_LEGACY_EVENT_INGEST_ENABLED:-false}
      CANVAS_PRIVATE_ORIGIN_ALLOWLIST: ${CANVAS_PRIVATE_ORIGIN_ALLOWLIST:-}
      CANVAS_SELF_MANAGED_ORIGIN_ALLOWLIST: ${CANVAS_SELF_MANAGED_ORIGIN_ALLOWLIST:-}
      CANVAS_BINDING_READINESS_MAX_AGE_SECONDS: ${CANVAS_BINDING_READINESS_MAX_AGE_SECONDS:-900}
      CANVAS_ISSUANCE_EVIDENCE_MAX_AGE_SECONDS: ${CANVAS_ISSUANCE_EVIDENCE_MAX_AGE_SECONDS:-900}
      ISSUANCE_OFFER_TTL_MINUTES: ${ISSUANCE_OFFER_TTL_MINUTES:-10080}
      ISSUANCE_AUTH_SESSION_TTL_MINUTES: ${ISSUANCE_AUTH_SESSION_TTL_MINUTES:-60}
      ORG_GRPC_TARGET: organization:9002
      CT_GRPC_TARGET: credential-template:9003
      RP_GRPC_TARGET: revocation-profile:9013
      CREDENTIAL_TEMPLATE_SERVICE_URL: http://credential-template:8003
      REVOCATION_PROFILE_SERVICE_URL: http://revocation-profile:8013
      ISSUANCE_GRPC_PORT: "9005"
      # OpenBao KMS for credential signing
      BAO_ADDR: http://openbao:8200
      BAO_TOKEN: ${BAO_DEV_ROOT_TOKEN:-dev-only-token}
      ISSUANCE_API_KEY: ${ISSUANCE_API_KEY:-dev-issuance-api-key}
      TOKEN_HMAC_KEY: ${TOKEN_HMAC_KEY:-dev-only-token-hmac-key-change-me}
      ICAO_DOCUMENT_SIGNER_URL: ${ICAO_DOCUMENT_SIGNER_URL:-}
      ICAO_DOCUMENT_SIGNER_API_KEY: ${ICAO_DOCUMENT_SIGNER_API_KEY:-}
      PHYSICAL_DOCUMENT_ALLOW_SELF_SIGNED: ${PHYSICAL_DOCUMENT_ALLOW_SELF_SIGNED:-false}
      PHYSICAL_DOCUMENT_ARTIFACT_KEY: ${PHYSICAL_DOCUMENT_ARTIFACT_KEY:-}
      PERSONALIZATION_BUREAU_URL: ${PERSONALIZATION_BUREAU_URL:-}
      PERSONALIZATION_BUREAU_API_KEY: ${PERSONALIZATION_BUREAU_API_KEY:-}
      PERSONALIZATION_BUREAU_WEBHOOK_SECRET: ${PERSONALIZATION_BUREAU_WEBHOOK_SECRET:-}
      INTEGRATION_SECRET_MASTER_KEY: ${INTEGRATION_SECRET_MASTER_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      SIGNING_KEYS_INTERNAL_URL: http://gateway:8000/internal/signing-keys
      SIGNING_KEYS_INTERNAL_API_KEY: ${SIGNING_KEYS_INTERNAL_API_KEY:-dev-signing-keys-internal-api-key}
      CANVAS_CREDENTIALS_SHARED_SECRET: ${CANVAS_CREDENTIALS_SHARED_SECRET:-}
      CANVAS_CREDENTIALS_SIGNATURE_TOLERANCE_SECONDS: ${CANVAS_CREDENTIALS_SIGNATURE_TOLERANCE_SECONDS:-300}
      CANVAS_CREDENTIALS_PROVIDER: ${CANVAS_CREDENTIALS_PROVIDER:-bridge}
      CANVAS_CREDENTIALS_PUBLISH_URL: ${CANVAS_CREDENTIALS_PUBLISH_URL:-}
      CANVAS_CREDENTIALS_STATUS_SYNC_URL: ${CANVAS_CREDENTIALS_STATUS_SYNC_URL:-}
      CANVAS_CREDENTIALS_API_BASE_URL: ${CANVAS_CREDENTIALS_API_BASE_URL:-https://api.badgr.io}
      CANVAS_CREDENTIALS_API_ORIGIN_ALLOWLIST: ${CANVAS_CREDENTIALS_API_ORIGIN_ALLOWLIST:-}
      CANVAS_CREDENTIALS_API_TOKEN: ${CANVAS_CREDENTIALS_API_TOKEN:-}
      CANVAS_CREDENTIALS_ISSUER_ID: ${CANVAS_CREDENTIALS_ISSUER_ID:-}
      CANVAS_CREDENTIALS_BADGECLASS_ID: ${CANVAS_CREDENTIALS_BADGECLASS_ID:-}
      CANVAS_CREDENTIALS_ASSERTION_SCOPE: ${CANVAS_CREDENTIALS_ASSERTION_SCOPE:-badgeclasses}
      CANVAS_CREDENTIALS_PROVENANCE_BASE_URL: ${CANVAS_CREDENTIALS_PROVENANCE_BASE_URL:-}
      CANVAS_CREDENTIALS_RECIPIENT_HASHED: ${CANVAS_CREDENTIALS_RECIPIENT_HASHED:-true}
      CANVAS_CREDENTIALS_ALLOW_DUPLICATE_AWARDS: ${CANVAS_CREDENTIALS_ALLOW_DUPLICATE_AWARDS:-false}
      CANVAS_LTI_STATE_TTL_MINUTES: ${CANVAS_LTI_STATE_TTL_MINUTES:-10}
      CANVAS_LTI_JWKS_TTL_MINUTES: ${CANVAS_LTI_JWKS_TTL_MINUTES:-1440}
      CANVAS_ALLOW_PRIVATE_BASE_URLS: ${CANVAS_ALLOW_PRIVATE_BASE_URLS:-false}
      CANVAS_ALLOW_HTTP_LOCALHOST_BASE_URLS: ${CANVAS_ALLOW_HTTP_LOCALHOST_BASE_URLS:-false}
      # DIDComm v2 push delivery — optional Universal Resolver for unknown DID methods
      UNIVERSAL_RESOLVER_URL: ${UNIVERSAL_RESOLVER_URL:-}
    ports:
      - "8005:8005"
      - "9005:9005"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      issuance-migrations:
        condition: service_completed_successfully
      openbao-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - marty-network
    restart: unless-stopped

  # Portable Canvas synchronization runs out-of-process. The worker leases
  # PostgreSQL jobs and records a database heartbeat consumed by readiness.
  canvas-sync-worker:
    image: ${MARTY_ISSUANCE_IMAGE:?set MARTY_ISSUANCE_IMAGE to an immutable issuance image digest}
    container_name: marty-canvas-sync-worker
    command: ["python", "-m", "issuance.canvas_worker"]
    environment:
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Repository initialization verifies opaque OAuth/session material.
      # Keep this identical to issuance so the worker can process jobs.
      TOKEN_HMAC_KEY: ${TOKEN_HMAC_KEY:-dev-only-token-hmac-key-change-me}
      INTEGRATION_SECRET_MASTER_KEY: ${INTEGRATION_SECRET_MASTER_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      CREDENTIAL_TEMPLATE_SERVICE_URL: http://credential-template:8003
      REVOCATION_PROFILE_SERVICE_URL: http://revocation-profile:8013
      SIGNING_KEYS_INTERNAL_URL: http://gateway:8000/internal/signing-keys
      SIGNING_KEYS_INTERNAL_API_KEY: ${SIGNING_KEYS_INTERNAL_API_KEY:-dev-signing-keys-internal-api-key}
      CANVAS_LTI_TOOL_SIGNING_ORGANIZATION_ID: ${CANVAS_LTI_TOOL_SIGNING_ORGANIZATION_ID:-}
      CANVAS_LTI_TOOL_ISSUER_PROFILE_ID: ${CANVAS_LTI_TOOL_ISSUER_PROFILE_ID:-}
      CANVAS_LTI_TOOL_ISSUER_DID: ${CANVAS_LTI_TOOL_ISSUER_DID:-}
      CANVAS_CREDENTIAL_ISSUER_PROFILE_IDS: ${CANVAS_CREDENTIAL_ISSUER_PROFILE_IDS:-}
      CANVAS_LTI_TOOL_ACTIVE_KID: ${CANVAS_LTI_TOOL_ACTIVE_KID:-}
      CANVAS_LTI_TOOL_PUBLIC_JWKS: ${CANVAS_LTI_TOOL_PUBLIC_JWKS:-}
      CANVAS_PORTABLE_INTEGRATION_ENABLED: ${CANVAS_PORTABLE_INTEGRATION_ENABLED:-false}
      CANVAS_PILOT_ORGANIZATION_IDS: ${CANVAS_PILOT_ORGANIZATION_IDS:-}
      CANVAS_LEGACY_EVENT_INGEST_ENABLED: ${CANVAS_LEGACY_EVENT_INGEST_ENABLED:-false}
      CANVAS_PRIVATE_ORIGIN_ALLOWLIST: ${CANVAS_PRIVATE_ORIGIN_ALLOWLIST:-}
      CANVAS_SELF_MANAGED_ORIGIN_ALLOWLIST: ${CANVAS_SELF_MANAGED_ORIGIN_ALLOWLIST:-}
      CANVAS_BINDING_READINESS_MAX_AGE_SECONDS: ${CANVAS_BINDING_READINESS_MAX_AGE_SECONDS:-900}
      CANVAS_ALLOW_PRIVATE_BASE_URLS: ${CANVAS_ALLOW_PRIVATE_BASE_URLS:-false}
      CANVAS_ALLOW_HTTP_LOCALHOST_BASE_URLS: ${CANVAS_ALLOW_HTTP_LOCALHOST_BASE_URLS:-false}
      CANVAS_BACKGROUND_ROSTER_BATCH_SIZE: ${CANVAS_BACKGROUND_ROSTER_BATCH_SIZE:-500}
      CANVAS_BACKGROUND_ROSTER_MAX_SIZE: ${CANVAS_BACKGROUND_ROSTER_MAX_SIZE:-5000}
      CANVAS_SYNC_PROCESSOR: ${CANVAS_SYNC_PROCESSOR:-issuance.infrastructure.api.canvas_routes:process_authoritative_canvas_sync_target}
      CANVAS_SYNC_WORKER_BATCH_SIZE: ${CANVAS_SYNC_WORKER_BATCH_SIZE:-10}
      CANVAS_SYNC_WORKER_LEASE_SECONDS: ${CANVAS_SYNC_WORKER_LEASE_SECONDS:-120}
      CANVAS_SYNC_WORKER_JOB_TIMEOUT_SECONDS: ${CANVAS_SYNC_WORKER_JOB_TIMEOUT_SECONDS:-600}
      CANVAS_SYNC_SCHEDULE_LIMIT: ${CANVAS_SYNC_SCHEDULE_LIMIT:-100}
      CANVAS_OAUTH_REVOCATION_BATCH_SIZE: ${CANVAS_OAUTH_REVOCATION_BATCH_SIZE:-25}
      CANVAS_SYNC_WORKER_POLL_SECONDS: ${CANVAS_SYNC_WORKER_POLL_SECONDS:-5}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      issuance-migrations:
        condition: service_completed_successfully
    # The shared issuance image has an HTTP health check, while this process
    # is deliberately headless. Its database heartbeat is the health signal.
    healthcheck:
      disable: true
    networks:
      - marty-network
    restart: unless-stopped

  # ── Revocation Profile Service ────────────────────────────────────
  revocation-profile:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: revocation-profile
    container_name: marty-revocation-profile
    environment:
      REVOCATION_PROFILE_SERVICE_PORT: "8013"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      REDIS_URL: redis://redis:6379/4
      ORG_GRPC_TARGET: organization:9002
      RP_GRPC_PORT: "9013"
    ports:
      - "8013:8013"
      - "9013:9013"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  # ── Device Registration Service ─────────────────────────────────
  device-registration:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: device_registration
    container_name: marty-device-registration
    environment:
      DEVICE_REGISTRATION_SERVICE_PORT: "8014"
      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@postgres:5432/marty
      ORG_GRPC_TARGET: organization:9002
    ports:
      - "8014:8014"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8014/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  # ── Event Stream Service (gRPC event bus) ─────────────────────────
  event-stream:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: event_stream
    container_name: marty-event-stream
    environment:
      - EVENT_STREAM_GRPC_ENABLED=true
      - EVENT_STREAM_GRPC_PORT=9015
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
    ports:
      - "8015:8015"
      - "9015:9015"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8015/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - marty-network
    restart: unless-stopped

  # ── Verification Service ─────────────────────────────────────────
  verification:
    build:
      context: .
      dockerfile: services/Dockerfile
      args:
        <<: *marty_service_build_artifacts
        SERVICE_NAME: verification
    container_name: marty-verification
    environment:
      VERIFICATION_SERVICE_PORT: "8012"
      PP_GRPC_TARGET: presentation-policy:9009
      VERIF_GRPC_PORT: "9017"
      VERIF_GRPC_ENABLED: "true"
      PUBLIC_BASE_URL: ${PUBLIC_API_URL:-http://gateway:8000}
      REDIS_URL: redis://redis:6379/3
      SIGNING_KEYS_INTERNAL_URL: http://gateway:8000/internal/signing-keys
      SIGNING_KEYS_INTERNAL_API_KEY: ${SIGNING_KEYS_INTERNAL_API_KEY:-dev-signing-keys-internal-api-key}
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    ports:
      - "8012:8012"
      - "9017:9017"
    depends_on:
      presentation-policy:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - marty-network
    restart: unless-stopped

  # ── Envoy gRPC Proxy ─────────────────────────────────────────────
  envoy:
    build:
      context: ./config/envoy
      dockerfile: Dockerfile
    image: marty-envoy:latest
    container_name: marty-envoy
    volumes:
      - ./config/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - ./config/envoy/proto_descriptor.pb:/etc/envoy/proto_descriptor.pb:ro
    ports:
      - "${ENVOY_HOST_PORT:-9000}:9000"    # gRPC / gRPC-web unified endpoint
      - "${ENVOY_ADMIN_HOST_PORT:-9901}:9901"    # Envoy admin
    depends_on:
      auth:
        condition: service_healthy
      organization:
        condition: service_healthy
      credential-template:
        condition: service_healthy
      issuance:
        condition: service_healthy
      notification:
        condition: service_healthy
      presentation-policy:
        condition: service_healthy
      flow:
        condition: service_healthy
      revocation-profile:
        condition: service_healthy
      device-registration:
        condition: service_healthy
      event-stream:
        condition: service_healthy
      verification:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9901/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - marty-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  applicant_data:
  envoy_proto_descriptor:
  openbao_data:

networks:
  marty-network:
    name: marty-infra-network
