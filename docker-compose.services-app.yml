      DATABASE_URL: postgresql+asyncpg://marty:marty_dev_password@marty-ui-postgres-1:5432/marty
      RABBITMQ_URL: amqp://marty:marty_dev_password@rabbitmq:5672/
    ports:
      - "8009:8009"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
