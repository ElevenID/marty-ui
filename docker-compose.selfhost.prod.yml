  marty_db_password:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/marty_db_password
  keycloak_admin_password:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/keycloak_admin_password
  marty_api_client_secret:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/marty_api_client_secret
  issuance_api_key:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/issuance_api_key
  integration_secret_master_key:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/integration_secret_master_key
  token_hmac_key:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/token_hmac_key
  canvas_credentials_shared_secret:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/canvas_credentials_shared_secret
  openbao_service_token:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/openbao_service_token
  cloudflare_tunnel_token:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/cloudflare_tunnel_token
  cloudflare_beta_tunnel_token:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/cloudflare_beta_tunnel_token
  google_client_id:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/google_client_id
  google_client_secret:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/google_client_secret
  google_analytics_measurement_id:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/google_analytics_measurement_id
  google_site_verification:
    file: ${SELFHOST_SECRET_DIR:?SELFHOST_SECRET_DIR must be set}/google_site_verification
