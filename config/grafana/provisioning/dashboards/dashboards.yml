# Grafana Dashboard Provisioning
#
# Automatically loads dashboards from the specified folder.

apiVersion: 1

providers:
  - name: 'Marty Dashboards'
    orgId: 1
    folder: 'Marty'
    folderUid: 'marty'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
