# ElevenID LLC Keycloak Theme
# Extends the default Keycloak theme with custom styling

parent=keycloak
import=common/keycloak

# Add custom CSS
styles=css/marty.css

# Supported locales
locales=en,de,nl,ja,es,fr

# Credential (SD-JWT / OID4VP) login
# Points to the auth service credential-login endpoint.
# In production / tunnel: use the public gateway path (works as a root-relative
# URL because Keycloak is served from the same origin as the gateway).
# For local dev where Keycloak runs on a different port (8180), override this
# via a local theme.properties or set KC_SPI_THEME_ADMIN_LOGIN_URL env var.
credentialLoginUrl=/v1/auth/credential-login
