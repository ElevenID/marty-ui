# Fluentd Configuration for Marty Observability Stack
#
# This configuration:
# - Receives logs via forward protocol (from Docker or applications)
# - Parses JSON-formatted logs
# - Adds metadata (hostname, container info)
# - Sends to Elasticsearch for storage

# =============================================================================
# Input Sources
# =============================================================================

# Forward input - receives logs from Docker and applications
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# =============================================================================
# Filters & Parsing
# =============================================================================

# Parse JSON logs
<filter **>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field false
  <parse>
    @type json
    json_parser json
  </parse>
</filter>

# Add metadata
<filter **>
  @type record_transformer
  enable_ruby true
  <record>
    hostname ${hostname}
    environment ${ENV['ENVIRONMENT'] || 'development'}
    ingestion_time ${Time.now.iso8601}
  </record>
</filter>

# Extract service name from Docker container name
<filter docker.**>
  @type record_transformer
  enable_ruby true
  <record>
    service ${record.dig("container_name") ? record["container_name"].gsub(/^\//, '') : 'unknown'}
  </record>
</filter>

# =============================================================================
# Output - Elasticsearch
# =============================================================================

<match **>
  @type elasticsearch
  host elasticsearch
  port 9200
  scheme http
  
  # Index naming: marty-logs-YYYY.MM.DD
  logstash_format true
  logstash_prefix marty-logs
  
  # Buffer configuration for reliability
  <buffer>
    @type file
    path /fluentd/buffer/elasticsearch
    flush_mode interval
    flush_interval 5s
    flush_thread_count 2
    retry_type exponential_backoff
    retry_wait 1s
    retry_max_interval 60s
    retry_forever true
    chunk_limit_size 8MB
    queue_limit_length 256
    overflow_action drop_oldest_chunk
  </buffer>
  
  # Connection settings
  reconnect_on_error true
  reload_on_failure true
  reload_connections false
  request_timeout 30s
</match>

# =============================================================================
# Debug Output (development only)
# =============================================================================

# Uncomment to see logs in fluentd container output
# <match **>
#   @type stdout
# </match>
