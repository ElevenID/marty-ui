# Prometheus Configuration for Marty Observability Stack
#
# This configuration scrapes metrics from:
# - Prometheus itself
# - The OID4VC API service
# - Keycloak (if metrics enabled)
# - Redis exporter (if available)
# - Any service with Prometheus annotations

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  
  # Attach these labels to all metrics
  external_labels:
    environment: 'development'
    project: 'marty'

# Alerting configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Rule files for recording rules and alerts
# rule_files:
#   - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # OID4VC API service
  - job_name: 'oid4vc-api'
    static_configs:
      - targets: ['oid4vc-api:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Keycloak metrics (if enabled with KC_METRICS_ENABLED=true)
  - job_name: 'keycloak'
    static_configs:
      - targets: ['keycloak:8080']
    metrics_path: /metrics
    scrape_interval: 30s

  # Redis metrics (if redis-exporter is deployed)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # PostgreSQL metrics (if postgres-exporter is deployed)
  # - job_name: 'postgresql'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Docker containers (if cadvisor is deployed)
  # - job_name: 'cadvisor'
  #   static_configs:
  #     - targets: ['cadvisor:8080']

  # Node exporter (if deployed for host metrics)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
