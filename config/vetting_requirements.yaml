# Vetting Configuration Schema
# Defines per-document-type vetting requirements following NIST SP 800-63A and ICAO Annex 9

# Schema version for configuration compatibility
version: "1.0"

# Global vetting settings
global:
  # Default Identity Assurance Level (IAL1, IAL2, IAL3)
  default_assurance_level: IAL2
  
  # Maximum time for application to remain in pending state (days)
  application_timeout_days: 90
  
  # Enable audit logging for all vetting operations
  audit_enabled: true
  
  # Biometric quality thresholds
  biometric_quality:
    facial_min_score: 0.8
    fingerprint_min_score: 0.85
    iris_min_score: 0.9
  
  # Retry limits for failed checks
  check_retry_limits:
    identity_verification: 3
    biometric_enrollment: 2
    criminal_history: 1
    document_verification: 2

# Document type configurations
document_types:
  PASSPORT:
    description: "Standard passport application"
    assurance_level: IAL2
    expedited_available: true
    validity_years: [5, 10]
    
    # Required vetting checks in order
    vetting_checks:
      - type: IDENTITY_VERIFICATION
        required: true
        order: 1
        description: "Verify applicant identity through documents"
        config:
          min_documents: 2
          require_photo_id: true
          acceptable_documents:
            - type: DRIVERS_LICENSE
              weight: 100
            - type: STATE_ID
              weight: 100
            - type: MILITARY_ID
              weight: 100
            - type: BIRTH_CERTIFICATE
              weight: 50
            - type: SOCIAL_SECURITY_CARD
              weight: 25
          minimum_weight: 150
          
      - type: BIOMETRIC_ENROLLMENT
        required: true
        order: 2
        description: "Capture and verify biometric data"
        config:
          types:
            - FACIAL
            - FINGERPRINT
          live_capture: true
          facial_requirements:
            min_quality_score: 0.8
            require_liveness_check: true
            max_age_days: 30
          fingerprint_requirements:
            min_fingers: 2
            preferred_fingers: [RIGHT_INDEX, RIGHT_THUMB, LEFT_INDEX]
            min_quality_score: 0.85
            
      - type: CRIMINAL_HISTORY
        required: true
        order: 3
        description: "Background check for criminal history"
        config:
          scope: national
          lookback_years: 10
          databases:
            - FBI_NICS
            - STATE_RECORDS
          disqualifying_offenses:
            - category: FELONY
              lookback_years: 10
            - category: TERRORISM
              lookback_years: -1  # No expiration
            - category: IDENTITY_FRAUD
              lookback_years: -1
              
      - type: DOCUMENT_VERIFICATION
        required: true
        order: 4
        description: "Verify supporting documents"
        config:
          verify_birth_certificate: true
          verify_citizenship: true
          require_citizenship_proof:
            - BIRTH_CERTIFICATE
            - NATURALIZATION_CERTIFICATE
            - CERTIFICATE_OF_CITIZENSHIP
            - CONSULAR_REPORT_OF_BIRTH

  PASSPORT_RENEWAL:
    description: "Passport renewal application"
    assurance_level: IAL1
    expedited_available: true
    validity_years: [5, 10]
    requires_previous_document: true
    
    vetting_checks:
      - type: IDENTITY_VERIFICATION
        required: true
        order: 1
        config:
          min_documents: 1
          require_previous_passport: true
          max_previous_passport_expiry_years: 15
          
      - type: BIOMETRIC_ENROLLMENT
        required: true
        order: 2
        config:
          types:
            - FACIAL
          live_capture: true
          compare_to_previous: true
          similarity_threshold: 0.85
          
      - type: DOCUMENT_VERIFICATION
        required: true
        order: 3
        config:
          verify_previous_passport: true

  VISA:
    description: "Visa application"
    assurance_level: IAL2
    expedited_available: true
    validity_years: [1, 5, 10]
    
    vetting_checks:
      - type: IDENTITY_VERIFICATION
        required: true
        order: 1
        config:
          min_documents: 2
          require_photo_id: true
          require_passport: true
          
      - type: BIOMETRIC_ENROLLMENT
        required: true
        order: 2
        config:
          types:
            - FACIAL
            - FINGERPRINT
          live_capture: true
          
      - type: CRIMINAL_HISTORY
        required: true
        order: 3
        config:
          scope: international
          lookback_years: 10
          include_interpol: true
          
      - type: SECURITY_CLEARANCE
        required: true
        order: 4
        config:
          level: basic
          watchlist_check: true
          databases:
            - TSC
            - OFAC
            - INTERPOL
            
      - type: FINANCIAL_CHECK
        required: false
        order: 5
        description: "Verify sufficient funds for travel"
        config:
          verify_funds: true
          min_funds_usd: 1000
          acceptable_proof:
            - BANK_STATEMENT
            - SPONSOR_LETTER
            - EMPLOYMENT_LETTER

  TRAVEL_PERMIT:
    description: "Travel permit for restricted travel"
    assurance_level: IAL1
    expedited_available: false
    validity_years: [1, 2]
    
    vetting_checks:
      - type: IDENTITY_VERIFICATION
        required: true
        order: 1
        config:
          min_documents: 1
          require_photo_id: true
          
      - type: BIOMETRIC_ENROLLMENT
        required: true
        order: 2
        config:
          types:
            - FACIAL
          live_capture: true
          
      - type: DOCUMENT_VERIFICATION
        required: true
        order: 3
        config:
          verify_existing_passport: true

  DIPLOMATIC_CREDENTIAL:
    description: "Diplomatic passport or credential"
    assurance_level: IAL3
    expedited_available: true
    validity_years: [5]
    requires_sponsorship: true
    
    vetting_checks:
      - type: IDENTITY_VERIFICATION
        required: true
        order: 1
        config:
          min_documents: 3
          require_photo_id: true
          require_government_verification: true
          
      - type: BIOMETRIC_ENROLLMENT
        required: true
        order: 2
        config:
          types:
            - FACIAL
            - FINGERPRINT
            - IRIS
          live_capture: true
          supervised_capture: true
          
      - type: CRIMINAL_HISTORY
        required: true
        order: 3
        config:
          scope: international
          lookback_years: 20
          comprehensive_check: true
          
      - type: SECURITY_CLEARANCE
        required: true
        order: 4
        config:
          level: secret
          government_sponsor_required: true
          
      - type: EMPLOYMENT_VERIFICATION
        required: true
        order: 5
        config:
          verify_government_employment: true
          verify_diplomatic_status: true

  EMERGENCY_TRAVEL_DOCUMENT:
    description: "Emergency travel document for urgent situations"
    assurance_level: IAL1
    expedited_available: false  # Always expedited
    validity_years: [1]
    processing_hours: 24
    
    vetting_checks:
      - type: IDENTITY_VERIFICATION
        required: true
        order: 1
        config:
          min_documents: 1
          emergency_mode: true
          
      - type: BIOMETRIC_ENROLLMENT
        required: true
        order: 2
        config:
          types:
            - FACIAL
          live_capture: true
          emergency_quality_threshold: 0.7

# Approval workflow configurations
approval_workflows:
  standard:
    description: "Standard approval workflow"
    steps:
      - role: VETTING_OFFICER
        action: REVIEW
        required: true
      - role: APPROVING_AUTHORITY
        action: APPROVE
        required: true
        
  expedited:
    description: "Expedited approval workflow"
    steps:
      - role: SENIOR_VETTING_OFFICER
        action: REVIEW_AND_APPROVE
        required: true
        
  diplomatic:
    description: "Diplomatic credential approval workflow"
    steps:
      - role: VETTING_OFFICER
        action: REVIEW
        required: true
      - role: SECURITY_OFFICER
        action: SECURITY_REVIEW
        required: true
      - role: DIPLOMATIC_AFFAIRS_OFFICER
        action: APPROVE
        required: true

# Data retention policies (aligned with ICAO Annex 9)
data_retention:
  # Default retention for application data
  application_records:
    active_application: indefinite
    approved_application: 10_years
    rejected_application: 5_years
    withdrawn_application: 1_year
    
  # Biometric data retention
  biometric_data:
    template_data: 10_years
    image_data: 5_years
    verification_logs: 2_years
    
  # Document images
  kyc_documents:
    identity_documents: 10_years
    supporting_documents: 5_years
    
  # Audit logs (extended retention for compliance)
  audit_logs:
    standard: 7_years
    security_events: 10_years
    
  # Archive settings
  archive:
    enabled: true
    archive_after_days: 365
    archive_storage: S3_GLACIER
    
  # Purge settings
  purge:
    enabled: true
    require_approval: true
    approver_role: DATA_PROTECTION_OFFICER

# Integration endpoints for external verification services
integrations:
  biometric_service:
    enabled: true
    endpoint: "${BIOMETRIC_SERVICE_URL}"
    timeout_seconds: 30
    
  criminal_history:
    enabled: true
    provider: FBI_NICS
    endpoint: "${CRIMINAL_CHECK_URL}"
    timeout_seconds: 60
    
  watchlist:
    enabled: true
    provider: TSC
    endpoint: "${WATCHLIST_CHECK_URL}"
    timeout_seconds: 45
    
  document_verification:
    enabled: true
    provider: INTERNAL
    use_ocr: true
    use_mrz_validation: true
