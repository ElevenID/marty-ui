# EUDI Reference Implementation interoperability profile.
#
# This profile deliberately uses only digest-pinned upstream images. The EUDI
# verifier needs an access-certificate chain to sign request objects; provide
# it from the disposable test environment rather than committing a keystore.

services:
  eudi-wallet-tester:
    profiles: [eudi]
    image: ghcr.io/eu-digital-identity-wallet/eudi-app-web-wallet-tester-py@sha256:d2978c7a9bb29b00f8c202d054b8a9a4ec8e9addf2e16314f3ed06426aef19be
    environment:
      FLASK_RUN_PORT: "5000"
      # The real EUDI wallet tester resolves Marty issuer metadata from here.
      serv_url: ${OIDF_PUBLIC_BASE_URL:?set OIDF_PUBLIC_BASE_URL to the HTTPS Marty URL}
      service_url: ${EUDI_WALLET_TESTER_PUBLIC_URL:?set EUDI_WALLET_TESTER_PUBLIC_URL to the HTTPS wallet-tester URL}
    ports:
      - "${EUDI_WALLET_TESTER_HOST_PORT:-25050}:5000"
    networks: [marty-network]
    restart: "no"

  eudi-wallet-tester-tls:
    profiles: [eudi]
    image: nginx@sha256:679a5fd058f6ca754a561846fe27927e408074431d63556e8fc588fc38be6901
    ports:
      - "${EUDI_WALLET_TESTER_TLS_HOST_PORT:-25051}:443"
    volumes:
      - ./services/eudi-wallet-tester-tls/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${OIDF_TLS_CERT_DIR:?set OIDF_TLS_CERT_DIR to the EUDI wallet tester certificate directory}:/etc/nginx/certs:ro
    depends_on:
      eudi-wallet-tester:
        condition: service_started
    networks: [marty-network]
    restart: "no"

  eudi-verifier:
    profiles: [eudi]
    image: ghcr.io/eu-digital-identity-wallet/eudi-srv-verifier-endpoint@sha256:0687ad0bf9c315d64d7cdae1751c8795c2410848f2299adeaaf1c39305366711
    environment:
      SERVER_PORT: "8080"
      VERIFIER_PUBLICURL: ${EUDI_VERIFIER_PUBLIC_URL:?set EUDI_VERIFIER_PUBLIC_URL to the EUDI verifier HTTPS URL}
      VERIFIER_REQUESTJWT_EMBED: "ByReference"
      VERIFIER_DEFEAULTHTTPRESPONSEMODE: "DirectPost"
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE: file:///certs/keystore.jks
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE_TYPE: ${EUDI_VERIFIER_KEYSTORE_TYPE:-jks}
      VERIFIER_ACCESS_CERTIFICATE_KEYSTORE_PASSWORD: ${EUDI_VERIFIER_KEYSTORE_PASSWORD:?set EUDI_VERIFIER_KEYSTORE_PASSWORD}
      VERIFIER_ACCESS_CERTIFICATE_ALIAS: ${EUDI_VERIFIER_KEYSTORE_ALIAS:?set EUDI_VERIFIER_KEYSTORE_ALIAS}
      VERIFIER_ACCESS_CERTIFICATE_PASSWORD: ${EUDI_VERIFIER_KEY_PASSWORD:?set EUDI_VERIFIER_KEY_PASSWORD}
    volumes:
      - ${EUDI_VERIFIER_KEYSTORE_FILE:?set EUDI_VERIFIER_KEYSTORE_FILE}:/certs/keystore.jks:ro
    networks: [marty-network]
    restart: "no"

  # The upstream verifier puts its public URL in its signed request object.
  # Terminate TLS here so that URL is actually reachable over the declared
  # HTTPS scheme while the upstream container stays private on the test
  # network.
  eudi-verifier-tls:
    profiles: [eudi]
    image: nginx@sha256:679a5fd058f6ca754a561846fe27927e408074431d63556e8fc588fc38be6901
    ports:
      - "${EUDI_VERIFIER_TLS_HOST_PORT:-28091}:443"
    volumes:
      - ./services/eudi-verifier-tls/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${OIDF_TLS_CERT_DIR:?set OIDF_TLS_CERT_DIR to the EUDI verifier certificate directory}:/etc/nginx/certs:ro
    depends_on:
      eudi-verifier:
        condition: service_started
    networks: [marty-network]
    restart: "no"
