# Isolated HAIP verifier overlay for the OIDF conformance deployment.
#
# The certificate is public material for the issuer profile's KMS-backed key.
# No private signing key is accepted by this overlay or the flow service.
services:
  flow:
    environment:
      OID4VP_HAIP_ENABLED: "1"
      OID4VP_CLIENT_ID_PREFIX: "x509_hash"
      VERIFIER_X509_CERT_PEM: ${VERIFIER_X509_CERT_PEM:?set the certificate for the OID4VP issuer profile}
