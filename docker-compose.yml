# Marty Development & Testing Environment
# =========================================
#
# Unified Docker Compose with profile-based service selection.
#
# QUICK START:
#   make dev          # Start development environment
#   make test         # Run E2E tests (Playwright + wallet-simulator)
#   make test-local   # Run fast Chromium-only tests
#   make pytest       # Run Python unit/integration tests
#
# PROFILES:
#   dev        - Core services for local development (default)
#   test       - E2E tests with full browser matrix
#   test-local - Fast Chromium-only E2E tests
#   pytest     - Python unit/integration tests
#
# MANUAL USAGE:
#   docker compose --profile dev up -d
#   docker compose --profile test up playwright --exit-code-from playwright
#   docker compose --profile test-local up playwright-local --exit-code-from playwright-local
#   docker compose --profile pytest up pytest --exit-code-from pytest

# =============================================================================
# YAML Anchors for DRY Configuration
# =============================================================================
x-test-env: &test-env
  CI: "true"
  PW_FAST: ${PW_FAST:-}
  TEST_PROVIDER: mailhog
  MAILHOG_URL: http://mailhog:8025
  # Browser-accessible URLs - use Docker service names since browser runs in container
  BASE_URL: http://ui-test:80
  API_URL: http://oid4vc-api-test:8000
  KEYCLOAK_URL: http://keycloak:8080
  OIDC_ISSUER_URL: http://keycloak:8080/realms/marty
  WALLET_URL: http://wallet:80

x-keycloak-env: &keycloak-env
  KEYCLOAK_ADMIN: admin
  KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
  KC_DB: postgres
  KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
  KC_DB_USERNAME: keycloak
  KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
  KC_HEALTH_ENABLED: "true"
  KC_METRICS_ENABLED: "true"
  # Hostname configuration - ensures tokens have consistent issuer
  # Use localhost for dev (browser on host), keycloak for test (browser in Docker)
  KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
  KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT:-8180}
  KC_HOSTNAME_STRICT: "false"
  KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
  KC_HTTP_ENABLED: "true"
  # SMTP (MailHog)
  KC_SPI_EMAIL_SENDER: default
  KC_SPI_EMAIL_SENDER_DEFAULT_HOST: mailhog
  KC_SPI_EMAIL_SENDER_DEFAULT_PORT: "1025"
  KC_SPI_EMAIL_SENDER_DEFAULT_FROM: noreply@elevenid.demo
  KC_SPI_EMAIL_SENDER_DEFAULT_FROM_DISPLAY_NAME: ElevenID
  # Demo users
  DEMO_ADMIN_EMAIL: ${DEMO_ADMIN_EMAIL:-admin@elevenid.demo}
  DEMO_ADMIN_FIRST_NAME: ${DEMO_ADMIN_FIRST_NAME:-Admin}
  DEMO_ADMIN_LAST_NAME: ${DEMO_ADMIN_LAST_NAME:-User}
  DEMO_ADMIN_PASSWORD: ${DEMO_ADMIN_PASSWORD:-Admin123!}
  DEMO_VENDOR_EMAIL: ${DEMO_VENDOR_EMAIL:-vendor@elevenid.demo}
  DEMO_VENDOR_FIRST_NAME: ${DEMO_VENDOR_FIRST_NAME:-Vendor}
  DEMO_VENDOR_LAST_NAME: ${DEMO_VENDOR_LAST_NAME:-Admin}
  DEMO_VENDOR_PASSWORD: ${DEMO_VENDOR_PASSWORD:-Vendor123!}
  DEMO_APPLICANT_PASSWORD: ${DEMO_APPLICANT_PASSWORD:-Applicant123!}
  DEMO_APPLICANT1_EMAIL: ${DEMO_APPLICANT1_EMAIL:-john.doe@elevenid.demo}
  DEMO_APPLICANT1_FIRST_NAME: ${DEMO_APPLICANT1_FIRST_NAME:-John}
  DEMO_APPLICANT1_LAST_NAME: ${DEMO_APPLICANT1_LAST_NAME:-Doe}
  DEMO_APPLICANT1_NATIONALITY: ${DEMO_APPLICANT1_NATIONALITY:-USA}
  DEMO_APPLICANT1_DOB: ${DEMO_APPLICANT1_DOB:-1985-03-15}
  DEMO_APPLICANT2_EMAIL: ${DEMO_APPLICANT2_EMAIL:-jane.smith@elevenid.demo}
  DEMO_APPLICANT2_FIRST_NAME: ${DEMO_APPLICANT2_FIRST_NAME:-Jane}
  DEMO_APPLICANT2_LAST_NAME: ${DEMO_APPLICANT2_LAST_NAME:-Smith}
  DEMO_APPLICANT2_NATIONALITY: ${DEMO_APPLICANT2_NATIONALITY:-GBR}
  DEMO_APPLICANT2_DOB: ${DEMO_APPLICANT2_DOB:-1990-07-22}
  DEMO_APPLICANT3_EMAIL: ${DEMO_APPLICANT3_EMAIL:-carlos.garcia@elevenid.demo}
  DEMO_APPLICANT3_FIRST_NAME: ${DEMO_APPLICANT3_FIRST_NAME:-Carlos}
  DEMO_APPLICANT3_LAST_NAME: ${DEMO_APPLICANT3_LAST_NAME:-Garcia}
  DEMO_APPLICANT3_NATIONALITY: ${DEMO_APPLICANT3_NATIONALITY:-ESP}
  DEMO_APPLICANT3_DOB: ${DEMO_APPLICANT3_DOB:-1978-11-08}

# =============================================================================
# Services
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # Document Signer gRPC Service
  # Provides OID4VCI credential issuance (SD-JWT, mDoc)
  # NOTE: Temporarily disabled - Dockerfile needs path fixes
  # ---------------------------------------------------------------------------
  # document-signer:
  #   build:
  #     context: .
  #     dockerfile: src/document_signer/Dockerfile
  #   ports:
  #     - "8082:8082"
  #   environment:
  #     SERVICE_NAME: document-signer
  #     GRPC_PORT: "8082"
  #     PYTHONPATH: /app/src
  #     # Key management
  #     KEY_VAULT_URL: ${KEY_VAULT_URL:-}
  #     # Database
  #     DATABASE_URL: postgresql+asyncpg://marty:marty@postgres:5432/marty_applicants
  #     # Storage
  #     S3_ENDPOINT: ${S3_ENDPOINT:-}
  #     S3_BUCKET: ${S3_BUCKET:-marty-credentials}
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   healthcheck:
  #     test: ["CMD-SHELL", "python -c \"import grpc; ch = grpc.insecure_channel('localhost:8082'); grpc.channel_ready_future(ch).result(timeout=5)\""]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s
  #   profiles:
  #     - dev
  #     - test
  #     - test-local

  # ---------------------------------------------------------------------------
  # Open Badges gRPC Service
  # ---------------------------------------------------------------------------
  open-badges:
    build:
      context: .
      dockerfile: docker/mmf-plugin.Dockerfile
    command: ["python", "-m", "apps.open_badges"]
    ports:
      - "8091:8091"
      - "9091:9091"
    environment:
      ENV: development
      MARTY_ENV: development
      GRPC_PORT: "8091"
      SERVICE_NAME: open-badges
      PYTHONPATH: /app/src/marty_plugin/legacy_apps:/app/src
      OPEN_BADGES_TRUST_STORE_PATH: /app/data/trust/open_badges/trust_store.json
    volumes:
      - ./data:/app/data
      - ./config:/app/config:ro
    profiles:
      - trust-services

  # ---------------------------------------------------------------------------
  # Core API Service (Development - uses localhost URLs for browser access)
  # ---------------------------------------------------------------------------
  oid4vc-api:
    build:
      context: .
      dockerfile: marty-ui/docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      ADAPTER_MODE: ${ADAPTER_MODE:-spruceid}
      STORAGE_MODE: ${STORAGE_MODE:-memory}
      TEST_MODE: ${TEST_MODE:-false}
      NOTIFICATION_ADAPTER: ${NOTIFICATION_ADAPTER:-sse}
      # Document Signer gRPC connection
      DOCUMENT_SIGNER_HOST: document-signer
      DOCUMENT_SIGNER_PORT: "8082"
      # Authentication - uses localhost for dev (browser on host machine)
      OIDC_ISSUER_URL: http://localhost:8180/realms/marty
      # Backend uses host.docker.internal to match Keycloak's configured issuer
      OIDC_BACKEND_ISSUER_URL: http://host.docker.internal:8180/realms/marty
      OIDC_CLIENT_ID: marty-ui
      OIDC_REDIRECT_URI: http://localhost:3000/auth/callback
      OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3000
      # Redis & Session
      REDIS_URL: redis://redis:6379/0
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-in-production}
      # Cookies
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      # Database
      DATABASE_URL: postgresql+asyncpg://marty:marty@postgres:5432/marty_applicants
      APPLICANT_DB_URL: postgresql+asyncpg://marty:marty@postgres:5432/marty_applicants
      # Status List configuration
      STATUS_LIST_BASE_URL: http://localhost:8000
      STATUS_LIST_MASTER_KEY: wCts0m+wo9280PXWVlsTZDo+H7II05VtdOS91xnSLuU=
    volumes:
      - ./marty-ui/src:/app/src
      - ./marty-microservices-framework:/app/marty-microservices-framework
      - ./src/notifications:/app/notifications
    depends_on:
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      # document-signer:
      #   condition: service_healthy
    # Healthcheck defined in api.Dockerfile
    profiles:
      - dev

  # ---------------------------------------------------------------------------
  # Core API Service (Testing - uses Docker-internal URLs for Playwright browser)
  # ---------------------------------------------------------------------------
  oid4vc-api-test:
    build:
      context: .
      dockerfile: marty-ui/docker/api.Dockerfile
    ports:
      - "8000:8000"
    networks:
      default:
        aliases:
          - oid4vc-api  # Allows other services to reach this as "oid4vc-api"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Enable host.docker.internal on Linux
    environment:
      ADAPTER_MODE: ${ADAPTER_MODE:-spruceid}
      STORAGE_MODE: ${STORAGE_MODE:-memory}
      TEST_MODE: "true"
      NOTIFICATION_ADAPTER: ${NOTIFICATION_ADAPTER:-sse}
      # Document Signer gRPC connection
      DOCUMENT_SIGNER_HOST: document-signer
      DOCUMENT_SIGNER_PORT: "8082"
      # Authentication - browser uses Docker service names (runs in container)
      # OIDC_ISSUER_URL is what gets returned to the browser for OIDC redirects
      OIDC_ISSUER_URL: http://localhost:8180/realms/marty
      # OIDC_BACKEND_ISSUER_URL must match the issuer in tokens (Keycloak's KC_HOSTNAME)
      OIDC_BACKEND_ISSUER_URL: http://host.docker.internal:8180/realms/marty
      OIDC_CLIENT_ID: marty-ui
      # Callback URLs also need to be accessible from browser - use Docker service names
      OIDC_REDIRECT_URI: http://localhost:3000/auth/callback
      OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3000
      # Redis & Session
      REDIS_URL: redis://redis:6379/0
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret-change-in-production}
      # Cookies
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      # Database
      DATABASE_URL: postgresql+asyncpg://marty:marty@postgres:5432/marty_applicants
      APPLICANT_DB_URL: postgresql+asyncpg://marty:marty@postgres:5432/marty_applicants
      STATUS_LIST_MASTER_KEY: wCts0m+wo9280PXWVlsTZDo+H7II05VtdOS91xnSLuU=
    volumes:
      - ./marty-ui/src:/app/src
      - ./marty-microservices-framework:/app/marty-microservices-framework
      - ./src/notifications:/app/notifications
    depends_on:
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    # Healthcheck defined in api.Dockerfile
    profiles:
      - test
      - test-local

  # ---------------------------------------------------------------------------
  # React UI (Development - depends on oid4vc-api)
  # ---------------------------------------------------------------------------
  ui:
    build:
      context: ./marty-ui
      dockerfile: docker/ui.Dockerfile
      args:
        NGINX_CONFIG: nginx.dev.conf
    ports:
      - "9080:80"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_KEYCLOAK_URL: http://localhost:8180
      REACT_APP_KEYCLOAK_REALM: marty
      REACT_APP_KEYCLOAK_CLIENT_ID: marty-ui
    depends_on:
      oid4vc-api:
        condition: service_healthy
    # Healthcheck defined in ui.Dockerfile
    profiles:
      - dev

  # ---------------------------------------------------------------------------
  # React UI (Testing - depends on oid4vc-api-test, no port exposure)
  # ---------------------------------------------------------------------------
  ui-test:
    build:
      context: ./marty-ui
      dockerfile: docker/ui.Dockerfile
      args:
        NGINX_CONFIG: nginx.dev.conf
    ports:
      - "9080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Enable host.docker.internal on Linux
    networks:
      default:
        aliases:
          - ui  # Allows Playwright and wallet-simulator to reach this as "ui"
    environment:
      REACT_APP_API_URL: http://localhost:8000/
      REACT_APP_KEYCLOAK_URL: http://localhost:8180
      REACT_APP_KEYCLOAK_REALM: marty
      REACT_APP_KEYCLOAK_CLIENT_ID: marty-ui
    depends_on:
      oid4vc-api-test:
        condition: service_healthy
    # Healthcheck defined in ui.Dockerfile
    profiles:
      - test
      - test-local

  # ---------------------------------------------------------------------------
  # Marty Authenticator Web Wallet (Development)
  # Serves the Flutter web wallet for E2E testing with SSE push notifications
  # REQUIRES: Flutter build first - run: make build-wallet
  # ---------------------------------------------------------------------------
  wallet:
    image: ghcr.io/anthropic/marty-authenticator:local
    ports:
      - "9081:80"
    volumes:
      - ./marty-ui/docker/wallet-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    stop_grace_period: 0s
    profiles:
      - dev
      - test
      - test-local

  # ---------------------------------------------------------------------------
  # Wallet Simulator (Testing - mock wallet for E2E tests without real wallet)
  # OPTIONAL: Use only if real wallet build is unavailable
  # ---------------------------------------------------------------------------
  wallet-simulator:
    image: nginx:alpine
    volumes:
      - ./marty-ui/tests/wallet-simulator:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    # profiles:
    #   - test
    #   - test-local

  # ---------------------------------------------------------------------------
  # Authentication (Keycloak)
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command:
      - start-dev
      - --import-realm
      - --features=organization
    ports:
      - "8180:8080"
    environment:
      <<: *keycloak-env
      UI_BASE_URL: ${UI_BASE_URL:-http://localhost:3000}
    volumes:
      - ./marty-ui/config/keycloak:/opt/keycloak/data/import:ro
      - ./marty-ui/config/keycloak/themes/marty:/opt/keycloak/themes/marty:ro
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    profiles:
      - dev
      - test
      - test-local

  # ---------------------------------------------------------------------------
  # Email Testing (MailHog)
  # ---------------------------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "9025:8025"  # Web UI (changed to avoid conflict)
      - "2025:1025"  # SMTP (changed to avoid conflict)
    environment:
      MH_STORAGE: memory
      MH_UI_WEB_PATH: /
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    profiles:
      - dev
      - test
      - test-local
      - pytest

  # ---------------------------------------------------------------------------
  # PostgreSQL (Consolidated: keycloak + marty_applicants)
  # dev profile uses persistent volume, test profiles use tmpfs
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    ports:
      - "5433:5432"  # Changed to avoid conflict
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      APPLICANT_DB_PASSWORD: ${APPLICANT_DB_PASSWORD:-marty}
    volumes:
      - ${POSTGRES_VOLUME:-postgres-data}:/var/lib/postgresql/data
      - ./marty-ui/docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && pg_isready -U keycloak -d keycloak && pg_isready -U marty -d marty_applicants"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles:
      - dev
      - test
      - test-local

  # ---------------------------------------------------------------------------
  # Redis (Development - Single Instance)
  # ---------------------------------------------------------------------------
  # Single Redis instance for development. This is intentionally simple for local development.
  # For staging/production HA:
  #   - Use docker-compose.sentinel.yml for Redis Sentinel (recommended for HA)
  #   - Use docker-compose.cluster.yml for Redis Cluster (for horizontal scaling)
  #
  # Redis Key Patterns (Multi-Tenant with Hash Tags):
  #   Auth:      marty:{org-id}:pkce:{state}, marty:{org-id}:session:{id}
  #   Issuance:  {org-id}:session:id:{id}, {org-id}:offer:id:{id}
  #   Challenge: {org:{org-id}}:challenges:{device_id}:{challenge_id}
  #   Signing:   {org-id}-{algorithm}-test
  #
  # Hash tags {...} ensure all keys for an organization hash to the same Redis Cluster slot,
  # enabling multi-key operations and efficient org-scoped queries.
  #
  # TODO: Add integration tests for Redis Sentinel failover simulation to validate
  #       automatic master failover and ensure the application handles it gracefully.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly ${REDIS_AOF:-yes} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - dev
      - test
      - test-local

  # ---------------------------------------------------------------------------
  # Demo Data Seeding (one-shot)
  # ---------------------------------------------------------------------------
  seed:
    build:
      context: ./marty-ui
      dockerfile: docker/seed.Dockerfile
    environment:
      APPLICANT_DB_URL: postgresql+asyncpg://marty:marty@postgres:5432/marty_applicants
      KEYCLOAK_ADMIN_URL: http://keycloak:8080
      KEYCLOAK_REALM: marty
    depends_on:
      oid4vc-api:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: on-failure:3
    profiles:
      - dev

  # ---------------------------------------------------------------------------
  # Playwright Test Runner - Full Browser Matrix (CI/Release)
  # ---------------------------------------------------------------------------
  playwright:
    build:
      context: ./marty-ui/tests
      dockerfile: Dockerfile.playwright
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Enable host.docker.internal on Linux
    environment:
      <<: *test-env
    volumes:
      - ./marty-ui/tests/test-results:/tests/test-results
      - ./marty-ui/tests/playwright-report:/tests/playwright-report
      - ./marty-ui/tests/playwright.config.js:/tests/playwright.config.js:ro
    depends_on:
      ui-test:
        condition: service_healthy
      mailhog:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      wallet-simulator:
        condition: service_healthy
    profiles:
      - test

  # ---------------------------------------------------------------------------
  # Playwright Test Runner - Chromium Only (Fast Local Testing)
  # ---------------------------------------------------------------------------
  playwright-local:
    build:
      context: ./marty-ui/tests
      dockerfile: Dockerfile.playwright.local
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Enable host.docker.internal on Linux
    environment:
      <<: *test-env
    volumes:
      - ./marty-ui/tests/test-results:/tests/test-results
      - ./marty-ui/tests/playwright-report:/tests/playwright-report
      - ./marty-ui/tests/e2e:/tests/e2e:ro  # Mount test files for live updates
      - ./marty-ui/tests/utils:/tests/utils:ro  # Mount test helpers
      - ./marty-ui/tests/playwright.config.js:/tests/playwright.config.js:ro
    depends_on:
      ui-test:
        condition: service_healthy
      mailhog:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      wallet-simulator:
        condition: service_healthy
    profiles:
      - test-local

  # ---------------------------------------------------------------------------
  # Pytest Runner (Unit & Integration Tests)
  # Uses separate postgres/redis with tmpfs for isolation
  # ---------------------------------------------------------------------------
  postgres-pytest:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      KEYCLOAK_DB_PASSWORD: keycloak
      APPLICANT_DB_PASSWORD: marty
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./marty-ui/docker/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres && pg_isready -U keycloak -d keycloak && pg_isready -U marty -d marty_applicants"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 20s
    profiles:
      - pytest

  redis-pytest:
    image: redis:7-alpine
    command: redis-server --appendonly no --maxmemory 64mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    profiles:
      - pytest

  pytest:
    build:
      context: .
      dockerfile: marty-ui/tests/Dockerfile.pytest
    environment:
      PYTHONPATH: /app/src:/app/marty-microservices-framework
      TEST_MODE: "true"
      APPLICANT_DB_URL: postgresql+asyncpg://marty:marty@postgres-pytest:5432/marty_applicants
      REDIS_URL: redis://redis-pytest:6379/0
    volumes:
      - ./marty-ui/src:/app/src:ro
      - ./marty-microservices-framework:/app/marty-microservices-framework:ro
      - ./tests:/app/tests:ro
      - ./marty-ui/tests/pytest-results:/app/pytest-results
    working_dir: /app
    command: >
      pytest tests/unit/api_keys/ -v --tb=short
      --junitxml=/app/pytest-results/junit.xml
      --html=/app/pytest-results/report.html
      --self-contained-html
    depends_on:
      postgres-pytest:
        condition: service_healthy
      redis-pytest:
        condition: service_healthy
    profiles:
      - pytest

# =============================================================================
# Volumes (dev profile only - tests use tmpfs)
# =============================================================================
volumes:
  postgres-data:
  redis-data:

# =============================================================================
# Networks
# =============================================================================
networks:
  default:
    name: marty-network
