# Marty UI Tunnel Profile
# =======================
# External access overrides and Cloudflare tunnel sidecars.

services:
  auth:
    environment:
      UI_BASE_URL: ${UI_BASE_URL:-https://${PUBLIC_DOMAIN}}
      OIDC_EXTERNAL_ISSUER_URL: ${OIDC_ISSUER_URL_EXTERNAL:-https://${PUBLIC_DOMAIN}/realms/${KEYCLOAK_REALM:-11id}}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-https://${PUBLIC_DOMAIN}/v1/auth/callback}
      OIDC_POST_LOGOUT_REDIRECT_URI: ${OIDC_POST_LOGOUT_REDIRECT_URI:-https://${PUBLIC_DOMAIN}/}
      # Tunnel mode always uses HTTPS — force secure cookies regardless of root .env
      COOKIE_SECURE: "true"
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}

  gateway:
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${PUBLIC_DOMAIN},http://localhost:3000,http://localhost:5173,http://localhost:9080}
      ISSUER_BASE_URL: ${PUBLIC_API_URL:-https://${PUBLIC_DOMAIN:-beta.elevenidllc.com}}
    volumes:
      - ./services/gateway/routes/signing_keys.py:/app/services/gateway/routes/signing_keys.py:ro

  issuance:
    environment:
      ISSUER_BASE_URL: ${PUBLIC_API_URL:-https://${PUBLIC_DOMAIN:-beta.elevenidllc.com}}

  keycloak:
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-beta.elevenidllc.com}
      UI_BASE_URL: ${UI_BASE_URL:-https://beta.elevenidllc.com}
      # Keycloak 25.x uses hostname v2 by default.
      # KC_HOSTNAME sets the external hostname; KC_PROXY_HEADERS trusts
      # X-Forwarded-Proto/X-Forwarded-Host from nginx so protocol becomes https.
      KC_HOSTNAME: ${PUBLIC_DOMAIN:-beta.elevenidllc.com}
      # Override base KC_HOSTNAME_PORT (8180) — v2 ignores it but clear to avoid confusion
      KC_HOSTNAME_PORT: ""
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded

  nginx-proxy:
    image: nginx:alpine
    container_name: tunnel-nginx-proxy
    ports:
      - "9080:80"
    volumes:
      - ./nginx-tunnel.conf.template:/etc/nginx/conf.d/default.conf.template:ro
      - ./scripts/nginx-entrypoint.sh:/docker-entrypoint.d/40-substitute-env.sh:ro
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-beta.elevenidllc.com}
      UI_DEV_PORT: ${UI_DEV_PORT:-3002}
      GATEWAY_UPSTREAM: ${GATEWAY_TUNNEL_UPSTREAM:-host.docker.internal:18000}
      DOCS_DOMAIN: ${DOCS_DOMAIN:-docs.elevenidllc.com}
    networks:
      - marty-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - cloudflared

  cloudflared:
    image: cloudflare/cloudflared:2024.12.2
    container_name: cloudflared-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - marty-network
    restart: unless-stopped

  docs:
    build:
      context: ../marty-docs
      dockerfile: Dockerfile
    container_name: marty-docs
    networks:
      - marty-network
    restart: unless-stopped
