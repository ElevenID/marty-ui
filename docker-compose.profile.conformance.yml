# Project-scoped isolation for official interoperability runs.
#
# Compose normally prefixes containers, networks, and volumes with the project
# name. The development stack predates that convention and pins global
# container/network names and host ports. This overlay removes those global
# resources so a run such as `marty-conformance-20260719-abc123` can coexist
# with every other local Marty stack on the same Docker engine.

services:
  postgres:
    container_name: !reset null
    ports: !reset []
  redis:
    container_name: !reset null
    ports: !reset []
  keycloak:
    container_name: !reset null
    ports: !reset []
  keycloak-configurator:
    container_name: !reset null
    environment:
      # Official runs use this disposable reviewer through the same OIDC
      # redirect and gateway-cookie path as a normal user. The caller supplies
      # a unique password; no customer or organization account is involved.
      KEYCLOAK_SOCIAL_LOGIN_ENABLED: "false"
      CANVAS_DEMO_ADMIN_ENABLED: "false"
      MARTY_ORG_ADMIN_EMAIL: ${MARTY_CONFORMANCE_ADMIN_EMAIL:-conformance@elevenid.dev}
      MARTY_ORG_ADMIN_PASSWORD: ${MARTY_CONFORMANCE_ADMIN_PASSWORD:?set a disposable administrator password}
      MARTY_ORG_ADMIN_FIRST_NAME: "Conformance"
      MARTY_ORG_ADMIN_LAST_NAME: "Administrator"
      DEMO_REVIEWER_EMAIL: ${MARTY_CONFORMANCE_REVIEWER_EMAIL:-conformance.reviewer@elevenid.dev}
      DEMO_REVIEWER_PASSWORD: ${MARTY_CONFORMANCE_REVIEWER_PASSWORD:?set a disposable reviewer password}
      DEMO_REVIEWER_FIRST_NAME: "Conformance"
      DEMO_REVIEWER_LAST_NAME: "Reviewer"
  mailpit:
    container_name: !reset null
    ports: !reset []
  openbao:
    container_name: !reset null
    ports: !reset []
  openbao-init:
    container_name: !reset null
  db-migrate:
    container_name: !reset null
    environment:
      # Fresh fixture organization for this disposable project. The value is
      # organization-controlled and cannot resolve to a customer mailbox.
      MARTY_ORG_ADMIN_EMAIL: ${MARTY_CONFORMANCE_ADMIN_EMAIL:-conformance@elevenid.dev}
      MARTY_ORG_REVIEWER_EMAIL: ${MARTY_CONFORMANCE_REVIEWER_EMAIL:-conformance.reviewer@elevenid.dev}
  issuance-migrations:
    container_name: !reset null
  gateway:
    container_name: !reset null
    ports: !reset []
  auth:
    container_name: !reset null
    ports: !reset []
  organization:
    container_name: !reset null
    ports: !reset []
    environment:
      # The organization service owns RBAC membership. Its startup bootstrap
      # promotes this disposable account to the organization admin role rather
      # than relying only on the Keycloak realm role.
      MARTY_ORG_ADMIN_EMAIL: ${MARTY_CONFORMANCE_ADMIN_EMAIL:-conformance@elevenid.dev}
      MARTY_ORG_REVIEWER_EMAIL: ${MARTY_CONFORMANCE_REVIEWER_EMAIL:-conformance.reviewer@elevenid.dev}
  credential-template:
    container_name: !reset null
    ports: !reset []
  trust-profile:
    container_name: !reset null
    ports: !reset []
  applicant:
    container_name: !reset null
    ports: !reset []
  notification:
    container_name: !reset null
    ports: !reset []
  compliance-profile:
    container_name: !reset null
    ports: !reset []
  presentation-policy:
    container_name: !reset null
    ports: !reset []
  deployment-profile:
    container_name: !reset null
    ports: !reset []
  flow:
    container_name: !reset null
    ports: !reset []
  issuance:
    container_name: !reset null
    ports: !reset []
  canvas-sync-worker:
    container_name: !reset null
  revocation-profile:
    container_name: !reset null
    ports: !reset []
  device-registration:
    container_name: !reset null
    ports: !reset []
  event-stream:
    container_name: !reset null
    ports: !reset []
  verification:
    container_name: !reset null
    ports: !reset []
  envoy:
    container_name: !reset null
    ports: !reset []
networks:
  marty-network:
    name: !reset null
