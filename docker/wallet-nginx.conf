server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    
    include /etc/nginx/mime.types;

    # Enable gzip compression for Flutter web assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml application/wasm;

    # Enable CORS for wallet integration
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

    # Handle SPA routing for Flutter web
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        return 200 'healthy\n';
        add_header Content-Type text/plain;
    }

    # Flutter web main.dart.js - cache with revalidation
    location ~* main\.dart\.js$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Flutter CanvasKit WASM - long cache (immutable hashed filenames)
    location ~* canvaskit\.(wasm|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Flutter service worker - no cache
    location ~* flutter_service_worker\.js$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Static assets with cache busting (js, css, fonts, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Proper MIME type for WASM
    types {
        application/wasm wasm;
    }
}
