dataSource {
    # SQLite — no external DB dependency needed for local/testing use
    jdbcUrl         = "jdbc:sqlite:data/wallet.db"
    driverClassName = "org.sqlite.JDBC"
    username        = ""
    password        = ""

    transactionIsolation = "TRANSACTION_SERIALIZABLE"
    maximumPoolSize = 5
    minimumIdle     = 1
    autoCommit      = false

    dataSource {
        journalMode     = WAL
        fullColumnNames = false
    }
}
recreateDatabaseOnStart = false
