# Walt.id Wallet nginx reverse proxy
# ===================================
# Mirrors the upstream Caddy routing:
#   /wallet-api/* --> waltid-wallet-api:7001  (Ktor backend)
#   /*            --> waltid-web-wallet:3001  (Nuxt frontend)
#
# Playwright tests should point at http://localhost:7101

server {
    listen 7101;
    server_name localhost;

    # Wallet API backend — pass through with original path
    location /wallet-api/ {
        proxy_pass         http://waltid-wallet-api:7001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Required for OID4VCI redirects that carry long credential offer URIs
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
    }

    # Demo wallet Nuxt frontend
    location / {
        proxy_pass         http://waltid-web-wallet:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Simple health probe used by tests / docker healthcheck
    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
