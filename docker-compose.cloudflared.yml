version: '3.8'

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: tunnel-nginx-proxy
    ports:
      - "9080:80"
    volumes:
      - ./nginx-tunnel.conf.template:/etc/nginx/conf.d/default.conf.template:ro
      - ./scripts/nginx-entrypoint.sh:/docker-entrypoint.d/40-substitute-env.sh:ro
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-beta.elevenidllc.com}
      UI_DEV_PORT: ${UI_DEV_PORT:-3000}
    networks:
      - marty-infra-network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - cloudflared

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - marty-infra-network
    restart: unless-stopped

networks:
  marty-infra-network:
    external: true
