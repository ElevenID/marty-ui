syntax = "proto3";

package marty.ui.credential_template.v1;

import "google/api/annotations.proto";

option java_multiple_files = true;

// CredentialTemplateService manages credential template definitions — the
// schemas that drive OID4VCI issuance flows.
service CredentialTemplateService {
  // Create a new credential template (draft).
  rpc CreateTemplate(CreateTemplateRequest) returns (TemplateResponse) {
    option (google.api.http) = {
      post: "/v1/credential-templates"
      body: "*"
    };
  }

  // Get a credential template by ID.
  rpc GetTemplate(GetTemplateRequest) returns (TemplateResponse) {
    option (google.api.http) = {
      get: "/v1/credential-templates/{template_id}"
    };
  }

  // List credential templates for an organization.
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse) {
    option (google.api.http) = {
      get: "/v1/credential-templates"
    };
  }

  // Update a draft credential template.
  rpc UpdateTemplate(UpdateTemplateRequest) returns (TemplateResponse) {
    option (google.api.http) = {
      patch: "/v1/credential-templates/{template_id}"
      body: "*"
    };
  }

  // Activate a draft template.
  rpc ActivateTemplate(ActivateTemplateRequest) returns (TemplateResponse) {
    option (google.api.http) = {
      post: "/v1/credential-templates/{template_id}/activate"
    };
  }

  // Deprecate an active template.
  rpc DeprecateTemplate(DeprecateTemplateRequest) returns (TemplateResponse) {
    option (google.api.http) = {
      post: "/v1/credential-templates/{template_id}/deprecate"
    };
  }

  // Create a new version from an existing template.
  rpc NewVersion(NewVersionRequest) returns (TemplateResponse) {
    option (google.api.http) = {
      post: "/v1/credential-templates/{template_id}/new-version"
    };
  }

  // Delete a draft template.
  rpc DeleteTemplate(DeleteTemplateRequest) returns (DeleteTemplateResponse) {
    option (google.api.http) = {
      delete: "/v1/credential-templates/{template_id}"
    };
  }

  // Get credential configurations for OID4VCI metadata (internal).
  rpc GetCredentialConfigurations(GetCredentialConfigurationsRequest) returns (GetCredentialConfigurationsResponse) {
    option (google.api.http) = {
      get: "/v1/credential-templates/{organization_id}/configurations"
    };
  }

  // List wallet registry entries.
  rpc ListWallets(ListWalletsRequest) returns (ListWalletsResponse) {
    option (google.api.http) = {
      get: "/v1/credential-templates/wallets"
    };
  }

  // Get a wallet registry entry by ID.
  rpc GetWallet(GetWalletRequest) returns (WalletRegistryEntry) {
    option (google.api.http) = {
      get: "/v1/credential-templates/wallets/{wallet_id}"
    };
  }

  // Health check.
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse) {
    option (google.api.http) = {
      get: "/v1/credential-templates/health"
    };
  }
}

message CreateTemplateRequest {
  string organization_id = 1;
  string name = 2;
  string description = 3;
  string credential_type = 4;
  string vct = 5;
  string doctype = 6;
  repeated ClaimDefinition claims = 7;
  string privacy_posture = 8;
  repeated string selective_disclosure_fields = 9;
  repeated string zk_predicate_claims = 10;
  repeated string supported_formats = 11;
  string issuance_protocol = 12;
  string credential_payload_format = 13;
  DisplayStyle display_style = 14;
  ValidityRules validity_rules = 15;

  // Key management (BYOK)
  string key_access_mode = 16;       // KEY_VAULT | HSM | LOCAL | REMOTE_SIGNING
  string issuer_key_id = 17;
  string issuer_algorithm = 18;      // ES256 | EdDSA | RS256 | ES384
  string remote_signing_config_json = 19; // JSON: {provider, key_name, key_version, ...}
  string issuer_profile_id = 20;
}

message GetTemplateRequest {
  string template_id = 1;
}

message ListTemplatesRequest {
  string organization_id = 1;
  string status = 2;
}

message ListTemplatesResponse {
  repeated TemplateResponse templates = 1;
}

message UpdateTemplateRequest {
  string template_id = 1;
  string name = 2;
  string description = 3;
  repeated ClaimDefinition claims = 4;
  repeated string supported_formats = 5;
  DisplayStyle display_style = 6;
  ValidityRules validity_rules = 7;

  // Key management (BYOK)
  string key_access_mode = 8;        // KEY_VAULT | HSM | LOCAL | REMOTE_SIGNING
  string issuer_key_id = 9;
  string issuer_algorithm = 10;      // ES256 | EdDSA | RS256 | ES384
  string remote_signing_config_json = 11; // JSON: {provider, key_name, key_version, ...}
  string issuer_profile_id = 12;
}

message ActivateTemplateRequest {
  string template_id = 1;
}

message DeprecateTemplateRequest {
  string template_id = 1;
}

message NewVersionRequest {
  string template_id = 1;
}

message DeleteTemplateRequest {
  string template_id = 1;
}

message DeleteTemplateResponse {
  bool success = 1;
}

message GetCredentialConfigurationsRequest {}

message GetCredentialConfigurationsResponse {
  // JSON-encoded credential_configurations_supported map
  string configurations_json = 1;
}

message TemplateResponse {
  string id = 1;
  string organization_id = 2;
  string name = 3;
  string description = 4;
  string credential_type = 5;
  string vct = 6;
  string doctype = 7;
  repeated ClaimDefinition claims = 8;
  string privacy_posture = 9;
  repeated string selective_disclosure_fields = 10;
  repeated string zk_predicate_claims = 11;
  repeated string supported_formats = 12;
  string issuance_protocol = 13;
  string credential_payload_format = 14;
  DisplayStyle display_style = 15;
  ValidityRules validity_rules = 16;
  string status = 17;
  int32 version = 18;
  string created_at = 19;
  string updated_at = 20;
  // JSON-encoded list of wallet configurations [{wallet_id, deep_link_scheme, format_variant}, ...]
  string wallet_configs_json = 21;

  // Key management (BYOK)
  string key_access_mode = 22;       // KEY_VAULT | HSM | LOCAL | REMOTE_SIGNING
  string issuer_key_id = 23;
  string issuer_algorithm = 24;      // ES256 | EdDSA | RS256 | ES384
  string remote_signing_config_json = 25; // JSON: {provider, key_name, key_version, ...}
  string issuer_profile_id = 26;
}

message ClaimDefinition {
  string name = 1;
  string display_name = 2;
  string description = 3;
  string claim_type = 4;
  bool required = 5;
  bool selectively_disclosable = 6;
  bool derivable = 7;
  string pattern = 8;
  repeated string enum_values = 9;
  string mdoc_namespace = 10;
  string mdoc_element_identifier = 11;
}

message DisplayStyle {
  string background_color = 1;
  string text_color = 2;
  string logo_url = 3;
  string background_image_url = 4;
  string icon = 5;
}

message ValidityRules {
  int32 default_validity_days = 1;
  int32 max_validity_days = 2;
  bool renewable = 3;
  int32 renewal_window_days = 4;
  bool require_revalidation = 5;
  int32 revalidation_interval_days = 6;
}

// ---------------------------------------------------------------------------
// Wallet Registry messages
// ---------------------------------------------------------------------------

message ListWalletsRequest {
  bool active_only = 1;
}

message ListWalletsResponse {
  repeated WalletRegistryEntry wallets = 1;
}

message GetWalletRequest {
  string wallet_id = 1;
}

message WalletRegistryEntry {
  string id = 1;
  string name = 2;
  string logo_url = 3;
  string deep_link_template = 4;
  repeated string supported_formats = 5;
  repeated string supported_protocols = 6;
  repeated string platforms = 7;
  bool supports_qr = 8;
  bool supports_deeplink = 9;
  string docs_url = 10;
  bool is_active = 11;
  string created_at = 12;
  string updated_at = 13;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
}
