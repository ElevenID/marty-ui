# Docker Compose Override for Cloudflare Tunnel Mode
# ==================================================
# This file configures services to work with external access
# through the Cloudflare tunnel instead of localhost.
#
# Usage:
#   1. Start infrastructure: make infra
#   2. Start services with tunnel config:
#      docker-compose -f docker-compose.services-app.yml -f docker-compose.tunnel-override.yml --env-file .env.tunnel up -d
#   3. Or use: make tunnel-services-start
#
# The PUBLIC_DOMAIN variable from .env.tunnel is used to configure
# all external-facing URLs (redirects, CORS, etc.)

version: '3.8'

services:
  auth:
    environment:
      # Override URLs for external access
      UI_BASE_URL: https://${PUBLIC_DOMAIN}
      OIDC_EXTERNAL_ISSUER_URL: https://${PUBLIC_DOMAIN}/realms/${KEYCLOAK_REALM:-11id}
      OIDC_REDIRECT_URI: https://${PUBLIC_DOMAIN}/v1/auth/callback
      OIDC_POST_LOGOUT_REDIRECT_URI: https://${PUBLIC_DOMAIN}/
      COOKIE_SECURE: "true"
      CORS_ORIGINS: https://${PUBLIC_DOMAIN},http://localhost:3000

  gateway:
    environment:
      # Gateway CORS should include public domain
      CORS_ORIGINS: https://${PUBLIC_DOMAIN},http://localhost:3000,http://localhost:5173
