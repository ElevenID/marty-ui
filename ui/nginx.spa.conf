# Static SPA server for Docker-hosted production UI
# API proxying is handled by the tunnel nginx-proxy, not here.

server {
    listen 80;
    server_name localhost;
    absolute_redirect off;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml+rss;

    location = /console {
        try_files /console/index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    location ^~ /console/ {
        try_files $uri $uri/ /console/index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # SPA fallback — all public routes return index.html
    # Prevent browser/CDN caching of index.html so new builds take effect immediately
    location = /ready {
        default_type application/json;
        return 503 '{"status":"not_ready","service":"ui","error":"readiness_not_proxied"}';
    }

    location = /health/ready {
        default_type application/json;
        return 503 '{"status":"not_ready","service":"ui","error":"readiness_not_proxied"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }

    # Cache hashed static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
