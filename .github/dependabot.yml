version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      ui-development:
        dependency-type: development
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /tests
    schedule:
      interval: weekly
    groups:
      browser-tests:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /tests/canvas-oss-contract
    schedule:
      interval: weekly
    groups:
      canvas-contract:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /docker/canvas-sandbox
    schedule:
      interval: weekly
