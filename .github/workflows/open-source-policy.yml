name: Open-source policy

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: ElevenID/.github/.github/actions/open-source-audit@8e3c9bac4b2aa7b1c49494cbf950c53b4ff55f3a

  dependency-review:
    if: github.event_name == 'pull_request' && github.event.repository.private == false
    uses: ElevenID/.github/.github/workflows/dependency-review.yml@9b6141e294da5c0f9254cfaa60c8934df95ec68b
    permissions:
      contents: read
