name: CI

env:
  MARTY_API_CORE_URI: https://github.com/ElevenID/marty-cli/releases/download/v0.1.0/elevenid-marty-api-core-0.1.0.tgz
  MARTY_API_CORE_DIGEST: sha256:c048d482faee350e984bc647c7e99948d894bae5c3355c976909ffe2a62c3dcc
  MARTY_BLOG_URI: https://github.com/ElevenID/marty-blog/releases/download/v0.1.3/elevenid-marty-blog-0.1.3.tgz
  MARTY_BLOG_DIGEST: sha256:ae68d11b38fc0387c07eb6629197ba226cbca9cfe65efc23e6a97cce81a20a57
  MARTY_COMMON_URI: https://github.com/ElevenID/Marty/releases/download/marty-common-v0.2.0/marty_common-0.2.0-py3-none-any.whl
  MARTY_COMMON_DIGEST: sha256:123452b401144ff2c7b13c4c8f2eea1370a34a60c259e49795d5dfe295747a2f

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Check Python correctness
        run: ruff check services/ packages/ --select E9,F63,F7,F82

  test-ui:
    name: UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24"
      - name: Bootstrap released UI dependencies
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error "$MARTY_API_CORE_URI" --output "$RUNNER_TEMP/marty-api-core.tgz"
          curl --fail --location --silent --show-error "$MARTY_BLOG_URI" --output "$RUNNER_TEMP/marty-blog.tgz"
          echo "${MARTY_API_CORE_DIGEST#sha256:}  $RUNNER_TEMP/marty-api-core.tgz" | sha256sum --check --strict
          echo "${MARTY_BLOG_DIGEST#sha256:}  $RUNNER_TEMP/marty-blog.tgz" | sha256sum --check --strict
          bun pm pkg set "dependencies.@elevenid/marty-api-core=file:$RUNNER_TEMP/marty-api-core.tgz"
          bun pm pkg set "dependencies.@elevenid/marty-blog=file:$RUNNER_TEMP/marty-blog.tgz"
      - run: bun install
      - name: Type check
        run: bunx tsc -p tsconfig.build.json --noEmit
      - name: Unit tests
        run: node ./node_modules/vitest/vitest.mjs run

  test-services:
    name: Service Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error "$MARTY_COMMON_URI" --output "$RUNNER_TEMP/marty_common-0.2.0-py3-none-any.whl"
          echo "${MARTY_COMMON_DIGEST#sha256:}  $RUNNER_TEMP/marty_common-0.2.0-py3-none-any.whl" | sha256sum --check --strict
          pip install -r requirements-services.txt
          pip install "$RUNNER_TEMP/marty_common-0.2.0-py3-none-any.whl"
      - name: Run tests
        working-directory: services
        run: python -m pytest -v --tb=short -x

  test-release-contracts:
    name: Release Contract Tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: packages
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Install released test dependencies
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error "$MARTY_COMMON_URI" --output "$RUNNER_TEMP/marty_common-0.2.0-py3-none-any.whl"
          echo "${MARTY_COMMON_DIGEST#sha256:}  $RUNNER_TEMP/marty_common-0.2.0-py3-none-any.whl" | sha256sum --check --strict
          pip install pytest pyyaml jsonschema cryptography playwright "$RUNNER_TEMP/marty_common-0.2.0-py3-none-any.whl"
      - name: Enforce OSS commerce boundary
        run: python scripts/check_oss_boundary.py
      - name: Run repository release checks
        run: python -m pytest tests -v --tb=short

  test-credential-lifecycle-browser:
    name: MIP 0.3 Credential Lifecycle Browser Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "24"
      - name: Install UI dependencies
        working-directory: ui
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error "$MARTY_API_CORE_URI" --output "$RUNNER_TEMP/marty-api-core.tgz"
          curl --fail --location --silent --show-error "$MARTY_BLOG_URI" --output "$RUNNER_TEMP/marty-blog.tgz"
          echo "${MARTY_API_CORE_DIGEST#sha256:}  $RUNNER_TEMP/marty-api-core.tgz" | sha256sum --check --strict
          echo "${MARTY_BLOG_DIGEST#sha256:}  $RUNNER_TEMP/marty-blog.tgz" | sha256sum --check --strict
          bun pm pkg set "dependencies.@elevenid/marty-api-core=file:$RUNNER_TEMP/marty-api-core.tgz"
          bun pm pkg set "dependencies.@elevenid/marty-blog=file:$RUNNER_TEMP/marty-blog.tgz"
          bun install
      - name: Install Playwright dependencies
        working-directory: tests
        run: npm ci
      - name: Install Chromium
        working-directory: tests
        run: npx playwright install --with-deps chromium
      - name: Run deterministic credential lifecycle gate
        working-directory: tests
        run: npx playwright test --config playwright.applicant-wallet.config.js
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mip-03-credential-lifecycle-browser
          path: |
            tests/test-results/
            tests/playwright-report-applicant-wallet/
          retention-days: 14

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
      - name: Install scanners
        run: pip install bandit semgrep pip-audit
      - name: Dependency vulnerability gates
        shell: bash
        run: |
          set -euo pipefail
          pip-audit -r requirements-services.txt
          (cd ui && bun audit && npm audit --package-lock-only --audit-level=low)
          (cd tests && npm audit --package-lock-only --audit-level=low)
      - name: Bandit SAST
        run: bandit -r services/ packages/ -f json -o bandit-report.json || true
      - name: Semgrep audit
        run: semgrep scan --config=auto --json --output semgrep-report.json services/ packages/ || true
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: security-reports
          path: |
            bandit-report.json
            semgrep-report.json
          retention-days: 14
