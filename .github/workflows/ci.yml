name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Check style
        run: ruff check services/ packages/
      - name: Check formatting
        run: ruff format --check services/ packages/

  test-ui:
    name: UI Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Type check
        run: bunx tsc -p tsconfig.build.json --noEmit
      - name: Unit tests
        run: bun run test

  test-services:
    name: Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements-services.txt
          pip install -e packages/marty_common
      - name: Run tests
        working-directory: services
        run: python -m pytest -v --tb=short -x

  test-credential-lifecycle-browser:
    name: MIP 0.3 Credential Lifecycle Browser Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install UI dependencies
        working-directory: ui
        run: bun install --frozen-lockfile
      - name: Install Playwright dependencies
        working-directory: tests
        run: npm ci
      - name: Install Chromium
        working-directory: tests
        run: npx playwright install --with-deps chromium
      - name: Run deterministic credential lifecycle gate
        working-directory: tests
        run: npx playwright test --config playwright.applicant-wallet.config.js
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mip-03-credential-lifecycle-browser
          path: |
            tests/test-results/
            tests/playwright-report-applicant-wallet/
          retention-days: 14

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install scanners
        run: pip install bandit semgrep
      - name: Bandit SAST
        run: bandit -r services/ packages/ -c pyproject.toml -f json -o bandit-report.json || true
      - name: Semgrep
        run: semgrep scan --config=auto --error services/ packages/
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
