name: MIP 0.3 Beta Credential Lifecycle

on:
  workflow_dispatch:
    inputs:
      beta_origin:
        description: Beta origin under test
        required: true
        default: https://beta.elevenidllc.com
      audit_org_id:
        description: Organization with the seeded lifecycle fixtures
        required: true
      release_version:
        description: Release version in the successful build-ready manifest
        required: true
      cd_run_id:
        description: Successful CD run that built the deployed release
        required: true
  repository_dispatch:
    types: [beta-deployed]

concurrency:
  group: mip-03-beta-credential-lifecycle
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  full-stack-credential-lifecycle:
    name: Real Beta Issuance, Verification, And Contract Gate
    runs-on: ubuntu-latest
    environment: beta-lifecycle
    timeout-minutes: 45
    env:
      BETA_ORIGIN: ${{ inputs.beta_origin || vars.BETA_ORIGIN || 'https://beta.elevenidllc.com' }}
      BETA_AUDIT_ORG_ID: ${{ inputs.audit_org_id || vars.BETA_AUDIT_ORG_ID }}
      TEST_APPLICANT_EMAIL: ${{ secrets.TEST_APPLICANT_EMAIL }}
      TEST_APPLICANT_PASSWORD: ${{ secrets.TEST_APPLICANT_PASSWORD }}
      TEST_VENDOR_EMAIL: ${{ secrets.TEST_VENDOR_EMAIL }}
      TEST_VENDOR_PASSWORD: ${{ secrets.TEST_VENDOR_PASSWORD }}
      MARTY_TEST_WALLET_ORIGIN: http://127.0.0.1:8787
      MARTY_CORE_REF: ${{ vars.MARTY_CORE_REF }}
      MARTY_PROTOCOL_REF: ${{ vars.MARTY_PROTOCOL_REF }}
      RELEASE_VERSION: ${{ inputs.release_version || github.event.client_payload.release_version }}
      CD_RUN_ID: ${{ inputs.cd_run_id || github.event.client_payload.cd_run_id }}
      GH_TOKEN: ${{ github.token }}
      CI: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Require pinned coordinated revisions
        shell: bash
        run: |
          for ref_name in MARTY_CORE_REF MARTY_PROTOCOL_REF; do
            if [[ ! "${!ref_name}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "$ref_name must be a full 40-character commit SHA." >&2
              exit 1
            fi
          done

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ElevenID/marty-core
          token: ${{ github.token }}
          ref: ${{ env.MARTY_CORE_REF }}
          path: marty-core

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: Marty-Protocol/Marty-Protocol
          ref: ${{ env.MARTY_PROTOCOL_REF }}
          path: marty-protocol

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          workspaces: marty-core

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: "20"

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Require the full-stack fixture manifest
        shell: bash
        run: |
          for name in BETA_ORIGIN BETA_AUDIT_ORG_ID TEST_APPLICANT_EMAIL TEST_APPLICANT_PASSWORD TEST_VENDOR_EMAIL TEST_VENDOR_PASSWORD RELEASE_VERSION CD_RUN_ID; do
            if [[ -z "${!name}" ]]; then
              echo "$name is required by the beta-lifecycle environment." >&2
              exit 1
            fi
          done
          if [[ ! "$CD_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "CD_RUN_ID must be numeric." >&2
            exit 1
          fi

      - name: Bind lifecycle to the successful CD build
        shell: bash
        run: |
          run="$(gh run view "$CD_RUN_ID" --repo "$GITHUB_REPOSITORY" --json conclusion,headSha,status,workflowName)"
          test "$(jq -r '.status' <<<"$run")" = "completed"
          test "$(jq -r '.conclusion' <<<"$run")" = "success"
          test "$(jq -r '.headSha' <<<"$run")" = "$GITHUB_SHA"
          test "$(jq -r '.workflowName' <<<"$run")" = "CD"
          mkdir -p tests/artifacts/build-evidence
          gh run download "$CD_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "build-ready-manifest-$RELEASE_VERSION" \
            --dir tests/artifacts/build-evidence
          jq -e \
            --arg release "$RELEASE_VERSION" \
            --arg sha "$GITHUB_SHA" \
            --arg core "$MARTY_CORE_REF" \
            --arg protocol "$MARTY_PROTOCOL_REF" \
            '.release_version == $release and
             .mip_version == "0.3.1" and
             .repositories.marty_ui == $sha and
             .repositories.marty_core == $core and
             .repositories.marty_protocol == $protocol and
             .build_ready == true and
             .release_ready == false' \
            tests/artifacts/build-evidence/build-ready-manifest.json >/dev/null

      - name: Require the selected release to be running on beta
        shell: bash
        run: |
          curl --fail --silent --show-error --header 'Cache-Control: no-cache' \
            "$BETA_ORIGIN/.well-known/marty-release" \
            --output tests/artifacts/services-release.json
          curl --fail --silent --show-error --header 'Cache-Control: no-cache' \
            "$BETA_ORIGIN/marty-ui-release.json" \
            --output tests/artifacts/ui-release.json
          for report in tests/artifacts/services-release.json tests/artifacts/ui-release.json; do
            component="$(basename "$report" -release.json)"
            jq -e \
              --arg release "$RELEASE_VERSION" \
              --arg sha "$GITHUB_SHA" \
              --arg component "$component" \
              '.component == $component and .release_version == $release and .marty_ui_sha == $sha' \
              "$report" >/dev/null
          done

      - name: Install browser test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Chromium
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Install beta gate Python dependencies
        run: python -m pip install --disable-pip-version-check playwright==1.56.0 'jsonschema[format]>=4.23' 'referencing>=0.35'

      - name: Require reproducible Marty browser wallet sources
        shell: bash
        run: |
          test -f marty-core/Cargo.lock
          test -f marty-core/vendor/core2-0.4.0/Cargo.toml
          test -f marty-core/marty-test-wallet/Cargo.toml
          cargo metadata --locked --no-deps --format-version 1 \
            --manifest-path marty-core/Cargo.toml >/dev/null

      - name: Start final-spec Marty browser test wallet
        shell: bash
        run: |
          cargo build --locked --manifest-path marty-core/Cargo.toml -p marty-test-wallet
          RUST_LOG=marty_test_wallet=info \
            marty-core/target/debug/marty-test-wallet \
            >marty-test-wallet.log 2>&1 &
          echo $! >marty-test-wallet.pid
          for attempt in $(seq 1 60); do
            if curl --fail --silent --show-error http://127.0.0.1:8787/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat marty-test-wallet.log >&2
          echo "Marty browser test wallet did not become ready." >&2
          exit 1

      - name: Require deployed MIP 0.3.1 contract
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          const origin = process.env.BETA_ORIGIN.replace(/\/$/, '');
          const response = await fetch(`${origin}/.well-known/mip-configuration`);
          const body = await response.json().catch(() => null);
          const header = response.headers.get('x-mip-version');
          const forbidden = ['api_base_url', 'supported_issuance_protocols', 'endpoints', 'wallet_facing_endpoints', 'authorization'];
          const canonical = body?.issuer === origin
            && body?.mip_configuration_endpoint === `${origin}/.well-known/mip-configuration`
            && JSON.stringify(body?.supported_versions) === JSON.stringify(['0.3.1'])
            && Array.isArray(body?.implementation_classes)
            && Array.isArray(body?.supported_compliance_profiles)
            && Array.isArray(body?.active_compliance_profiles)
            && forbidden.every((field) => !(field in body));
          if (!response.ok || body?.mip_version !== '0.3.1' || header !== '0.3.1' || !canonical) {
            throw new Error(`Expected deployed MIP 0.3.1; status=${response.status}, body=${body?.mip_version}, header=${header}`);
          }
          const { mkdirSync, writeFileSync } = await import('node:fs');
          mkdirSync('tests/artifacts', { recursive: true });
          writeFileSync('tests/artifacts/mip-configuration.json', `${JSON.stringify(body, null, 2)}\n`);
          NODE
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          protocol_root = Path("marty-protocol").resolve()
          sys.path.insert(0, str(protocol_root))
          from tests.helpers import SCHEMAS_DIR, validate_instance

          document = json.loads(Path("tests/artifacts/mip-configuration.json").read_text(encoding="utf-8"))
          validate_instance(SCHEMAS_DIR / "mip-configuration.json", document)
          PY

      - name: Require SpruceKit-compatible issuer metadata
        shell: bash
        run: |
          python scripts/check_spruceid_metadata.py --base "$BETA_ORIGIN" \
            --output tests/artifacts/spruce-metadata.json

      - name: Record immutable beta lifecycle context
        shell: bash
        run: |
          mkdir -p tests/artifacts
          jq -n \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg cd_run_id "$CD_RUN_ID" \
            --arg release_version "$RELEASE_VERSION" \
            --arg marty_ui_sha "$GITHUB_SHA" \
            --arg marty_core_sha "$MARTY_CORE_REF" \
            --arg beta_origin "$BETA_ORIGIN" \
            --arg mip_version "0.3.1" \
            '{
              run_id: $run_id,
              cd_run_id: $cd_run_id,
              release_version: $release_version,
              marty_ui_sha: $marty_ui_sha,
              marty_core_sha: $marty_core_sha,
              beta_origin: $beta_origin,
              mip_version: $mip_version
            }' > tests/artifacts/release-context.json

      - name: Create and activate every organization credential primitive
        run: python scripts/beta_org_console_audit.py --base-url "$BETA_ORIGIN"

      - name: Probe canonical and removed applicant contracts
        run: node tests/scripts/probe-beta-membership-badge.js

      - name: Receive membership badge, log out, and sign back in with it
        run: node tests/scripts/verify-beta-credential-login.js

      - name: Receive membership badge, create template, and verify with browser wallet
        run: node tests/scripts/audit-beta-org-credential-paths.js

      - name: Renew and enforce credential lifecycle with browser wallet
        run: node tests/scripts/audit-beta-credential-lifecycle.js

      - name: Upload lifecycle evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: mip-03-beta-credential-lifecycle
          path: tests/artifacts/
          if-no-files-found: error
          retention-days: 30

      - name: Collect wallet logs
        if: failure()
        run: |
          cat marty-test-wallet.log || true

      - name: Stop browser wallet
        if: always()
        run: |
          if [[ -f marty-test-wallet.pid ]]; then
            kill "$(cat marty-test-wallet.pid)" || true
          fi
