name: E2E Tests

# TEMPORARILY DISABLED - CI checks turned off while fixing tests
# To re-enable, uncomment the push/pull_request triggers below
on:
  workflow_dispatch:
  # push:
  #   branches: [ main, develop ]
  # pull_request:
  #   branches: [ main ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Checkout marty-authenticator
      uses: actions/checkout@v4
      with:
        repository: anthropic/marty-authenticator
        path: ../marty-authenticator
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Docker
      uses: docker/setup-buildx-action@v3

    - name: Build wallet-simulator image
      run: make build-wallet

    - name: Run E2E tests
      run: make test

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          marty-ui/tests/test-results/
          marty-ui/tests/playwright-report/
        retention-days: 7

    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: screenshots
        path: marty-ui/tests/test-results/screenshots/
        retention-days: 7

    - name: Collect logs
      if: failure()
      run: |
        echo "=== Docker containers ==="
        docker ps -a
        echo "=== Container logs ==="
        docker compose --profile test logs --tail=100

    - name: Cleanup
      if: always()
      run: make clean
