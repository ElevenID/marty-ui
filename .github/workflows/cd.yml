name: CD

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default: short SHA)"
        required: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/elevenid/marty-ui
  MARTY_CREDENTIALS_REF: ${{ vars.MARTY_CREDENTIALS_REF }}
  MARTY_PROTOCOL_REF: ${{ vars.MARTY_PROTOCOL_REF }}
  MARTY_CORE_REF: ${{ vars.MARTY_CORE_REF }}
  MARTY_CLI_REF: ${{ vars.MARTY_CLI_REF }}
  MARTY_BLOG_REF: ${{ vars.MARTY_BLOG_REF }}
  MARTY_SUBSCRIPTIONS_REF: ${{ vars.MARTY_SUBSCRIPTIONS_REF }}

jobs:
  validate-release-manifest:
    name: Validate Pinned Revisions
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Require successful Marty UI source CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow CI \
            --commit "$GITHUB_SHA" \
            --status completed \
            --json conclusion,databaseId \
            --jq '[.[] | select(.conclusion == "success")][0].databaseId // empty')"
          if [[ -z "$run_id" ]]; then
            echo "A successful CI workflow for $GITHUB_SHA is required before CD." >&2
            exit 1
          fi
          echo "Verified source CI run $run_id"

      - name: Require exact marty-credentials revision
        shell: bash
        run: |
          if [[ ! "$MARTY_CREDENTIALS_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "MARTY_CREDENTIALS_REF must be an exact 40-character commit SHA." >&2
            exit 1
          fi
          if [[ ! "$MARTY_PROTOCOL_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "MARTY_PROTOCOL_REF must be an exact 40-character commit SHA." >&2
            exit 1
          fi
          for ref_name in MARTY_CORE_REF MARTY_CLI_REF MARTY_BLOG_REF MARTY_SUBSCRIPTIONS_REF; do
            if [[ ! "${!ref_name}" =~ ^[0-9a-f]{40}$ ]]; then
              echo "$ref_name must be an exact 40-character commit SHA." >&2
              exit 1
            fi
          done

      - name: Require successful coordinated source CI
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        shell: bash
        run: |
          verify_source_ci() {
            local repository="$1"
            local revision="$2"
            local workflow="$3"
            local run_id
            run_id="$(gh run list \
              --repo "$repository" \
              --workflow "$workflow" \
              --commit "$revision" \
              --status completed \
              --json conclusion,databaseId \
              --jq '[.[] | select(.conclusion == "success")][0].databaseId // empty')"
            if [[ -z "$run_id" ]]; then
              echo "A successful $workflow workflow for $repository@$revision is required." >&2
              exit 1
            fi
            echo "Verified $repository CI run $run_id for $revision"
          }

          verify_source_ci Marty-Protocol/Marty-Protocol "$MARTY_PROTOCOL_REF" CI
          verify_source_ci ElevenID/marty-credentials "$MARTY_CREDENTIALS_REF" CI
          verify_source_ci ElevenID/marty-core "$MARTY_CORE_REF" "MIP Release Wallet"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Require protected release environments
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: python scripts/check_github_release_environments.py

      - name: Run repository release contract tests
        run: pip install pytest && python -m pytest tests -v --tb=short

  verify-protocol-bindings:
    name: Verify Pinned MIP Protocol And Bindings
    needs: [validate-release-manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Marty-Protocol/Marty-Protocol
          ref: ${{ env.MARTY_PROTOCOL_REF }}
          path: marty-protocol

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install protocol dependencies
        working-directory: marty-protocol
        run: pip install uv && uv sync

      - name: Run protocol conformance suite
        working-directory: marty-protocol
        run: uv run pytest tests/ -v

      - name: Verify generated bindings
        working-directory: marty-protocol
        run: uv run python scripts/codegen.py --check

  verify-coordinated-js:
    name: Verify Pinned CLI, Blog, And Subscriptions
    needs: [validate-release-manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-cli
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_CLI_REF }}
          path: marty-cli

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-blog
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_BLOG_REF }}
          path: marty-blog

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-subscriptions
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_SUBSCRIPTIONS_REF }}
          path: marty-subscriptions

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            marty-cli/package-lock.json
            marty-blog/package-lock.json
            marty-subscriptions/package-lock.json

      - name: Test Marty CLI clean-break client
        working-directory: marty-cli
        run: npm ci && npm test

      - name: Test and build Marty Blog
        working-directory: marty-blog
        run: npm ci && npm test && npm run build

      - name: Test and build Marty Subscriptions
        working-directory: marty-subscriptions
        run: npm ci && npm test && npm run build

  verify-credentials-service:
    name: Verify Pinned Issuance Service
    needs: [validate-release-manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Configure Git auth for private repos
        run: git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-core
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_CORE_REF }}
          path: marty-core

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-credentials
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_CREDENTIALS_REF }}
          path: marty-credentials

      - uses: dtolnay/rust-toolchain@nightly

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install native issuance test dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev perl clang

      - name: Build Python bindings and install service test dependencies
        run: |
          python -m pip install --disable-pip-version-check maturin pytest pytest-asyncio
          cd marty-credentials/rust/marty-rs
          maturin build --release --features python --out /tmp/marty-wheels
          cd ../../..
          pip install /tmp/marty-wheels/*.whl
          pip install -e '.[dev]'

      - name: Require one issuance migration head
        working-directory: marty-credentials/services/issuance/infrastructure/migrations
        run: python -m alembic -c alembic.ini heads | tee /tmp/issuance-heads.txt && test "$(grep -c '(head)' /tmp/issuance-heads.txt)" -eq 1

      - name: Run issuance service tests
        working-directory: marty-credentials
        run: pytest tests/ -q

  verify-core:
    name: Verify Pinned Marty Core
    needs: [validate-release-manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-core
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_CORE_REF }}
          path: marty-core

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: marty-core

      - name: Install native core test dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev perl clang

      - name: Test Marty Core workspace
        working-directory: marty-core
        run: cargo test --workspace --locked

  build-wheel:
    name: Build Rust Wheel
    needs: [validate-release-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure Git auth for private repos
        run: git config --global url."https://x-access-token:${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-core
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_CORE_REF }}
          path: marty-core

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-credentials
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_CREDENTIALS_REF }}
          path: marty-credentials

      - uses: dtolnay/rust-toolchain@nightly
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          pip install maturin
          sudo apt-get update && sudo apt-get install -y \
            pkg-config libssl-dev libzstd-dev clang

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            marty-credentials/rust/marty-rs/target
          key: wheel-${{ runner.os }}-${{ hashFiles('marty-credentials/Cargo.lock') }}

      - name: Build marty-rs wheel
        run: |
          cd marty-credentials/rust/marty-rs
          CXX=clang++ CC=clang maturin build --release --features python --out $GITHUB_WORKSPACE/wheels

      - uses: actions/upload-artifact@v4
        with:
          name: marty-rs-wheel
          path: wheels/*.whl
          retention-days: 1

  determine-tag:
    name: Determine Image Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.VERSION }}
    steps:
      - name: Set tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ inputs.tag }}" ]]; then
            echo "VERSION=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

  release-manifest:
    name: Build Atomic Release Manifest
    needs: [validate-release-manifest, verify-protocol-bindings, verify-coordinated-js, verify-credentials-service, verify-core, determine-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write pinned release manifest
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.determine-tag.outputs.version }}
        run: |
          WALTID_WALLET_API_IMAGE="$(jq -r '.waltid.wallet_api_image' deploy-config/catalog/wallet-test-images.json)"
          WALTID_WEB_WALLET_IMAGE="$(jq -r '.waltid.web_wallet_image' deploy-config/catalog/wallet-test-images.json)"
          jq -n \
            --arg release_version "$RELEASE_VERSION" \
            --arg marty_ui_sha "$GITHUB_SHA" \
            --arg marty_protocol_sha "$MARTY_PROTOCOL_REF" \
            --arg marty_credentials_sha "$MARTY_CREDENTIALS_REF" \
            --arg marty_core_sha "$MARTY_CORE_REF" \
            --arg marty_cli_sha "$MARTY_CLI_REF" \
            --arg marty_blog_sha "$MARTY_BLOG_REF" \
            --arg marty_subscriptions_sha "$MARTY_SUBSCRIPTIONS_REF" \
            --arg mip_version "0.3.1" \
            --arg services_image "${IMAGE_PREFIX}/services:${RELEASE_VERSION}" \
            --arg ui_image "${IMAGE_PREFIX}/ui:${RELEASE_VERSION}" \
            --arg ui_selfhost_image "${IMAGE_PREFIX}/ui-selfhost:${RELEASE_VERSION}" \
            --arg migrations_image "${IMAGE_PREFIX}/db-migrate:${RELEASE_VERSION}" \
            --arg waltid_wallet_api "$WALTID_WALLET_API_IMAGE" \
            --arg waltid_web_wallet "$WALTID_WEB_WALLET_IMAGE" \
            '{
              release_version: $release_version,
              mip_version: $mip_version,
              repositories: {
                marty_ui: $marty_ui_sha,
                marty_protocol: $marty_protocol_sha,
                marty_credentials: $marty_credentials_sha,
                marty_core: $marty_core_sha,
                marty_cli: $marty_cli_sha,
                marty_blog: $marty_blog_sha,
                marty_subscriptions: $marty_subscriptions_sha
              },
              images: {
                services: $services_image,
                ui: $ui_image,
                ui_selfhost: $ui_selfhost_image,
                migrations: $migrations_image,
                waltid_wallet_api: $waltid_wallet_api,
                waltid_web_wallet: $waltid_web_wallet
              },
              mixed_versions_supported: false
            }' > release-manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ needs.determine-tag.outputs.version }}
          path: release-manifest.json
          retention-days: 90

  build-services:
    name: Build & Push Services Image
    needs: [build-wheel, determine-tag, release-manifest]
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.services-image.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-credentials
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_CREDENTIALS_REF }}
          path: _marty-credentials
          sparse-checkout: |
            services/issuance
            python/status_list

      - uses: actions/download-artifact@v4
        with:
          name: marty-rs-wheel
          path: release-wheels

      - name: Include issuance service
        run: |
          cp -r _marty-credentials/services/issuance services/issuance
          cp -r _marty-credentials/python/status_list status_list

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Build and push
        id: services-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/Dockerfile.prod
          push: true
          build-args: |
            MARTY_RELEASE_VERSION=${{ needs.determine-tag.outputs.version }}
            MARTY_UI_SHA=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/services:${{ needs.determine-tag.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/services:latest
          cache-from: type=gha,scope=services
          cache-to: type=gha,mode=max,scope=services

  build-ui:
    name: Build & Push UI Images
    needs: [determine-tag, release-manifest]
    runs-on: ubuntu-latest
    outputs:
      public_digest: ${{ steps.public-ui-image.outputs.digest }}
      selfhost_digest: ${{ steps.selfhost-ui-image.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-cli
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_CLI_REF }}
          path: _marty-cli
          sparse-checkout: packages/api-core

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-blog
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_BLOG_REF }}
          path: _marty-blog

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-subscriptions
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_SUBSCRIPTIONS_REF }}
          path: _marty-subscriptions

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Build and push public UI image
        id: public-ui-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/ui.Dockerfile
          build-contexts: |
            marty-cli=./_marty-cli
            marty-blog=./_marty-blog
            marty-subscriptions=./_marty-subscriptions
          build-args: |
            MARTY_RELEASE_VERSION=${{ needs.determine-tag.outputs.version }}
            MARTY_UI_SHA=${{ github.sha }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/ui:${{ needs.determine-tag.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/ui:latest
          cache-from: type=gha,scope=ui
          cache-to: type=gha,mode=max,scope=ui

      - name: Build and push self-host UI image
        id: selfhost-ui-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/ui.Dockerfile
          build-contexts: |
            marty-cli=./_marty-cli
            marty-blog=./_marty-blog
            marty-subscriptions=./_marty-subscriptions
          push: true
          build-args: |
            UI_VARIANT=selfhost
            MARTY_RELEASE_VERSION=${{ needs.determine-tag.outputs.version }}
            MARTY_UI_SHA=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/ui-selfhost:${{ needs.determine-tag.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/ui-selfhost:latest
          cache-from: type=gha,scope=ui-selfhost
          cache-to: type=gha,mode=max,scope=ui-selfhost

  build-migrations:
    name: Build & Push Migrations Image
    needs: [determine-tag, release-manifest]
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.migrations-image.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ElevenID/marty-credentials
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: ${{ env.MARTY_CREDENTIALS_REF }}
          path: _marty-credentials
          sparse-checkout: services/issuance

      - name: Include issuance migrations
        run: |
          cp -r _marty-credentials/services/issuance services/issuance

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Build and push
        id: migrations-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/Dockerfile.migrations.prod
          push: true
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/db-migrate:${{ needs.determine-tag.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/db-migrate:latest
          cache-from: type=gha,scope=migrations
          cache-to: type=gha,mode=max,scope=migrations

  rehearse-migrations:
    name: Rehearse One-Way Migration
    needs: [build-migrations, determine-tag, release-manifest]
    runs-on: ubuntu-latest
    environment: beta-migration-rehearsal
    permissions:
      contents: read
      packages: read
    outputs:
      mode: ${{ steps.rehearsal-mode.outputs.mode }}
      snapshot_id: ${{ steps.rehearsal-mode.outputs.snapshot_id }}
      public_origin: ${{ steps.rehearsal-mode.outputs.public_origin }}
    env:
      DATABASE_URL: ${{ secrets.MIGRATION_REHEARSAL_DATABASE_URL }}
      DATABASE_MARKER: ${{ secrets.MIGRATION_REHEARSAL_DATABASE_MARKER }}
      REHEARSAL_SNAPSHOT_ID: ${{ vars.MIGRATION_REHEARSAL_SNAPSHOT_ID }}
      REHEARSAL_PUBLIC_API_URL: ${{ vars.MIGRATION_REHEARSAL_PUBLIC_API_URL }}
      REHEARSAL_MODE: beta-copy
      RELEASE_VERSION: ${{ needs.determine-tag.outputs.version }}
    steps:
      - name: Record rehearsal mode
        id: rehearsal-mode
        run: |
          echo "mode=$REHEARSAL_MODE" >> "$GITHUB_OUTPUT"
          echo "snapshot_id=$REHEARSAL_SNAPSHOT_ID" >> "$GITHUB_OUTPUT"
          echo "public_origin=$REHEARSAL_PUBLIC_API_URL" >> "$GITHUB_OUTPUT"

      - name: Require an explicitly marked rehearsal database
        shell: bash
        run: |
          if [[ -z "$DATABASE_URL" || -z "$DATABASE_MARKER" || ${#DATABASE_MARKER} -lt 6 ]]; then
            echo "A protected beta-copy database URL and marker of at least six characters are required." >&2
            exit 1
          fi
          if [[ ! "$DATABASE_MARKER" =~ ^beta-copy-[a-zA-Z0-9._-]+$ ]]; then
            echo "The safety marker must begin with beta-copy-." >&2
            exit 1
          fi
          if [[ "$DATABASE_URL" != *"$DATABASE_MARKER"* ]]; then
            echo "The rehearsal database URL does not contain the required safety marker." >&2
            exit 1
          fi
          if [[ ! "$REHEARSAL_SNAPSHOT_ID" =~ ^[a-zA-Z0-9][a-zA-Z0-9._:-]{5,127}$ ]]; then
            echo "MIGRATION_REHEARSAL_SNAPSHOT_ID must identify the restored beta snapshot." >&2
            exit 1
          fi
          if [[ ! "$REHEARSAL_PUBLIC_API_URL" =~ ^https://[^/]+$ ]]; then
            echo "MIGRATION_REHEARSAL_PUBLIC_API_URL must be the absolute HTTPS beta origin." >&2
            exit 1
          fi
          if [[ "$REHEARSAL_PUBLIC_API_URL" == *"marty.example"* || "$REHEARSAL_PUBLIC_API_URL" == *"gateway"* ]]; then
            echo "MIGRATION_REHEARSAL_PUBLIC_API_URL cannot use an internal or placeholder host." >&2
            exit 1
          fi

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Apply relational migrations
        run: |
          docker run --rm \
            --network host \
            --entrypoint python \
            -e DATABASE_URL \
            -e PUBLIC_API_URL="$REHEARSAL_PUBLIC_API_URL" \
            -e MARTY_MIGRATION_PROFILE=beta \
            -e MARTY_KMS_BOOTSTRAP_ENABLED=false \
            "${IMAGE_PREFIX}/db-migrate:${RELEASE_VERSION}" \
            /app/run_all_migrations.py

      - name: Verify relational migration heads
        run: |
          docker run --rm \
            --network host \
            --entrypoint python \
            -e DATABASE_URL \
            -e PUBLIC_API_URL="$REHEARSAL_PUBLIC_API_URL" \
            -e MARTY_MIGRATION_PROFILE=beta \
            -e MARTY_KMS_BOOTSTRAP_ENABLED=false \
            "${IMAGE_PREFIX}/db-migrate:${RELEASE_VERSION}" \
            /app/run_all_migrations.py --verify-only

      - name: Rehearse legacy applicant-store migration
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/applicant-rehearsal"
          cat > "$RUNNER_TEMP/applicant-rehearsal/applicant_store.json" <<'JSON'
          {
            "applications": [{
              "id": "application-rehearsal",
              "applicant_id": "applicant-rehearsal",
              "organization_id": "organization-rehearsal",
              "credential_configuration_id": "credential-template-rehearsal",
              "status": "approved",
              "metadata": {
                "given_name": "Rehearsal",
                "canvas_lti": {"state": "synthetic"},
                "credential_offer_uri": "openid-credential-offer://synthetic",
                "auto_approve": true
              }
            }]
          }
          JSON
          docker run --rm \
            -v "$RUNNER_TEMP/applicant-rehearsal:/rehearsal" \
            -e APPLICANT_DATA_FILE=/rehearsal/applicant_store.json \
            -e 'APPLICATION_TEMPLATE_MIGRATION_MAP={"credential-template-rehearsal":"application-template-rehearsal"}' \
            --entrypoint python \
            "${IMAGE_PREFIX}/db-migrate:${RELEASE_VERSION}" \
            /app/applicant/migrate_store_v03.py
          jq -e '
            .schema_version == "MIP/0.3.0" and
            .applications[0].credential_template_id == "credential-template-rehearsal" and
            .applications[0].application_template_id == "application-template-rehearsal" and
            .applications[0].form_data.given_name == "Rehearsal" and
            .applications[0].integration_context.canvas_lti.state == "synthetic" and
            .applications[0].claim_state == "OFFER_READY" and
            (.applications[0] | has("metadata") | not)
          ' "$RUNNER_TEMP/applicant-rehearsal/applicant_store.json"
          test -f "$RUNNER_TEMP/applicant-rehearsal/applicant_store.json.mip-0.2.bak"

  build-ready-manifest:
    name: Publish Build-Ready Manifest
    needs:
      - build-services
      - build-ui
      - build-migrations
      - rehearse-migrations
      - release-manifest
      - determine-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-manifest-${{ needs.determine-tag.outputs.version }}

      - name: Attach registry digests and rehearsal result
        shell: bash
        env:
          SERVICES_DIGEST: ${{ needs.build-services.outputs.digest }}
          UI_DIGEST: ${{ needs.build-ui.outputs.public_digest }}
          UI_SELFHOST_DIGEST: ${{ needs.build-ui.outputs.selfhost_digest }}
          MIGRATIONS_DIGEST: ${{ needs.build-migrations.outputs.digest }}
          MIGRATION_REHEARSAL_MODE: ${{ needs.rehearse-migrations.outputs.mode }}
          MIGRATION_REHEARSAL_SNAPSHOT_ID: ${{ needs.rehearse-migrations.outputs.snapshot_id }}
          MIGRATION_REHEARSAL_PUBLIC_ORIGIN: ${{ needs.rehearse-migrations.outputs.public_origin }}
        run: |
          jq \
            --arg services "$SERVICES_DIGEST" \
            --arg ui "$UI_DIGEST" \
            --arg ui_selfhost "$UI_SELFHOST_DIGEST" \
            --arg migrations "$MIGRATIONS_DIGEST" \
            --arg migration_rehearsal_mode "$MIGRATION_REHEARSAL_MODE" \
            --arg migration_rehearsal_snapshot_id "$MIGRATION_REHEARSAL_SNAPSHOT_ID" \
            --arg migration_rehearsal_public_origin "$MIGRATION_REHEARSAL_PUBLIC_ORIGIN" \
            '. + {
              image_digests: {
                services: $services,
                ui: $ui,
                ui_selfhost: $ui_selfhost,
                migrations: $migrations
              },
              migration_rehearsal: {
                status: "passed",
                mode: $migration_rehearsal_mode,
                snapshot_id: $migration_rehearsal_snapshot_id,
                public_origin: $migration_rehearsal_public_origin
              },
              build_ready: true,
              release_ready: false
            }' release-manifest.json > build-ready-manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: build-ready-manifest-${{ needs.determine-tag.outputs.version }}
          path: build-ready-manifest.json
          retention-days: 90
