name: Stack release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      lock_file:
        description: Committed immutable stack lock
        required: true
        default: release/stack-lock.json

concurrency:
  group: stack-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  # The legacy marty-ui/* packages predate this repository and are not linked
  # to it, so their package ACL rejects this workflow's GITHUB_TOKEN. Keep the
  # public OSS release images in a repository-owned namespace instead.
  IMAGE: ghcr.io/elevenid/marty-ui-oss/ui
  SERVICES_IMAGE: ghcr.io/elevenid/marty-ui-oss/services
  MIGRATIONS_IMAGE: ghcr.io/elevenid/marty-ui-oss/migrations

jobs:
  validate-stack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    outputs:
      version: ${{ steps.components.outputs.version }}
      api_core_version: ${{ steps.components.outputs.api_core }}
      api_core_uri: ${{ steps.components.outputs.api_core_uri }}
      api_core_digest: ${{ steps.components.outputs.api_core_digest }}
      blog_version: ${{ steps.components.outputs.blog }}
      blog_uri: ${{ steps.components.outputs.blog_uri }}
      blog_digest: ${{ steps.components.outputs.blog_digest }}
      marty_rs_version: ${{ steps.components.outputs.marty_rs }}
      marty_rs_uri: ${{ steps.components.outputs.marty_rs_uri }}
      marty_rs_digest: ${{ steps.components.outputs.marty_rs_digest }}
      marty_common_version: ${{ steps.components.outputs.marty_common }}
      marty_common_uri: ${{ steps.components.outputs.marty_common_uri }}
      marty_common_digest: ${{ steps.components.outputs.marty_common_digest }}
      cli_version: ${{ steps.components.outputs.cli }}
      cli_uri: ${{ steps.components.outputs.cli_uri }}
      cli_digest: ${{ steps.components.outputs.cli_digest }}
      integration_commit: ${{ steps.components.outputs.integration_commit }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - id: components
        env:
          LOCK_FILE: ${{ inputs.lock_file || 'release/stack-lock.json' }}
        shell: bash
        run: |
          set -euo pipefail
          test -f "$LOCK_FILE"
          python scripts/build_stack_manifest.py --lock "$LOCK_FILE" --verify-http
          release="$(jq -r .release "$LOCK_FILE")"
          version="${release#marty-ui@}"
          test "$release" = "marty-ui@$version"
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            test "$GITHUB_REF_NAME" = "v$version"
          fi
          {
            echo "version=$version"
            echo "api_core=$(jq -er '.components[] | select(.name == "marty-api-core") | .version' "$LOCK_FILE")"
            echo "api_core_uri=$(jq -er '.components[] | select(.name == "marty-api-core") | .artifacts[] | select(.type == "npm") | .uri' "$LOCK_FILE")"
            echo "api_core_digest=$(jq -er '.components[] | select(.name == "marty-api-core") | .artifacts[] | select(.type == "npm") | .digest' "$LOCK_FILE")"
            echo "blog=$(jq -er '.components[] | select(.name == "marty-blog") | .version' "$LOCK_FILE")"
            echo "blog_uri=$(jq -er '.components[] | select(.name == "marty-blog") | .artifacts[] | select(.type == "npm") | .uri' "$LOCK_FILE")"
            echo "blog_digest=$(jq -er '.components[] | select(.name == "marty-blog") | .artifacts[] | select(.type == "npm") | .digest' "$LOCK_FILE")"
            echo "marty_rs=$(jq -er '.components[] | select(.name == "marty-core-python") | .version' "$LOCK_FILE")"
            echo "marty_rs_uri=$(jq -er '.components[] | select(.name == "marty-core-python") | .artifacts[] | select(.type == "python") | .uri' "$LOCK_FILE")"
            echo "marty_rs_digest=$(jq -er '.components[] | select(.name == "marty-core-python") | .artifacts[] | select(.type == "python") | .digest' "$LOCK_FILE")"
            echo "marty_common=$(jq -er '.components[] | select(.name == "marty-common") | .version' "$LOCK_FILE")"
            echo "marty_common_uri=$(jq -er '.components[] | select(.name == "marty-common") | .artifacts[] | select(.type == "python") | .uri' "$LOCK_FILE")"
            echo "marty_common_digest=$(jq -er '.components[] | select(.name == "marty-common") | .artifacts[] | select(.type == "python") | .digest' "$LOCK_FILE")"
            echo "cli=$(jq -er '.components[] | select(.name == "marty-cli") | .version' "$LOCK_FILE")"
            echo "cli_uri=$(jq -er '.components[] | select(.name == "marty-cli") | .artifacts[] | select(.type == "npm") | .uri' "$LOCK_FILE")"
            echo "cli_digest=$(jq -er '.components[] | select(.name == "marty-cli") | .artifacts[] | select(.type == "npm") | .digest' "$LOCK_FILE")"
            echo "integration_commit=$(jq -er '.components[] | select(.name == "marty-integration-tests") | .commit' "$LOCK_FILE")"
          } >> "$GITHUB_OUTPUT"
      - name: Verify release artifact provenance
        env:
          GH_TOKEN: ${{ github.token }}
          LOCK_FILE: ${{ inputs.lock_file || 'release/stack-lock.json' }}
        shell: bash
        run: |
          set -euo pipefail
          artifact_dir=$(mktemp -d)
          trap 'rm -rf "$artifact_dir"' EXIT
          index=0
          jq -r '.components[] as $component | $component.artifacts[] | select(.type != "oci") | [$component.repository, .uri, .digest] | @tsv' "$LOCK_FILE" |
          while IFS=$'\t' read -r repository uri digest; do
            index=$((index + 1))
            artifact="$artifact_dir/$index-$(basename "$uri")"
            curl --fail --location --retry 3 --silent --show-error "$uri" --output "$artifact"
            printf '%s  %s\n' "${digest#sha256:}" "$artifact" | sha256sum --check --strict
            gh attestation verify "$artifact" --repo "$repository"
          done
      - name: Verify immutable OCI inputs and provenance
        env:
          GH_TOKEN: ${{ github.token }}
          LOCK_FILE: ${{ inputs.lock_file || 'release/stack-lock.json' }}
        shell: bash
        run: |
          set -euo pipefail
          jq -r '.components[] as $component | $component.artifacts[] | select(.type == "oci") | [$component.repository, .uri, .digest] | @tsv' "$LOCK_FILE" |
          while IFS=$'\t' read -r repository uri digest; do
            docker pull "$uri@$digest"
            gh attestation verify "oci://$uri@$digest" --repo "$repository"
          done

  build-ui:
    needs: validate-stack
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: docker/ui.Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ needs.validate-stack.outputs.version }}
          build-args: |
            MARTY_RELEASE_VERSION=${{ needs.validate-stack.outputs.version }}
            MARTY_UI_SHA=${{ github.sha }}
            MARTY_API_CORE_VERSION=${{ needs.validate-stack.outputs.api_core_version }}
            MARTY_API_CORE_URI=${{ needs.validate-stack.outputs.api_core_uri }}
            MARTY_API_CORE_DIGEST=${{ needs.validate-stack.outputs.api_core_digest }}
            MARTY_BLOG_VERSION=${{ needs.validate-stack.outputs.blog_version }}
            MARTY_BLOG_URI=${{ needs.validate-stack.outputs.blog_uri }}
            MARTY_BLOG_DIGEST=${{ needs.validate-stack.outputs.blog_digest }}
          provenance: mode=max
          sbom: true
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159
      - run: cosign sign --yes "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"

  build-services:
    needs: validate-stack
    runs-on: ubuntu-latest
    outputs:
      services_digest: ${{ steps.services.outputs.digest }}
      migrations_digest: ${{ steps.migrations.outputs.digest }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: services
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: services/Dockerfile
          push: true
          tags: ${{ env.SERVICES_IMAGE }}:${{ needs.validate-stack.outputs.version }}
          build-args: |
            SERVICE_NAME=gateway
            MARTY_RELEASE_VERSION=${{ needs.validate-stack.outputs.version }}
            MARTY_UI_SHA=${{ github.sha }}
            MARTY_RS_VERSION=${{ needs.validate-stack.outputs.marty_rs_version }}
            MARTY_RS_URI=${{ needs.validate-stack.outputs.marty_rs_uri }}
            MARTY_RS_DIGEST=${{ needs.validate-stack.outputs.marty_rs_digest }}
            MARTY_COMMON_VERSION=${{ needs.validate-stack.outputs.marty_common_version }}
            MARTY_COMMON_URI=${{ needs.validate-stack.outputs.marty_common_uri }}
            MARTY_COMMON_DIGEST=${{ needs.validate-stack.outputs.marty_common_digest }}
          provenance: mode=max
          sbom: true
      - id: migrations
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: services/Dockerfile.migrations
          push: true
          tags: ${{ env.MIGRATIONS_IMAGE }}:${{ needs.validate-stack.outputs.version }}
          build-args: |
            MARTY_RELEASE_VERSION=${{ needs.validate-stack.outputs.version }}
            MARTY_UI_SHA=${{ github.sha }}
            MARTY_COMMON_VERSION=${{ needs.validate-stack.outputs.marty_common_version }}
            MARTY_COMMON_URI=${{ needs.validate-stack.outputs.marty_common_uri }}
            MARTY_COMMON_DIGEST=${{ needs.validate-stack.outputs.marty_common_digest }}
          provenance: mode=max
          sbom: true
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-name: ${{ env.SERVICES_IMAGE }}
          subject-digest: ${{ steps.services.outputs.digest }}
          push-to-registry: true
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-name: ${{ env.MIGRATIONS_IMAGE }}
          subject-digest: ${{ steps.migrations.outputs.digest }}
          push-to-registry: true
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159
      - name: Sign images by digest
        run: |
          cosign sign --yes "${{ env.SERVICES_IMAGE }}@${{ steps.services.outputs.digest }}"
          cosign sign --yes "${{ env.MIGRATIONS_IMAGE }}@${{ steps.migrations.outputs.digest }}"

  public-stack-smoke:
    needs: [validate-stack, build-ui, build-services]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: marty-ui
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ElevenID/marty-integration-tests
          ref: ${{ needs.validate-stack.outputs.integration_commit }}
          path: integration-tests
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - name: Build candidate stack manifest
        env:
          LOCK_FILE: ${{ inputs.lock_file || 'release/stack-lock.json' }}
          UI_DIGEST: ${{ needs.build-ui.outputs.digest }}
          SERVICES_DIGEST: ${{ needs.build-services.outputs.services_digest }}
          MIGRATIONS_DIGEST: ${{ needs.build-services.outputs.migrations_digest }}
          VERSION: ${{ needs.validate-stack.outputs.version }}
        working-directory: marty-ui
        shell: bash
        run: |
          jq \
            --arg sha "$GITHUB_SHA" \
            --arg version "$VERSION" \
            --arg ui_digest "$UI_DIGEST" \
            --arg services_digest "$SERVICES_DIGEST" \
            --arg migrations_digest "$MIGRATIONS_DIGEST" '
            .components += [{
              name: "marty-ui",
              repository: "ElevenID/marty-ui",
              version: $version,
              commit: $sha,
              artifacts: [
                {type: "oci", uri: "ghcr.io/elevenid/marty-ui-oss/ui", digest: $ui_digest,
                 sbom: "https://github.com/ElevenID/marty-ui/attestations",
                 provenance: "https://github.com/ElevenID/marty-ui/attestations"},
                {type: "oci", uri: "ghcr.io/elevenid/marty-ui-oss/services", digest: $services_digest,
                 sbom: "https://github.com/ElevenID/marty-ui/attestations",
                 provenance: "https://github.com/ElevenID/marty-ui/attestations"},
                {type: "oci", uri: "ghcr.io/elevenid/marty-ui-oss/migrations", digest: $migrations_digest,
                 sbom: "https://github.com/ElevenID/marty-ui/attestations",
                 provenance: "https://github.com/ElevenID/marty-ui/attestations"}
              ]
            }]
          ' "$LOCK_FILE" > release/candidate-stack-lock.json
          python scripts/build_stack_manifest.py \
            --lock release/candidate-stack-lock.json \
            --output ../integration-tests/stack-manifest.json
      - name: Pull immutable release images
        working-directory: integration-tests
        shell: bash
        run: |
          set -euo pipefail
          jq -r '.components[].artifacts[] | select(.type == "oci") | .uri + "@" + .digest' stack-manifest.json |
          while IFS= read -r image; do
            docker pull "$image"
          done
      - name: Reject commerce configuration
        working-directory: integration-tests
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r image; do
            if docker inspect "$image" | grep -Eqi 'square|subscription|product[_-]?catalog|billing'; then
              echo "::error::Forbidden commerce marker in $image"
              exit 1
            fi
          done < <(jq -r '.components[].artifacts[] | select(.type == "oci") | .uri + "@" + .digest' stack-manifest.json)
      - name: Smoke-test UI image
        shell: bash
        run: |
          docker run --rm -d --name marty-ui-smoke -p 18080:80 "${{ env.IMAGE }}@${{ needs.build-ui.outputs.digest }}"
          for _ in $(seq 1 30); do
            curl --fail --silent http://127.0.0.1:18080/ >/dev/null && exit 0
            sleep 1
          done
          docker logs marty-ui-smoke
          exit 1
      - name: Install the released test interface
        working-directory: integration-tests
        env:
          API_CORE_URI: ${{ needs.validate-stack.outputs.api_core_uri }}
          API_CORE_DIGEST: ${{ needs.validate-stack.outputs.api_core_digest }}
          CLI_URI: ${{ needs.validate-stack.outputs.cli_uri }}
          CLI_DIGEST: ${{ needs.validate-stack.outputs.cli_digest }}
        run: |
          python -m pip install .
          curl --fail --location --silent --show-error "$API_CORE_URI" --output /tmp/marty-api-core.tgz
          curl --fail --location --silent --show-error "$CLI_URI" --output /tmp/marty-cli.tgz
          echo "${API_CORE_DIGEST#sha256:}  /tmp/marty-api-core.tgz" | sha256sum --check --strict
          echo "${CLI_DIGEST#sha256:}  /tmp/marty-cli.tgz" | sha256sum --check --strict
          npm install --global /tmp/marty-api-core.tgz /tmp/marty-cli.tgz
      - name: Validate upgrade and rollback image roles
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: integration-tests
        shell: bash
        run: |
          previous_tag=""
          while IFS= read -r candidate; do
            if [ "$(gh release view "$candidate" --repo ElevenID/marty-ui --json assets \
              --jq 'any(.assets[]; .name == "stack-manifest.json")')" = "true" ]; then
              previous_tag="$candidate"
              break
            fi
          done < <(gh release list --repo ElevenID/marty-ui --limit 20 --json tagName,isDraft \
            --jq '.[] | select(.isDraft == false and .tagName != env.GITHUB_REF_NAME) | .tagName')
          args=(--manifest stack-manifest.json --output .env.stack --pull)
          if [ -n "$previous_tag" ]; then
            mkdir previous
            gh release download "$previous_tag" --repo ElevenID/marty-ui \
              --pattern stack-manifest.json --dir previous
            args+=(--previous-manifest previous/stack-manifest.json)
          else
            echo "No previous public stack release; rollback comparison begins with the next release."
          fi
          python scripts/render_stack_env.py "${args[@]}"
          docker compose --env-file .env.stack config --quiet
      - name: Run the artifact-only public integration suite
        working-directory: integration-tests
        shell: bash
        run: |
          set -euo pipefail
          docker compose --env-file .env.stack up -d
          trap 'docker compose --env-file .env.stack logs --no-color > public-stack.log; docker compose --env-file .env.stack down -v' EXIT
          for attempt in $(seq 1 60); do
            curl --fail --silent http://127.0.0.1:28000/health >/dev/null && break
            if [ "$attempt" = 60 ]; then exit 1; fi
            sleep 2
          done
          pytest tests/integration -m "integration and not wallet and not marty_wallet and not conformance and not ui_contract" -v

  publish-manifest:
    needs: [validate-stack, build-ui, build-services, public-stack-smoke]
    runs-on: ubuntu-latest
    environment: stack-release
    permissions:
      contents: write
      packages: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.IMAGE }}@${{ needs.build-ui.outputs.digest }}
          format: cyclonedx-json
          output-file: marty-ui-sbom.cdx.json
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.SERVICES_IMAGE }}@${{ needs.build-services.outputs.services_digest }}
          format: cyclonedx-json
          output-file: marty-ui-services-sbom.cdx.json
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.MIGRATIONS_IMAGE }}@${{ needs.build-services.outputs.migrations_digest }}
          format: cyclonedx-json
          output-file: marty-ui-migrations-sbom.cdx.json
      - name: Add immutable UI evidence
        env:
          LOCK_FILE: ${{ inputs.lock_file || 'release/stack-lock.json' }}
          UI_DIGEST: ${{ needs.build-ui.outputs.digest }}
          SERVICES_DIGEST: ${{ needs.build-services.outputs.services_digest }}
          MIGRATIONS_DIGEST: ${{ needs.build-services.outputs.migrations_digest }}
          VERSION: ${{ needs.validate-stack.outputs.version }}
        shell: bash
        run: |
          jq \
            --arg sha "$GITHUB_SHA" \
            --arg version "$VERSION" \
            --arg ui_digest "$UI_DIGEST" \
            --arg services_digest "$SERVICES_DIGEST" \
            --arg migrations_digest "$MIGRATIONS_DIGEST" '
            .components += [{
              name: "marty-ui",
              repository: "ElevenID/marty-ui",
              version: $version,
              commit: $sha,
              artifacts: [
                {type: "oci", uri: "ghcr.io/elevenid/marty-ui-oss/ui", digest: $ui_digest,
                 sbom: ("https://github.com/ElevenID/marty-ui/releases/download/v" + $version + "/marty-ui-sbom.cdx.json"),
                 provenance: "https://github.com/ElevenID/marty-ui/attestations"},
                {type: "oci", uri: "ghcr.io/elevenid/marty-ui-oss/services", digest: $services_digest,
                 sbom: ("https://github.com/ElevenID/marty-ui/releases/download/v" + $version + "/marty-ui-services-sbom.cdx.json"),
                 provenance: "https://github.com/ElevenID/marty-ui/attestations"},
                {type: "oci", uri: "ghcr.io/elevenid/marty-ui-oss/migrations", digest: $migrations_digest,
                 sbom: ("https://github.com/ElevenID/marty-ui/releases/download/v" + $version + "/marty-ui-migrations-sbom.cdx.json"),
                 provenance: "https://github.com/ElevenID/marty-ui/attestations"}
              ]
            }]
          ' "$LOCK_FILE" > release/complete-stack-lock.json
          python scripts/build_stack_manifest.py --lock release/complete-stack-lock.json --output stack-manifest.json
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159
      - name: Sign and checksum manifest evidence
        shell: bash
        run: |
          for file in stack-manifest.json marty-ui-sbom.cdx.json marty-ui-services-sbom.cdx.json marty-ui-migrations-sbom.cdx.json; do
            cosign sign-blob --yes --bundle "${file}.sigstore.json" "$file"
          done
          sha256sum stack-manifest.json ./*.cdx.json ./*.sigstore.json > SHA256SUMS
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: |
            stack-manifest.json
            marty-ui-sbom.cdx.json
            marty-ui-services-sbom.cdx.json
            marty-ui-migrations-sbom.cdx.json
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: |
            stack-manifest.json
            *.cdx.json
            *.sigstore.json
            SHA256SUMS
