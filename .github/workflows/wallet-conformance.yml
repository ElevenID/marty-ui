name: MIP 0.3 Wallet Conformance And Release Attestation

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version used by the build-ready manifest artifact
        required: true
      cd_run_id:
        description: Successful CD workflow run containing the build-ready manifest
        required: true
      beta_lifecycle_run_id:
        description: Successful beta lifecycle workflow run for the same Marty UI SHA
        required: true
      marty_ui_sha:
        description: Exact 40-character Marty UI commit SHA under test
        required: true
      beta_origin:
        description: Beta origin tested by both browser and device lanes
        required: true
        default: https://beta.elevenidllc.com
      wallet_evidence_url:
        description: HTTPS URL for the protected device-lab evidence JSON
        required: true
      wallet_evidence_sha256:
        description: SHA-256 of the exact device-lab evidence JSON
        required: true

concurrency:
  group: mip-03-wallet-conformance-${{ inputs.release_version }}
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  attest-release:
    name: Validate Device Evidence And Promote Release Manifest
    runs-on: ubuntu-latest
    environment: wallet-conformance
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ inputs.release_version }}
      CD_RUN_ID: ${{ inputs.cd_run_id }}
      BETA_LIFECYCLE_RUN_ID: ${{ inputs.beta_lifecycle_run_id }}
      MARTY_UI_SHA: ${{ inputs.marty_ui_sha }}
      BETA_ORIGIN: ${{ inputs.beta_origin }}
      WALLET_EVIDENCE_URL: ${{ inputs.wallet_evidence_url }}
      WALLET_EVIDENCE_SHA256: ${{ inputs.wallet_evidence_sha256 }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.MARTY_UI_SHA }}

      - name: Require immutable release inputs
        shell: bash
        run: |
          if [[ ! "$MARTY_UI_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "marty_ui_sha must be a full 40-character commit SHA." >&2
            exit 1
          fi
          if [[ ! "$WALLET_EVIDENCE_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "wallet_evidence_sha256 must be a lowercase SHA-256." >&2
            exit 1
          fi
          if [[ ! "$CD_RUN_ID" =~ ^[0-9]+$ || ! "$BETA_LIFECYCLE_RUN_ID" =~ ^[0-9]+$ ]]; then
            echo "Workflow run IDs must be numeric." >&2
            exit 1
          fi
          if [[ "$WALLET_EVIDENCE_URL" != https://* ]]; then
            echo "wallet_evidence_url must use HTTPS." >&2
            exit 1
          fi
          test "$(git rev-parse HEAD)" = "$MARTY_UI_SHA"

      - name: Require successful source workflow runs
        shell: bash
        run: |
          verify_run() {
            local run_id="$1"
            local expected_workflow="$2"
            local run
            run="$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --json conclusion,headSha,status,workflowName)"
            test "$(jq -r '.status' <<<"$run")" = "completed"
            test "$(jq -r '.conclusion' <<<"$run")" = "success"
            test "$(jq -r '.headSha' <<<"$run")" = "$MARTY_UI_SHA"
            test "$(jq -r '.workflowName' <<<"$run")" = "$expected_workflow"
          }
          verify_run "$CD_RUN_ID" "CD"
          verify_run "$BETA_LIFECYCLE_RUN_ID" "MIP 0.3 Beta Credential Lifecycle"

      - name: Download build-ready manifest
        shell: bash
        run: |
          mkdir -p build-evidence
          gh run download "$CD_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "build-ready-manifest-$RELEASE_VERSION" \
            --dir build-evidence

      - name: Download beta lifecycle evidence
        shell: bash
        run: |
          mkdir -p beta-evidence
          gh run download "$BETA_LIFECYCLE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name mip-03-beta-credential-lifecycle \
            --dir beta-evidence

      - name: Download protected device-lab evidence
        shell: bash
        env:
          WALLET_EVIDENCE_BEARER_TOKEN: ${{ secrets.WALLET_EVIDENCE_BEARER_TOKEN }}
        run: |
          if [[ -n "$WALLET_EVIDENCE_BEARER_TOKEN" ]]; then
            curl --fail --silent --show-error --location \
              --proto '=https' --proto-redir '=https' --tlsv1.2 \
              --header "Authorization: Bearer $WALLET_EVIDENCE_BEARER_TOKEN" \
              --output wallet-conformance-evidence.json \
              "$WALLET_EVIDENCE_URL"
          else
            curl --fail --silent --show-error --location \
              --proto '=https' --proto-redir '=https' --tlsv1.2 \
              --output wallet-conformance-evidence.json \
              "$WALLET_EVIDENCE_URL"
          fi

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Verify protected attachment content
        env:
          WALLET_EVIDENCE_BEARER_TOKEN: ${{ secrets.WALLET_EVIDENCE_BEARER_TOKEN }}
        run: |
          python scripts/verify_wallet_attachments.py \
            --evidence wallet-conformance-evidence.json \
            --requirements deploy-config/catalog/wallet-conformance-requirements.json \
            --output-dir wallet-attachments \
            --report wallet-attachment-verification.json

      - name: Recheck live SpruceKit issuer metadata
        run: python scripts/check_spruceid_metadata.py --base "$BETA_ORIGIN"

      - name: Validate all gates and promote manifest
        shell: bash
        run: |
          python scripts/promote_release_evidence.py \
            --build-manifest build-evidence/build-ready-manifest.json \
            --beta-evidence beta-evidence \
            --wallet-evidence wallet-conformance-evidence.json \
            --wallet-evidence-sha256 "$WALLET_EVIDENCE_SHA256" \
            --attachment-verification wallet-attachment-verification.json \
            --requirements deploy-config/catalog/wallet-conformance-requirements.json \
            --release-version "$RELEASE_VERSION" \
            --cd-run-id "$CD_RUN_ID" \
            --beta-run-id "$BETA_LIFECYCLE_RUN_ID" \
            --promotion-run-id "$GITHUB_RUN_ID" \
            --marty-ui-sha "$MARTY_UI_SHA" \
            --beta-origin "$BETA_ORIGIN" \
            --output release-ready-manifest.json

      - name: Publish release-ready attestation
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-ready-manifest-${{ inputs.release_version }}
          path: release-ready-manifest.json
          if-no-files-found: error
          retention-days: 365

      - name: Write attestation summary
        shell: bash
        run: |
          jq -r '
            "## Release-ready attestation\n" +
            "- Release: `" + .release_version + "`\n" +
            "- Marty UI: `" + .repositories.marty_ui + "`\n" +
            "- Beta lifecycle run: `" + .release_attestation.beta_lifecycle.workflow_run_id + "`\n" +
            "- Wallet evidence: `" + .release_attestation.wallet_conformance.evidence_sha256 + "`\n" +
            "- Release ready: `" + (.release_ready | tostring) + "`"
          ' release-ready-manifest.json >> "$GITHUB_STEP_SUMMARY"
