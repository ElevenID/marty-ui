# Production UI Service for Cloudflare Tunnel
# Usage: docker compose -f docker-compose.ui-prod.yml up -d ui-prod
# Prereq: Run "cd ui && npm run build" first (or use make prod-ui-docker)

name: marty-ui-prod

services:
  ui-prod:
    image: nginx:alpine
    container_name: marty-ui-prod
    restart: unless-stopped
    ports:
      - "3002:80"
    volumes:
      - ./ui/dist:/usr/share/nginx/html:ro
      - ./ui/nginx.spa.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  default:
    external: true
    name: marty-infra-network
