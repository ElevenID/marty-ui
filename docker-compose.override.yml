# docker-compose.override.yml
# Local development overrides - automatically loaded by docker-compose
#
# OPTIMIZED FOR LOCAL DEVELOPMENT:
# - Uses pre-built Rust wheels from make build-wheels
# - Mounts sibling repos as volumes for editable installs
# - Python code hot-reloads via uvicorn --reload
# - Fast startup (seconds after wheels are built)
#
# Prerequisites:
#   make build-wheels  # Run once, or when Rust code changes
#
# Usage:
#   make dev           # Build wheels + start services (recommended)
#   make up            # Start services (assumes wheels exist)
#   make down          # Stop services

services:
  oid4vc-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      args:
        DEV_MODE: "true"

    # Mount sibling repos and local source for live development
    # marty-credentials and marty-core are writable for Rust build artifacts
    volumes:
      - ../marty-credentials:/app/marty-credentials
      - ../marty-core:/app/marty-core
      - ../marty-microservices-framework:/app/marty-microservices-framework:ro
      - ../Marty/packages/marty-common:/app/marty-common:ro
      - ./src:/app/src:ro
      - ./config:/app/config:ro

    environment:
      # Enable auto-reload for development
      DEV_MODE: "true"
      RELOAD: "true"
      PYTHONPATH: "/app/marty-credentials/python:/app/marty-microservices-framework:/app/marty-common:/app/src"
      SETUPTOOLS_SCM_PRETEND_VERSION: "0.1.0"

