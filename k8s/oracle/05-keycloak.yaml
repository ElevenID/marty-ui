---
# ================================================================
# Keycloak — Deployment + headless Service
# Exposed publicly via Cloudflare Tunnel at auth.elevenidllc.com
# ================================================================
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: marty-prod
  labels:
    app: keycloak
    app.kubernetes.io/part-of: marty-platform
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: keycloak
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: marty-prod
  labels:
    app: keycloak
    app.kubernetes.io/part-of: marty-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  strategy:
    type: Recreate      # single replica, avoid split-brain on upgrades
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      serviceAccountName: marty-app
      imagePullSecrets:
        - name: ocir-secret
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c',
            'until nc -z postgres 5432; do echo "waiting for postgres"; sleep 3; done']
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:25.0
          command:
            - start
          args:
            - --import-realm
          ports:
            - containerPort: 8080
          env:
            - name: KC_DB
              value: "postgres"
            - name: KC_DB_URL
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: KEYCLOAK_DB_URL
            - name: KC_DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: KEYCLOAK_DB_USER
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: KEYCLOAK_DB_PASSWORD
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: KC_HOSTNAME
            - name: KC_HOSTNAME_STRICT
              value: "true"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "true"
            # Cloudflare Tunnel terminates TLS; Keycloak sits behind it
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY
              value: "edge"
            - name: PUBLIC_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: PUBLIC_DOMAIN
            - name: UI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: UI_BASE_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: KEYCLOAK_REALM
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: MARTY_API_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: MARTY_API_CLIENT_SECRET
          resources:
            requests:
              memory: "768Mi"
              cpu: "250m"
            limits:
              memory: "1.5Gi"
              cpu: "750m"
          volumeMounts:
            - name: keycloak-realm
              mountPath: /opt/keycloak/data/import
              readOnly: true
            - name: keycloak-themes
              mountPath: /opt/keycloak/themes
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: keycloak-realm
          configMap:
            name: keycloak-realm-config
        - name: keycloak-themes
          emptyDir: {}    # mount your theme files via an init-container or a PVC if needed
---
# Keycloak configurator — one-shot Job that patches realm settings
# after Keycloak finishes importing the realm (Google OAuth URIs, etc.)
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-configurator
  namespace: marty-prod
  labels:
    app.kubernetes.io/part-of: marty-platform
  annotations:
    # Re-run by deleting and re-creating this Job when config changes.
    helm.sh/hook: post-install,post-upgrade
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-keycloak
          image: busybox:1.36
          command: ['sh', '-c',
            'until wget -q --spider http://keycloak:8080/health/ready; do echo "waiting for keycloak"; sleep 10; done']
      containers:
        - name: configurator
          image: quay.io/keycloak/keycloak:25.0
          command: ["/bin/bash", "/scripts/setup-keycloak.sh"]
          env:
            - name: KC_URL
              value: "http://keycloak:8080"
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: KEYCLOAK_REALM
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: PUBLIC_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: PUBLIC_DOMAIN
            - name: UI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: UI_BASE_URL
            - name: MARTY_API_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: MARTY_API_CLIENT_SECRET
          volumeMounts:
            - name: setup-script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: setup-script
          configMap:
            name: keycloak-setup-script
            defaultMode: 0755
---
# Placeholder ConfigMap for the realm JSON.
# The deploy script (scripts/deploy-oracle.sh) applies the actual realm
# from config/keycloak/ via kubectl create configmap --from-file.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: marty-prod
  annotations:
    note: "Overridden by deploy-oracle.sh which loads config/keycloak/*.json"
data: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-setup-script
  namespace: marty-prod
data:
  setup-keycloak.sh: |
    #!/bin/bash
    # Inline copy of scripts/setup-keycloak.sh — kept small; the source of truth
    # is scripts/setup-keycloak.sh in the repo which is mounted via ConfigMap.
    echo "Keycloak configurator: using mounted script from repo."
