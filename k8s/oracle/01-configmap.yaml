---
# ========================================================
# Kubernetes self-host reference ConfigMap
# Non-sensitive environment config shared by the runtime and migration job.
# ========================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: marty-config
  namespace: marty-prod
  labels:
    app.kubernetes.io/part-of: marty-platform
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"

  PUBLIC_DOMAIN: "${PUBLIC_DOMAIN}"
  UI_BASE_URL: "${UI_BASE_URL}"
  UI_ADDITIONAL_BASE_URLS: "${UI_ADDITIONAL_BASE_URLS}"
  PUBLIC_API_URL: "${PUBLIC_API_URL}"

  KEYCLOAK_REALM: "${KEYCLOAK_REALM}"
  KC_HOSTNAME: "${KC_HOSTNAME}"
  OIDC_CLIENT_ID: "${OIDC_CLIENT_ID}"
  OIDC_ISSUER_URL: "http://keycloak:8080/realms/${KEYCLOAK_REALM}"
  OIDC_EXTERNAL_ISSUER_URL: "${OIDC_ISSUER_URL_EXTERNAL}"
  OIDC_REDIRECT_URI: "${OIDC_REDIRECT_URI}"
  OIDC_POST_LOGOUT_REDIRECT_URI: "${OIDC_POST_LOGOUT_REDIRECT_URI}"
  KEYCLOAK_ADMIN_URL: "http://keycloak:8080"

  COOKIE_SECURE: "true"
  COOKIE_SAMESITE: "${COOKIE_SAMESITE}"
  SESSION_TTL_SECONDS: "86400"
  AUTH_SERVICE_INTERNAL_URL: "http://auth:8001"

  AUTH_SERVICE_URL: "http://auth:8001"
  ORGANIZATION_SERVICE_URL: "http://organization:8002"
  CREDENTIAL_TEMPLATE_SERVICE_URL: "http://credential-template:8003"
  TRUST_PROFILE_SERVICE_URL: "http://trust-profile:8004"
  ISSUANCE_SERVICE_URL: "http://issuance:8005"
  APPLICANT_SERVICE_URL: "http://applicant:8006"
  NOTIFICATION_SERVICE_URL: "http://notification:8007"
  COMPLIANCE_PROFILE_SERVICE_URL: "http://compliance-profile:8008"
  PRESENTATION_POLICY_SERVICE_URL: "http://presentation-policy:8009"
  DEPLOYMENT_PROFILE_SERVICE_URL: "http://deployment-profile:8010"
  FLOW_SERVICE_URL: "http://flow:8011"
  VERIFICATION_SERVICE_URL: "http://verification:8012"
  REVOCATION_PROFILE_SERVICE_URL: "http://revocation-profile:8013"
  DEVICE_REGISTRATION_SERVICE_URL: "http://device-registration:8014"
  BILLING_SERVICE_URL: "http://billing:8016"

  CORS_ORIGINS: "${CORS_ORIGINS}"

  POSTGRES_DB: "marty"
  POSTGRES_USER: "marty"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  KEYCLOAK_DB: "keycloak"
  KEYCLOAK_DB_USER: "keycloak"

  REDIS_URL: "redis://redis:6379/0"
  REDIS_DB_GATEWAY: "2"

  RABBITMQ_USER: "marty"
  RABBITMQ_VHOST: "/"

  SMTP_HOST: "${SMTP_HOST}"
  SMTP_PORT: "${SMTP_PORT}"

  CREDENTIAL_LOGIN_POLICY_ID: "${CREDENTIAL_LOGIN_POLICY_ID}"
  BAO_ADDR: "${BAO_ADDR}"
  MARTY_KMS_BOOTSTRAP_ENABLED: "${MARTY_KMS_BOOTSTRAP_ENABLED}"
  UNIVERSAL_RESOLVER_URL: "${UNIVERSAL_RESOLVER_URL}"
  CANVAS_CREDENTIALS_PROVIDER: "${CANVAS_CREDENTIALS_PROVIDER}"
  CANVAS_LTI_EXPERIENCE_BASE_URL: "${CANVAS_LTI_EXPERIENCE_BASE_URL}"
  CANVAS_OAUTH_COMPLETION_REDIRECT_URL: "${CANVAS_OAUTH_COMPLETION_REDIRECT_URL}"
  CANVAS_LTI_TOOL_SIGNING_ORGANIZATION_ID: "${CANVAS_LTI_TOOL_SIGNING_ORGANIZATION_ID}"
  CANVAS_LTI_TOOL_SIGNING_SERVICE_ID: "${CANVAS_LTI_TOOL_SIGNING_SERVICE_ID}"
  CANVAS_LTI_TOOL_SIGNING_KEY_REFERENCE: "${CANVAS_LTI_TOOL_SIGNING_KEY_REFERENCE}"
  CANVAS_CREDENTIAL_ISSUER_KEY_REFERENCES: "${CANVAS_CREDENTIAL_ISSUER_KEY_REFERENCES}"
  CANVAS_LTI_TOOL_ACTIVE_KID: "${CANVAS_LTI_TOOL_ACTIVE_KID}"
  CANVAS_LTI_TOOL_PUBLIC_JWKS: '${CANVAS_LTI_TOOL_PUBLIC_JWKS}'
  CANVAS_PORTABLE_INTEGRATION_ENABLED: "${CANVAS_PORTABLE_INTEGRATION_ENABLED}"
  CANVAS_PILOT_ORGANIZATION_IDS: "${CANVAS_PILOT_ORGANIZATION_IDS}"
  CANVAS_LEGACY_EVENT_INGEST_ENABLED: "${CANVAS_LEGACY_EVENT_INGEST_ENABLED}"
  CANVAS_PRIVATE_ORIGIN_ALLOWLIST: "${CANVAS_PRIVATE_ORIGIN_ALLOWLIST}"
  CANVAS_SELF_MANAGED_ORIGIN_ALLOWLIST: "${CANVAS_SELF_MANAGED_ORIGIN_ALLOWLIST}"
  CANVAS_BINDING_READINESS_MAX_AGE_SECONDS: "900"
  CANVAS_ISSUANCE_EVIDENCE_MAX_AGE_SECONDS: "900"
  CANVAS_BACKGROUND_ROSTER_BATCH_SIZE: "500"
  CANVAS_BACKGROUND_ROSTER_MAX_SIZE: "5000"
  CANVAS_SYNC_PROCESSOR: "issuance.infrastructure.api.canvas_routes:process_authoritative_canvas_sync_target"
  CANVAS_SYNC_WORKER_BATCH_SIZE: "10"
  CANVAS_SYNC_WORKER_LEASE_SECONDS: "120"
  CANVAS_SYNC_WORKER_JOB_TIMEOUT_SECONDS: "600"
  CANVAS_SYNC_SCHEDULE_LIMIT: "100"
  CANVAS_OAUTH_REVOCATION_BATCH_SIZE: "25"
  CANVAS_SYNC_WORKER_POLL_SECONDS: "5"
  CANVAS_CREDENTIALS_API_BASE_URL: "${CANVAS_CREDENTIALS_API_BASE_URL}"
  CANVAS_CREDENTIALS_API_ORIGIN_ALLOWLIST: "${CANVAS_CREDENTIALS_API_ORIGIN_ALLOWLIST}"
  CANVAS_CREDENTIALS_ISSUER_ID: "${CANVAS_CREDENTIALS_ISSUER_ID}"
  CANVAS_CREDENTIALS_BADGECLASS_ID: "${CANVAS_CREDENTIALS_BADGECLASS_ID}"
  CANVAS_CREDENTIALS_ASSERTION_SCOPE: "${CANVAS_CREDENTIALS_ASSERTION_SCOPE}"
  CANVAS_CREDENTIALS_PROVENANCE_BASE_URL: "${CANVAS_CREDENTIALS_PROVENANCE_BASE_URL}"
  CANVAS_CREDENTIALS_RECIPIENT_HASHED: "${CANVAS_CREDENTIALS_RECIPIENT_HASHED}"
  CANVAS_CREDENTIALS_ALLOW_DUPLICATE_AWARDS: "${CANVAS_CREDENTIALS_ALLOW_DUPLICATE_AWARDS}"

  MARTY_MIGRATION_PROFILE: "${MARTY_MIGRATION_PROFILE}"
  MARTY_ORG_ID: "${MARTY_ORG_ID}"
  MARTY_ORG_ADMIN_EMAIL: "${MARTY_ORG_ADMIN_EMAIL}"
  ORGANIZATION_CREATION_ENABLED: "${ORGANIZATION_CREATION_ENABLED}"
  KEYCLOAK_REMOVE_DEMO_USERS: "${KEYCLOAK_REMOVE_DEMO_USERS}"
  MARTY_LICENSE_ENFORCEMENT: "${MARTY_LICENSE_ENFORCEMENT}"
  MARTY_LICENSE_REQUIRED_ISSUER: "${MARTY_LICENSE_REQUIRED_ISSUER}"
  MARTY_LICENSE_REQUIRED_PLAN_TIER: "${MARTY_LICENSE_REQUIRED_PLAN_TIER}"
  MARTY_LICENSE_REQUIRED_PRODUCTS: "${MARTY_LICENSE_REQUIRED_PRODUCTS}"
  RATE_LIMIT_RPM: "${RATE_LIMIT_RPM}"

  SQUARE_ENVIRONMENT: "${SQUARE_ENVIRONMENT}"
  SQUARE_LOCATION_ID: "${SQUARE_LOCATION_ID}"
  SQUARE_PLAN_STARTER_ID: "${SQUARE_PLAN_STARTER_ID}"
  SQUARE_PLAN_PROFESSIONAL_ID: "${SQUARE_PLAN_PROFESSIONAL_ID}"
  SQUARE_PLAN_ENTERPRISE_ID: "${SQUARE_PLAN_ENTERPRISE_ID}"
