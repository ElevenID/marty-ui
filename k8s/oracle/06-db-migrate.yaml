---
# ================================================================
# Database Migration Job
# Runs Alembic migrations before any application service starts.
# Re-run by deleting the Job and applying again (or bump the name).
# ================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: marty-prod
  labels:
    app: db-migrate
    app.kubernetes.io/part-of: marty-platform
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: marty-app
      imagePullSecrets:
        - name: ocir-secret
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c',
            'until nc -z postgres 5432; do echo "waiting for postgres"; sleep 3; done']
      containers:
        - name: db-migrate
          # Same migrations image as the base Dockerfile.migrations
          image: ${OCIR_REGISTRY}/marty-ui/db-migrate:${IMAGE_TAG}
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: DATABASE_SYNC_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
