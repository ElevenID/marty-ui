# ================================================================
# 6. Issuance (:8005) — built from marty-credentials repo
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: issuance
  namespace: marty-prod
  labels:
    app: issuance
    app.kubernetes.io/part-of: marty-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: issuance
  template:
    metadata:
      labels:
        app: issuance
    spec:
      serviceAccountName: marty-app
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: issuance
          image: ${OCIR_REGISTRY}/marty-ui/issuance:${IMAGE_TAG}
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: marty-config
          ports:
            - containerPort: 8005
          env:
            - name: ISSUANCE_SERVICE_PORT
              value: "8005"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: RABBITMQ_URL
            - name: ISSUER_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: PUBLIC_API_URL
            - name: INTEGRATION_SECRET_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: INTEGRATION_SECRET_MASTER_KEY
            - name: CANVAS_CREDENTIALS_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: CANVAS_CREDENTIALS_SHARED_SECRET
            - name: CANVAS_CREDENTIALS_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_CREDENTIALS_PROVIDER
                  optional: true
            - name: CANVAS_LTI_EXPERIENCE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_LTI_EXPERIENCE_BASE_URL
                  optional: true
            - name: CANVAS_OAUTH_COMPLETION_REDIRECT_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_OAUTH_COMPLETION_REDIRECT_URL
                  optional: true
            - name: CANVAS_LTI_TOOL_SIGNING_ORGANIZATION_ID
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_LTI_TOOL_SIGNING_ORGANIZATION_ID
                  optional: true
            - name: CANVAS_LTI_TOOL_SIGNING_SERVICE_ID
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_LTI_TOOL_SIGNING_SERVICE_ID
                  optional: true
            - name: CANVAS_LTI_TOOL_SIGNING_KEY_REFERENCE
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_LTI_TOOL_SIGNING_KEY_REFERENCE
                  optional: true
            - name: CANVAS_CREDENTIAL_ISSUER_KEY_REFERENCES
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_CREDENTIAL_ISSUER_KEY_REFERENCES
                  optional: true
            - name: CANVAS_LTI_TOOL_ACTIVE_KID
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_LTI_TOOL_ACTIVE_KID
                  optional: true
            - name: CANVAS_LTI_TOOL_PUBLIC_JWKS
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_LTI_TOOL_PUBLIC_JWKS
                  optional: true
            - name: CANVAS_PORTABLE_INTEGRATION_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_PORTABLE_INTEGRATION_ENABLED
                  optional: true
            - name: CANVAS_PILOT_ORGANIZATION_IDS
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_PILOT_ORGANIZATION_IDS
                  optional: true
            - name: CANVAS_LEGACY_EVENT_INGEST_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_LEGACY_EVENT_INGEST_ENABLED
                  optional: true
            - name: CANVAS_PRIVATE_ORIGIN_ALLOWLIST
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_PRIVATE_ORIGIN_ALLOWLIST
                  optional: true
            - name: CANVAS_SELF_MANAGED_ORIGIN_ALLOWLIST
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_SELF_MANAGED_ORIGIN_ALLOWLIST
                  optional: true
            - name: CANVAS_CREDENTIALS_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_CREDENTIALS_API_BASE_URL
                  optional: true
            - name: CANVAS_CREDENTIALS_ISSUER_ID
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_CREDENTIALS_ISSUER_ID
                  optional: true
            - name: CANVAS_CREDENTIALS_BADGECLASS_ID
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_CREDENTIALS_BADGECLASS_ID
                  optional: true
            - name: CANVAS_CREDENTIALS_ASSERTION_SCOPE
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_CREDENTIALS_ASSERTION_SCOPE
                  optional: true
            - name: CANVAS_CREDENTIALS_PROVENANCE_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_CREDENTIALS_PROVENANCE_BASE_URL
                  optional: true
            - name: CANVAS_CREDENTIALS_RECIPIENT_HASHED
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_CREDENTIALS_RECIPIENT_HASHED
                  optional: true
            - name: CANVAS_CREDENTIALS_ALLOW_DUPLICATE_AWARDS
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CANVAS_CREDENTIALS_ALLOW_DUPLICATE_AWARDS
                  optional: true
            - name: SIGNING_KEYS_INTERNAL_URL
              value: "http://gateway:8000/internal/signing-keys"
            - name: SIGNING_KEYS_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: SIGNING_KEYS_INTERNAL_API_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: issuance
  namespace: marty-prod
spec:
  ports:
    - port: 8005
      targetPort: 8005
      name: http
  selector:
    app: issuance
---
# ================================================================
# 6a. Portable Canvas sync worker (headless, PostgreSQL-backed)
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: canvas-sync-worker
  namespace: marty-prod
  labels:
    app: canvas-sync-worker
    app.kubernetes.io/part-of: marty-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: canvas-sync-worker
  template:
    metadata:
      labels:
        app: canvas-sync-worker
    spec:
      serviceAccountName: marty-app
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: canvas-sync-worker
          image: ${OCIR_REGISTRY}/marty-ui/issuance:${IMAGE_TAG}
          imagePullPolicy: Always
          command: ["python"]
          args: ["-m", "issuance.canvas_worker"]
          envFrom:
            - configMapRef:
                name: marty-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: DATABASE_URL
            - name: INTEGRATION_SECRET_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: INTEGRATION_SECRET_MASTER_KEY
            - name: SIGNING_KEYS_INTERNAL_URL
              value: "http://gateway:8000/internal/signing-keys"
            - name: SIGNING_KEYS_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: SIGNING_KEYS_INTERNAL_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
# ================================================================
# 6b. Verification (:8012)
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: verification
  namespace: marty-prod
  labels:
    app: verification
    app.kubernetes.io/part-of: marty-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: verification
  template:
    metadata:
      labels:
        app: verification
    spec:
      serviceAccountName: marty-app
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: verification
          image: ${OCIR_REGISTRY}/marty-ui/verification:${IMAGE_TAG}
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: marty-config
          ports:
            - containerPort: 8012
            - containerPort: 9017
          env:
            - name: VERIFICATION_SERVICE_PORT
              value: "8012"
            - name: PP_GRPC_TARGET
              value: "presentation-policy:9009"
            - name: VERIF_GRPC_PORT
              value: "9017"
            - name: VERIF_GRPC_ENABLED
              value: "true"
            - name: PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: PUBLIC_API_URL
            - name: REDIS_URL
              value: "redis://redis:6379/3"
            - name: SIGNING_KEYS_INTERNAL_URL
              value: "http://gateway:8000/internal/signing-keys"
            - name: SIGNING_KEYS_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: SIGNING_KEYS_INTERNAL_API_KEY
