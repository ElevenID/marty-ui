---
# ================================================================
# Marty Microservices — Gateway + 10 backend services
# All images pulled from OCIR (${OCIR_REGISTRY}/marty-ui/<svc>:${IMAGE_TAG})
# ================================================================

# --------------------------------
# Helper macro: common env sources
# All services include these via envFrom equivalents below.
# --------------------------------

# ================================================================
# 1. Gateway — API Gateway (:8000)
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: marty-prod
  labels:
    app: gateway
    app.kubernetes.io/part-of: marty-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      serviceAccountName: marty-app
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: gateway
          image: ${OCIR_REGISTRY}/marty-ui/gateway:${IMAGE_TAG}
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: marty-config
          ports:
            - containerPort: 8000
          env:
            - name: GATEWAY_PORT
              value: "8000"
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: AUTH_SERVICE_URL
            - name: ORGANIZATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: ORGANIZATION_SERVICE_URL
            - name: CREDENTIAL_TEMPLATE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CREDENTIAL_TEMPLATE_SERVICE_URL
            - name: TRUST_PROFILE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: TRUST_PROFILE_SERVICE_URL
            - name: APPLICANT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: APPLICANT_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: NOTIFICATION_SERVICE_URL
            - name: COMPLIANCE_PROFILE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: COMPLIANCE_PROFILE_SERVICE_URL
            - name: PRESENTATION_POLICY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: PRESENTATION_POLICY_SERVICE_URL
            - name: DEPLOYMENT_PROFILE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: DEPLOYMENT_PROFILE_SERVICE_URL
            - name: FLOW_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: FLOW_SERVICE_URL
            - name: ISSUANCE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: ISSUANCE_SERVICE_URL
            - name: ISSUER_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: PUBLIC_API_URL
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CORS_ORIGINS
            - name: SIGNING_KEYS_INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: SIGNING_KEYS_INTERNAL_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: marty-prod
  labels:
    app: gateway
spec:
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: gateway
---
# ================================================================
# 2. Auth (:8001)
# ================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: marty-prod
  labels:
    app: auth
    app.kubernetes.io/part-of: marty-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      serviceAccountName: marty-app
      imagePullSecrets:
        - name: ocir-secret
      initContainers:
        - name: wait-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do sleep 2; done']
        - name: wait-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do sleep 2; done']
      containers:
        - name: auth
          image: ${OCIR_REGISTRY}/marty-ui/auth:${IMAGE_TAG}
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: marty-config
          ports:
            - containerPort: 8001
          env:
            - name: AUTH_SERVICE_PORT
              value: "8001"
            - name: UI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: UI_BASE_URL
            - name: UI_ADDITIONAL_BASE_URLS
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: UI_ADDITIONAL_BASE_URLS
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: REDIS_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: RABBITMQ_URL
            - name: OIDC_ISSUER_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: OIDC_ISSUER_URL_INTERNAL
            - name: OIDC_EXTERNAL_ISSUER_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: OIDC_ISSUER_URL_EXTERNAL
            - name: OIDC_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: OIDC_CLIENT_ID
            - name: OIDC_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: OIDC_REDIRECT_URI
            - name: OIDC_POST_LOGOUT_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: OIDC_POST_LOGOUT_REDIRECT_URI
            - name: SESSION_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: SESSION_TTL_SECONDS
            - name: COOKIE_SECURE
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: COOKIE_SECURE
            - name: KEYCLOAK_ADMIN_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: KEYCLOAK_ADMIN_URL
            - name: MARTY_API_CLIENT_ID
              value: "marty-api"
            - name: MARTY_API_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: marty-secrets
                  key: MARTY_API_CLIENT_SECRET
            - name: FLOW_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: FLOW_SERVICE_URL
            - name: CREDENTIAL_LOGIN_POLICY_ID
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: CREDENTIAL_LOGIN_POLICY_ID
            - name: AUTH_SERVICE_INTERNAL_URL
              valueFrom:
                configMapKeyRef:
                  name: marty-config
                  key: AUTH_SERVICE_INTERNAL_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: marty-prod
spec:
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  selector:
    app: auth
---
