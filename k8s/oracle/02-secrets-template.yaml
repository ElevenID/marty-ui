---
# =====================================================================
# Secrets template — reference contract for the Kubernetes self-host path.
#
# DO NOT commit real secrets to git.
# The deploy script reads these values from .env.production using VAR or
# VAR_FILE inputs and creates the Secret resources via kubectl.
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: marty-secrets
  namespace: marty-prod
  labels:
    app.kubernetes.io/part-of: marty-platform
type: Opaque
stringData:
  POSTGRES_PASSWORD: "CHANGE_ME_strong_postgres_password"
  KEYCLOAK_DB_PASSWORD: "CHANGE_ME_strong_keycloak_db_password"
  MARTY_DB_PASSWORD: "CHANGE_ME_strong_marty_db_password"
  DATABASE_URL: "postgresql+asyncpg://marty:CHANGE_ME_strong_marty_db_password@postgres:5432/marty"
  DATABASE_SYNC_URL: "postgresql://marty:CHANGE_ME_strong_marty_db_password@postgres:5432/marty"
  KEYCLOAK_DB_URL: "jdbc:postgresql://postgres:5432/keycloak"

  KEYCLOAK_ADMIN: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "CHANGE_ME_strong_keycloak_admin_password"
  MARTY_API_CLIENT_SECRET: "CHANGE_ME_strong_api_secret_min_32_chars"

  RABBITMQ_PASSWORD: "CHANGE_ME_strong_rabbitmq_password"
  RABBITMQ_URL: "amqp://marty:CHANGE_ME_strong_rabbitmq_password@rabbitmq:5672/"
  RABBITMQ_ERLANG_COOKIE: "CHANGE_ME_random_erlang_cookie_string"

  SESSION_SECRET_KEY: "CHANGE_ME_random_64_char_hex_string"
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  SMTP_USERNAME: ""
  SMTP_PASSWORD: ""

  ISSUANCE_API_KEY: "CHANGE_ME_issuance_api_key"
  SIGNING_KEYS_INTERNAL_API_KEY: "CHANGE_ME_signing_keys_internal_api_key"
  CANVAS_CREDENTIALS_SHARED_SECRET: ""
  OPENBAO_SERVICE_TOKEN: "CHANGE_ME_openbao_service_token"
  LICENSE_KEY: "CHANGE_ME_signed_license"
  LICENSE_PUBLIC_KEY: "CHANGE_ME_license_public_key"

  SQUARE_ACCESS_TOKEN: ""
  SQUARE_WEBHOOK_SIGNATURE_KEY: ""
