---
# =====================================================================
# Secrets template — fill in all values before applying.
#
# DO NOT commit real secrets to git.
# The deploy script (scripts/deploy-oracle.sh) reads these from your
# local .env.production file and creates the secrets via kubectl.
#
# To apply manually after filling in values:
#   kubectl apply -f k8s/oracle/02-secrets.yaml -n marty-prod
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: marty-secrets
  namespace: marty-prod
  labels:
    app.kubernetes.io/part-of: marty-platform
type: Opaque
stringData:
  # ---- Database -------------------------------------------------------
  POSTGRES_PASSWORD: "CHANGE_ME_strong_postgres_password"
  KEYCLOAK_DB_PASSWORD: "CHANGE_ME_strong_keycloak_db_password"
  DATABASE_URL: "postgresql+asyncpg://marty:CHANGE_ME_strong_postgres_password@postgres:5432/marty"
  DATABASE_SYNC_URL: "postgresql://marty:CHANGE_ME_strong_postgres_password@postgres:5432/marty"
  KEYCLOAK_DB_URL: "jdbc:postgresql://postgres:5432/keycloak"

  # ---- Keycloak admin -------------------------------------------------
  KEYCLOAK_ADMIN: "admin"
  KEYCLOAK_ADMIN_PASSWORD: "CHANGE_ME_strong_keycloak_admin_password"

  # ---- Keycloak service account (marty-api client) --------------------
  MARTY_API_CLIENT_SECRET: "CHANGE_ME_strong_api_secret_min_32_chars"

  # ---- RabbitMQ -------------------------------------------------------
  RABBITMQ_PASSWORD: "CHANGE_ME_strong_rabbitmq_password"
  # Full URL constructed from above — keep in sync
  RABBITMQ_URL: "amqp://marty:CHANGE_ME_strong_rabbitmq_password@rabbitmq:5672/"
  RABBITMQ_ERLANG_COOKIE: "CHANGE_ME_random_erlang_cookie_string"

  # ---- Session / JWT --------------------------------------------------
  SESSION_SECRET_KEY: "CHANGE_ME_random_64_char_hex_string"

  # ---- Google OAuth2 (optional social login) --------------------------
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""

  # ---- Cloudflare Tunnel token ----------------------------------------
  # Create at: Cloudflare Zero Trust → Networks → Tunnels → Create tunnel
  # Copy the token from the installer command (starts with eyJ...)
  CLOUDFLARE_TUNNEL_TOKEN: "CHANGE_ME_your_cloudflare_tunnel_token"

  # ---- SMTP (e.g. Mailgun, SendGrid, AWS SES) -------------------------
  SMTP_USERNAME: "CHANGE_ME_smtp_username"
  SMTP_PASSWORD: "CHANGE_ME_smtp_password"
