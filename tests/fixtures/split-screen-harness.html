<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marty Test Harness</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    
    .container {
      display: grid;
      grid-template-rows: 40px 1fr;
      height: 100vh;
      background: #1e1e1e;
    }
    
    .header {
      background: #2d2d2d;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 14px;
      border-bottom: 1px solid #000;
    }
    
    .status-pill {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff9800; /* pending */
      margin-right: 8px;
    }
    .status-pill.ready { background: #4caf50; }
    
    .test-name { font-weight: 600; margin-right: 16px; }
    .session-info { color: #aaa; margin-left: auto; font-family: monospace; }
    
    .split-view {
      display: grid;
      grid-template-columns: 1fr 425px;
      height: 100%;
      overflow: hidden;
    }
    
    .frame-container {
      position: relative;
      height: 100%;
      border-right: 1px solid #000;
      background: #fff;
    }
    
    .frame-overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 24px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 10px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      z-index: 100;
      pointer-events: none;
    }
    
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="status-pill" id="statusPill"></div>
      <span class="test-name" id="testName">Initializing...</span>
      <span class="session-info" id="sessionInfo"></span>
    </div>
    
    <div class="split-view">
      <!-- Left: Marty Console/Vendor UI -->
      <div class="frame-container">
        <div class="frame-overlay">Marty UI (Vendor/Admin)</div>
        <iframe id="marty-frame" name="marty-frame" src="about:blank" allow="clipboard-read; clipboard-write"></iframe>
      </div>
      
      <!-- Right: Wallet UI -->
      <div class="frame-container">
        <div class="frame-overlay">Mobile Wallet (Flutter)</div>
        <iframe id="wallet-frame" name="wallet-frame" src="about:blank" allow="camera; microphone"></iframe>
      </div>
    </div>
  </div>

  <script>
    // Message relay for Playwright interaction
    window.addEventListener('message', (event) => {
      // Relay wallet messages with special prefix for Playwright to intercept
      if (event.data?.source === 'marty-wallet') {
        console.log('__WALLET_BRIDGE_MSG__:' + JSON.stringify(event.data));
      }
      // Log all messages for debugging
      console.log('[Harness]', JSON.stringify(event.data));
    });
    
    // Helper to set frame sources securely
    window.setFrameSource = (frameId, url) => {
      document.getElementById(frameId).src = url;
    };
    
    // Update header info
    window.setTestInfo = (name, info) => {
      document.getElementById('testName').textContent = name;
      if (info) document.getElementById('sessionInfo').textContent = info;
      document.getElementById('statusPill').classList.add('ready');
    };
  </script>
</body>
</html>
