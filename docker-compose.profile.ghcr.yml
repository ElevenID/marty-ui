# Deploy from pre-built GHCR images instead of building locally
#
# Usage:
#   export MARTY_SERVICES_IMAGE=ghcr.io/elevenid/marty-ui/services@sha256:<digest>
#   export MARTY_MIGRATIONS_IMAGE=ghcr.io/elevenid/marty-ui/migrations@sha256:<digest>
#   docker compose -f docker-compose.base.yml -f docker-compose.profile.ghcr.yml pull
#   docker compose -f docker-compose.base.yml -f docker-compose.profile.ghcr.yml up -d
#
# Infrastructure services (postgres, redis, keycloak, mailpit) come from
# docker-compose.base.yml unchanged. Only application services are overridden.

x-service-image: &service-image
  image: ${MARTY_SERVICES_IMAGE:?set MARTY_SERVICES_IMAGE to an immutable digest}
  pull_policy: always

services:
  db-migrate:
    image: ${MARTY_MIGRATIONS_IMAGE:?set MARTY_MIGRATIONS_IMAGE to an immutable digest}
    pull_policy: always

  gateway:
    <<: *service-image
    environment:
      SERVICE_NAME: gateway

  auth:
    <<: *service-image
    environment:
      SERVICE_NAME: auth

  organization:
    <<: *service-image
    environment:
      SERVICE_NAME: organization

  credential-template:
    <<: *service-image
    environment:
      SERVICE_NAME: credential_template

  trust-profile:
    <<: *service-image
    environment:
      SERVICE_NAME: trust_profile

  applicant:
    <<: *service-image
    environment:
      SERVICE_NAME: applicant

  notification:
    <<: *service-image
    environment:
      SERVICE_NAME: notification

  compliance-profile:
    <<: *service-image
    environment:
      SERVICE_NAME: compliance_profile

  presentation-policy:
    <<: *service-image
    environment:
      SERVICE_NAME: presentation_policy

  deployment-profile:
    <<: *service-image
    environment:
      SERVICE_NAME: deployment_profile

  signing-keys:
    <<: *service-image
    environment:
      SERVICE_NAME: signing_keys

  flow:
    <<: *service-image
    environment:
      SERVICE_NAME: flow

  issuance:
    image: ${MARTY_ISSUANCE_IMAGE:?set MARTY_ISSUANCE_IMAGE to an immutable issuance image digest}
    pull_policy: always
    environment:
      SERVICE_NAME: issuance

  revocation-profile:
    <<: *service-image
    environment:
      SERVICE_NAME: revocation_profile

  device-registration:
    <<: *service-image
    environment:
      SERVICE_NAME: device_registration

  event-stream:
    <<: *service-image
    environment:
      SERVICE_NAME: event_stream

  verification:
    <<: *service-image
    environment:
      SERVICE_NAME: verification
